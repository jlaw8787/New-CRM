  var candPayload={
    name:c.name,classification:c.classification,
    clinical_skills:c.clinicalSkills,phase:c.phase,priority:c.priority,
    consultant_id:c.consultantId,admin_id:c.adminId,hot:!!c.hot,
    phone:c.phone||null,email:c.email||null,state:c.state||null,
    available_from:c.availableFrom||null,last_checkin:c.lastCheckin||null,
    regions:c.regions,preferences:c.preferences||null,
    travel_locations:c.travelLocations,travel_notes:c.travelNotes||null,
    tags:c.tags,notes:c.notes||null,
    last_edited_by:c.lastEditedBy||null,last_edited_at:c.lastEditedAt||null,
    created_by:c.createdBy||null,created_at:c.createdAt||null,
    nurse_type:c.nurseType||'RN',years_experience:c.yearsExperience||null,
    ahpra_number:c.ahpraNumber||null,ahpra_expiry:c.ahpraExpiry||null,

    spiel:c.spiel||null,

    admin_notes:c.adminNotes||null
  };
  if(_dbCandIds.has(c.id)){
    // Existing — update row, never touch the id column
    dbErr('candidate update',await sb.from('candidates').update(candPayload).eq('id',c.id));
  } else {
    // New — let Postgres generate the id
    var ins=await sb.from('candidates').insert(candPayload).select('id').single();
    if(ins.error){console.error('[DB] candidate insert',ins.error);throw new Error('Insert failed: '+(ins.error.message||ins.error.details||JSON.stringify(ins.error)));}
    var oldId=c.id;
    c.id=ins.data.id;
    _dbCandIds.add(c.id);
    // Keep candidates array and open panel in sync with the real id
    var cidx=candidates.findIndex(function(x){return x===c||x.id===oldId;});
    if(cidx>=0)candidates[cidx]=c;
    if(ECid===oldId)ECid=c.id;
  }
  // Activity: append-only — only insert entries not yet in DB
  var newActs=(c.activity||[]).filter(function(a){return !a._synced;});
  if(newActs.length){
    var ar=await sb.from('activity').insert(newActs.map(function(a){
      return{candidate_id:c.id,type:a.type,content:a.content,author:a.author,ts:a.ts};
    }));
    dbErr('activity insert',ar);
    if(!ar.error)newActs.forEach(function(a){a._synced=true;});
  }
  // All other relations: delete-then-reinsert (no id — let DB auto-generate)
  dbErr('compliance del',await sb.from('compliance_items').delete().eq('candidate_id',c.id));
  var ci=Object.entries(c.compliance.items);
  if(ci.length){dbErr('compliance ins',await sb.from('compliance_items').insert(ci.map(function(kv){

      last_edited_by:v.lastEditedBy||null,last_edited_at:v.lastEditedAt||null};
  })));}
  dbErr('submissions del',await sb.from('submissions').delete().eq('candidate_id',c.id));
  if(c.submissions.length){dbErr('submissions ins',await sb.from('submissions').insert(c.submissions.map(function(s){
    return{candidate_id:c.id,facility_id:s.facilityId||null,
      ward:s.ward,nurse_type:s.nurseType,status:s.status,
      submitted_date:s.submittedDate||null,rate:s.rate||null,follow_up_done:!!s.followUpDone,
      notes:s.notes||null};
  })));}
  dbErr('contracts del',await sb.from('contracts').delete().eq('candidate_id',c.id));
  if(c.contracts.length){dbErr('contracts ins',await sb.from('contracts').insert(c.contracts.map(function(k){
    return{candidate_id:c.id,facility_id:k.facilityId||null,facility:k.facility,
      ward:k.ward,status:k.status,start_date:k.startDate||null,end_date:k.endDate||null,
      rate_type:k.rateType,rate:k.rate||null,hours:k.hours||null,alert_days:k.alertDays||14,
      health_region:k.healthRegion||null,loading_pct:k.loadingPct||0,per_diem:k.perDiem||0,
      oncall_rate:k.oncallRate||null,notes:k.notes||null,doc_url:k.docUrl||null,
      doc_added_by:k.docAddedBy||null,doc_added_at:k.docAddedAt||null,
      first_shift_time:k.firstShiftTime||null,supervisor:k.supervisor||null,
      flight_confirmed:!!k.flightConfirmed,accom_confirmed:!!k.accomConfirmed,
      shift_confirmed:!!k.shiftConfirmed,
      last_edited_by:k.lastEditedBy||null,last_edited_at:k.lastEditedAt||null};
  })));}
  dbErr('flights del',await sb.from('flights').delete().eq('candidate_id',c.id));
  if(c.travel.flights.length){dbErr('flights ins',await sb.from('flights').insert(c.travel.flights.map(function(f){
    return{candidate_id:c.id,contract_id:f.contractId||null,
      airline:f.airline||null,flight_no:f.flightNo||null,
      from_city:f.from||null,to_city:f.to||null,
      depart_date:f.departDate||null,return_date:f.returnDate||null,
      booking_ref:f.bookingRef||null,cost:f.cost||null,
      approval_status:f.approvalStatus,approved_by:f.approvedBy||null,
      notes:f.notes||null,doc_url:f.docUrl||null,
      doc_added_by:f.docAddedBy||null,doc_added_at:f.docAddedAt||null};
  })));}
  dbErr('accom del',await sb.from('accommodation').delete().eq('candidate_id',c.id));
  if(c.travel.accommodation.length){dbErr('accom ins',await sb.from('accommodation').insert(c.travel.accommodation.map(function(a){
    return{candidate_id:c.id,contract_id:a.contractId||null,
      name:a.name||null,address:a.address||null,
      check_in:a.checkIn||null,check_out:a.checkOut||null,
      booking_ref:a.bookingRef||null,cost:a.cost||null,cost_unit:a.costUnit||'per night',
      approval_status:a.approvalStatus,approved_by:a.approvedBy||null,
      notes:a.notes||null,doc_url:a.docUrl||null,

  })));}
  dbErr('car_hire del',await sb.from('car_hire').delete().eq('candidate_id',c.id));
  if(c.travel.carHire.length){dbErr('car_hire ins',await sb.from('car_hire').insert(c.travel.carHire.map(function(ch){
    return{candidate_id:c.id,contract_id:ch.contractId||null,

  if(c.travel.expenses.length){dbErr('expenses ins',await sb.from('expenses').insert(c.travel.expenses.map(function(e){

function saveCand(){
  if(!EC.name){showToast("Name required","err");return;}
  var dupe=candidates.find(function(c){return c.id!==EC.id&&c.name.toLowerCase().trim()===EC.name.toLowerCase().trim()&&(c.email&&EC.email&&c.email.toLowerCase()===EC.email.toLowerCase()||c.phone&&EC.phone&&c.phone.replace(/\s/g,"")===EC.phone.replace(/\s/g,""));});
  if(dupe&&!confirm("A candidate named \""+dupe.name+"\" with matching contact details already exists. Save anyway and create a duplicate?")){return;}
  EC.lastEditedBy=CU.name;EC.lastEditedAt=new Date().toISOString();
  if(!EC.id||!candidates.find(function(c){return c.id===EC.id;})){EC.createdBy=CU.name;EC.createdAt=new Date().toISOString();}
  var idx=candidates.findIndex(function(c){return c.id===EC.id;});
  addSysAct(EC,"Profile saved by "+CU.name);
  if(idx>=0)candidates[idx]=EC;else candidates.push(EC);
  syncCandidateToDb(EC)
    .then(function(){showToast(EC.name+" saved");})
    .catch(function(e){showToast("Save error","err");console.error('[DB] saveCand',e);});
  closeModal();renderPage();updateBadges();

// ── DOCUMENT UPLOADS ──────────────────────────────
async function uploadToStorage(candidateId, file, category) {
  var safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  var path = candidateId + '/' + (category||'general') + '/' + Date.now() + '_' + safe;
  var r = await sb.storage.from('candidate-docs').upload(path, file);
  if (r.error) throw new Error(r.error.message);
  return { url: sb.storage.from('candidate-docs').getPublicUrl(path).data.publicUrl, path: path };
}
function docIcon(type) {
  if (!type) return '&#128196;';
  if (type.indexOf('pdf') >= 0) return '&#128196;';
  if (type.indexOf('word') >= 0 || type.indexOf('document') >= 0) return '&#128196;';
  if (type.indexOf('sheet') >= 0 || type.indexOf('excel') >= 0) return '&#128202;';
  if (type.indexOf('image') >= 0) return '&#128444;';
  if (type.indexOf('zip') >= 0 || type.indexOf('compressed') >= 0) return '&#128230;';
  return '&#128196;';
}
function renderDocsTab(c) {
  var docs = c.documents || [];
  var html = '<div style="padding:13px 15px">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<span style="font-size:11px;color:var(--t3)">' + docs.length + ' file' + (docs.length !== 1 ? 's' : '') + '</span>';
  html += '<label class="btn btn-p btn-sm" style="cursor:pointer">+ Upload File<input type="file" style="display:none" multiple onchange="uploadCandidateDoc(this)"></label>';
  html += '</div>';
  if (!docs.length) {
    html += '<div class="empty-st" style="padding:22px">No documents yet. Click Upload File to attach any file type (PDF, Word, Excel, images, etc.).</div>';
  } else {
    html += docs.map(function(d) {
      var kb = d.fileSize ? Math.round(d.fileSize / 1024) + ' KB' : '';
      return '<div style="display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)">'
        + '<span style="font-size:18px;line-height:1.3;flex-shrink:0">' + docIcon(d.fileType) + '</span>'
        + '<div style="flex:1;min-width:0">'
        + '<a href="' + esc(d.fileUrl) + '" target="_blank" rel="noopener" style="font-size:12px;font-weight:600;color:var(--brand);text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(d.fileName) + '</a>'
        + '<div style="font-size:10px;color:var(--t3);margin-top:2px">'
        + (kb ? kb + ' &middot; ' : '')
        + 'Added by ' + esc(d.uploadedBy || '—') + ' &mdash; ' + fmtTS(d.uploadedAt)
        + '</div></div>'
        + '<button onclick="deleteDoc(' + d.id + ',\'' + d.filePath + '\')" title="Delete" style="flex-shrink:0;color:var(--t3);background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:2px 5px">&times;</button>'
        + '</div>';
    }).join('');
  }
  html += '</div>';
  return html;
}
async function uploadCandidateDoc(input) {
  var files = Array.from(input.files || []);
  if (!files.length) return;
  for (var fi = 0; fi < files.length; fi++) {
    var file = files[fi];
    showToast('Uploading ' + file.name + '...');
    try {
      var result = await uploadToStorage(ECid, file, 'general');
      var row = { candidate_id: ECid, file_name: file.name, file_path: result.path,
        file_url: result.url, file_size: file.size, file_type: file.type || '',
        uploaded_by: CU.name, uploaded_at: new Date().toISOString(), category: 'general' };
      var ins = await sb.from('documents').insert(row).select('id').single();
      if (ins.error) throw ins.error;
      var doc = { id: ins.data.id, fileName: row.file_name, filePath: row.file_path,
        fileUrl: row.file_url, fileSize: row.file_size, fileType: row.file_type,
        uploadedBy: row.uploaded_by, uploadedAt: row.uploaded_at, category: 'general' };
      if (!EC.documents) EC.documents = [];
      EC.documents.unshift(doc);
      var cand = candidates.find(function(c) { return c.id === ECid; });
      if (cand) { if (!cand.documents) cand.documents = []; cand.documents.unshift(doc); }
      showToast(file.name + ' uploaded');
    } catch(e) {
      showToast('Upload failed: ' + e.message, 'err');
      console.error('[upload]', e);
    }
  }
  document.getElementById('p-body').innerHTML = renderPTab(EC);
  input.value = '';
}
async function uploadCompDoc(key, input) {
  var file = input.files[0]; if (!file) return;
  showToast('Uploading ' + file.name + '...');
  try {
    var result = await uploadToStorage(ECid, file, 'compliance');
    var ci = EC.compliance.items[key] || {};
    ci.docUrl = result.url; ci.docName = file.name;
    ci.docAddedBy = CU.name; ci.docAddedAt = new Date().toISOString();
    EC.compliance.items[key] = ci;
    var cand = candidates.find(function(c) { return c.id === ECid; });
    if (cand) cand.compliance.items[key] = ci;
    document.getElementById('p-body').innerHTML = renderPTab(EC);
    savePanelFull();
    showToast(file.name + ' attached to compliance item');
  } catch(e) {
    showToast('Upload failed: ' + e.message, 'err');
    console.error('[upload comp]', e);
  }
  input.value = '';
}
async function uploadContractDoc(i, input) {
  var file = input.files[0]; if (!file) return;
  showToast('Uploading ' + file.name + '...');
  try {

    showToast('Upload failed: ' + e.message, 'err');

}
async function uploadTravelDoc(type, i, input) {
  var file = input.files[0]; if (!file) return;
  showToast('Uploading ' + file.name + '...');
  try {
    var result = await uploadToStorage(ECid, file, 'travel');
    EC.travel[type][i].docUrl = result.url;
    EC.travel[type][i].docAddedBy = CU.name;
    EC.travel[type][i].docAddedAt = new Date().toISOString();
    document.getElementById('p-body').innerHTML = renderPTab(EC);
    savePanelFull();
    showToast(file.name + ' attached');
  } catch(e) {
    showToast('Upload failed: ' + e.message, 'err');
    console.error('[upload travel]', e);
  }
  input.value = '';
}
async function deleteDoc(docId, filePath) {
  if (!confirm('Delete this document? This cannot be undone.')) return;
  try {
    await sb.storage.from('candidate-docs').remove([filePath]);
    var r = await sb.from('documents').delete().eq('id', docId);
    if (r.error) throw r.error;
    EC.documents = (EC.documents || []).filter(function(d) { return d.id !== docId; });
    var cand = candidates.find(function(c) { return c.id === ECid; });
    if (cand) cand.documents = (cand.documents || []).filter(function(d) { return d.id !== docId; });
    document.getElementById('p-body').innerHTML = renderPTab(EC);
    showToast('Document deleted');
  } catch(e) {
    showToast('Delete failed: ' + e.message, 'err');
    console.error('[delete doc]', e);
  }
}

async function initApp(){
  sb=supabase.createClient(SUPA_URL,SUPA_KEY);
  var lc=document.querySelector('.lc');
  var origHtml=lc.innerHTML;
  lc.innerHTML='<div style="text-align:center;padding:48px 20px">'
    +'<div style="font-size:36px;margin-bottom:14px">&#9881;</div>'
    +'<div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:5px">Connecting</div>'
    +'<div style="font-size:11px;color:var(--t3)">Loading data from database...</div></div>';
  try{
    var loaded=await Promise.all([loadUsers(),loadFacilities(),loadCandidates(),loadRoles(),loadFacilityChecklists()]);
    users=loaded[0];facilities=loaded[1];candidates=loaded[2];roles=loaded[3];facilityChecklists=loaded[4];
    // Resolve submission facility names (no 'facility' text col in DB — derive from facilityId)
    candidates.forEach(function(c){c.submissions.forEach(function(s){if(!s.facility&&s.facilityId){var f=facilities.find(function(fac){return fac.id===s.facilityId;});if(f)s.facility=f.name;}});});
    lc.innerHTML=origHtml;
    initLogin();
  }catch(e){
    lc.innerHTML='<div style="text-align:center;padding:36px 20px">'
      +'<div style="font-size:32px;margin-bottom:12px">&#10060;</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:6px">Connection failed</div>'
      +'<div style="font-size:11px;color:var(--t3);margin-bottom:16px;word-break:break-word">'+esc(String(e.message||e))+'</div>'
      +'<button class="lc-btn" onclick="initApp()">Retry</button></div>';
  }
}
document.addEventListener('keydown',function(e){
  if(!document.getElementById('panel').classList.contains('open'))return;
  var tag=(document.activeElement||{}).tagName||'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  if(e.key==='ArrowLeft'){e.preventDefault();stepTab(-1);}
  else if(e.key==='ArrowRight'){e.preventDefault();stepTab(1);}
});
