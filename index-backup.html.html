<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCA — Travel Nursing Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f4f5f7;color:#1a1d2e;min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#c8cad1;border-radius:3px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#4c2177!important;box-shadow:0 0 0 3px rgba(76,33,119,.1)}
:root{
  --brand:#4c2177;--brand-d:#3a1a5c;--brand-l:#f0eaf8;--brand-pale:#f8f5fc;
  --accent:#1558d1;--accent-l:#e8effe;
  --ok:#1a7f4b;--ok-l:#e8f5ed;
  --warn:#b45309;--warn-l:#fef3e2;
  --danger:#c0392b;--danger-l:#fdecea;
  --teal:#0a7a72;--teal-l:#e3f5f3;
  --border:#e2e4e9;--border-s:#c8cad1;
  --bg:#f4f5f7;--surface:#ffffff;
  --t1:#1a1d2e;--t2:#5a5f7a;--t3:#9397ae;--t4:#c8cad1;
  --sb:#4c2177;
}
.app{display:flex;min-height:100vh}
#sb{width:240px;background:var(--sb);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:300;overflow-y:auto}
#main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* SIDEBAR */
.sb-logo{height:56px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-mark{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:800;color:#fff;letter-spacing:.5px}
.sb-brand b{display:block;font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.sb-brand small{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.01em}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-grp{padding:4px 0 8px}
.sb-gl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:8px 16px 4px;display:block}
.sbi{display:flex;align-items:center;gap:9px;width:100%;height:40px;padding:0 16px;cursor:pointer;font-size:13px;font-weight:400;color:rgba(255,255,255,.75);background:none;border:none;text-align:left;position:relative;transition:all .11s;white-space:nowrap}
.sbi:hover{color:#fff;background:rgba(255,255,255,.08)}
.sbi.on{color:#fff;font-weight:600;background:rgba(255,255,255,.15)}
.sbi.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:#fff;border-radius:0 3px 3px 0}
.sbi svg{width:15px;height:15px;fill:currentColor;flex-shrink:0;opacity:.7}.sbi.on svg{opacity:1}
.nb{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;color:#fff;flex-shrink:0}
.nb-r{background:#c0392b}.nb-b{background:#1558d1}.nb-a{background:#b45309}
.sb-foot{flex-shrink:0;border-top:1px solid rgba(255,255,255,.08);padding:10px 12px}
.sb-user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 8px;border-radius:6px;transition:background .12s}
.sb-user:hover{background:rgba(255,255,255,.08)}
.sb-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.sb-ui{flex:1;min-width:0}
.sb-ui b{display:block;font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ui small{font-size:10px;color:rgba(255,255,255,.5);text-transform:capitalize}
.sb-sw{font-size:10px;color:rgba(255,255,255,.4);background:none;border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:3px 8px;cursor:pointer;flex-shrink:0;transition:all .1s}
.sb-sw:hover{color:#fff;border-color:rgba(255,255,255,.5)}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-l h1{font-size:15px;font-weight:700;color:var(--t1)}
.tb-l .sub{font-size:10px;color:var(--t3);margin-top:1px}
.tb-r{display:flex;align-items:center;gap:7px}
.abar{background:var(--brand-d);padding:7px 20px;display:flex;align-items:center;gap:9px;font-size:11px;color:rgba(255,255,255,.88)}
.abar svg{width:12px;height:12px;fill:rgba(255,255,255,.6);flex-shrink:0}
.abar .dis{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.4);font-size:15px;cursor:pointer}
.page{padding:16px 20px;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:4px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;font-size:12px;padding:6px 13px}
.btn svg{width:12px;height:12px;flex-shrink:0}
.btn-p{background:var(--brand);color:#fff}.btn-p:hover{background:#4e2490}
.btn-a{background:var(--accent);color:#fff}.btn-a:hover{background:#0040a0}
.btn-g{background:var(--surface);color:var(--t2);border:1px solid var(--border)}.btn-g:hover{background:#f5f6fa;border-color:var(--border-s)}
.btn-d{background:var(--danger);color:#fff}
.btn-ok{background:var(--ok-l);color:var(--ok);border:1px solid #a0d8b0;font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;font-weight:700}
.btn-rj{background:var(--danger-l);color:var(--danger);border:1px solid #f0b8b8;font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;font-weight:700}
.btn-sm{font-size:11px;padding:4px 10px}.btn-xs{font-size:10px;padding:3px 7px;border-radius:3px}
.btn-ghost{background:transparent;color:var(--accent);font-size:11px;padding:4px 7px;border-radius:3px}.btn-ghost:hover{background:var(--accent-l)}

/* CARDS */
.card{background:var(--surface);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.card-hd{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:6px}
.card-title svg{width:13px;height:13px;fill:var(--t3)}

/* STATS */
.stats{display:grid;gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border-radius:8px;padding:13px 15px;border:1px solid var(--border);border-top:3px solid transparent}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.stat-val{font-size:22px;font-weight:800;color:var(--t1);line-height:1;font-variant-numeric:tabular-nums}
.stat-tbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.stat-tf{height:100%;border-radius:2px;transition:width .4s}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);padding:8px 12px;background:#f7f8fc;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid #f0f1f5;font-size:12px;vertical-align:middle;color:var(--t1)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .08s}
.tbl tbody tr:hover td{background:#f7f8fc}
.tbl tbody tr.r-alert td{background:#fff8f8}
.cp{font-weight:600;color:var(--t1)}.cs{font-size:10px;color:var(--t3);margin-top:1px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.b-pu{background:#ede8f7;color:#3b1a6e}.b-bl{background:#e5efff;color:#0040a0}
.b-tl{background:var(--teal-l);color:var(--teal)}.b-gn{background:var(--ok-l);color:var(--ok)}
.b-am{background:var(--warn-l);color:var(--warn)}.b-rd{background:var(--danger-l);color:var(--danger)}
.b-gr{background:#f0f1f5;color:#454e68}.b-ny{background:#e5eaf5;color:#1a3060}
.b-or{background:#fff0e5;color:#8a3800}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.d-gn{background:var(--ok)}.d-am{background:#d4900a}.d-rd{background:var(--danger)}.d-gr{background:var(--border-s)}.d-pu{background:var(--brand)}

/* PROGRESS */
.prog{display:flex;align-items:center;gap:6px}
.prog-t{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;transition:width .35s}
.prog-lbl{font-size:10px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.pbar{display:flex;height:3px;border-radius:2px;overflow:hidden;background:var(--border)}
.pseg{flex:1;margin-right:1px}.pseg:last-child{margin-right:0}

/* PIPELINE STRIP */
.pipe-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px;overflow-x:auto}
.pipe-steps{display:flex;align-items:center}
.pipe-node{display:flex;flex-direction:column;align-items:center;padding:6px 9px;border-radius:4px;cursor:pointer;transition:all .12s;min-width:76px;border:1px solid transparent;gap:3px}
.pipe-node:hover{background:var(--brand-l)}.pipe-node.on{background:var(--brand-l);border-color:var(--brand)}
.pipe-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff}
.pipe-nl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t2);text-align:center;line-height:1.3}
.pipe-node.on .pipe-nl{color:var(--brand)}
.pipe-cnt{font-size:11px;font-weight:800;font-variant-numeric:tabular-nums}
.pipe-ch{font-size:11px;color:var(--border-s);margin:0 1px;flex-shrink:0}

/* FILTER */
.filter-bar{display:flex;gap:7px;margin-bottom:13px;align-items:center;flex-wrap:wrap}
.sw-wrap{position:relative;display:inline-flex;align-items:center}
.sw-wrap input{padding:6px 10px 6px 27px;border:1px solid var(--border);border-radius:4px;font-size:12px;width:220px;background:var(--surface)}
.sw-ico{position:absolute;left:8px;width:12px;height:12px;fill:var(--t3);pointer-events:none}
.fpill{padding:5px 10px;border-radius:3px;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--t3);cursor:pointer;transition:all .11s;text-transform:uppercase;letter-spacing:.05em}
.fpill.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand)}

/* SLIDE PANEL */
#panel{position:fixed;top:0;right:0;bottom:0;width:430px;background:var(--surface);border-left:1px solid var(--border);z-index:250;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease;box-shadow:-3px 0 18px rgba(0,0,0,.1)}
#panel.open{transform:translateX(0)}
.p-hdr{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--brand-d)}
.p-hdr h2{font-size:13px;font-weight:700;color:#fff}
.p-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1}
.p-close:hover{color:#fff}
.p-scroll{overflow-y:auto;flex:1}
.p-tabs{display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:#f7f8fc;flex-shrink:0}
.ptab-scroll{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}
.ptab-scroll::-webkit-scrollbar{display:none}
.ptab-arr{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:14px;padding:0 8px;cursor:pointer;transition:color .1s;line-height:1;display:flex;align-items:center}
.ptab-arr:hover{color:var(--brand)}

/* JOB BOARD */
.jb-filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:10px 14px;background:var(--surface);border-radius:7px;border:1px solid var(--border)}
.jb-filter-bar select{padding:5px 9px;border:1px solid var(--border);border-radius:5px;font-size:11px;background:#fff;color:var(--t1);cursor:pointer;font-family:inherit}
.jb-filter-bar select:focus{outline:none;border-color:var(--brand)}
.jb-split{display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start}
.jb-list{display:flex;flex-direction:column;gap:8px}
.jb-detail{position:sticky;top:10px}
.role-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:7px;padding:11px 13px;cursor:pointer;transition:box-shadow .12s,border-color .12s}
.role-card:hover{box-shadow:0 2px 8px rgba(80,70,168,.10);border-color:var(--brand)}
.role-open{border-left-color:var(--ok)}
.role-likely{border-left-color:#d4900a}
.role-sel{border-color:var(--brand);box-shadow:0 0 0 2px rgba(80,70,168,.12)}
.role-detail-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:14px}
.match-pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.02em;vertical-align:middle}
.match-strong{background:#e8f5e9;color:#2e7d32}
.match-poss{background:#fff3e0;color:#b45309}
/* CANDIDATE FULL PAGE */
.cp-wrap{display:grid;grid-template-columns:240px 1fr;gap:18px;align-items:start;padding:14px 16px}
.cp-left{position:sticky;top:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.cp-avatar{width:60px;height:60px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin:0 auto 10px;letter-spacing:1px}
.cp-name{font-size:14px;font-weight:700;color:var(--t1);line-height:1.3}
.cp-pref{display:block;font-size:10px;font-weight:400;color:var(--t3);margin-top:1px}
.cp-sub{font-size:10px;color:var(--t2);margin:4px 0 8px}
.cp-comp-row{display:flex;justify-content:space-between;align-items:center;margin:10px 0 4px}
.cp-contact{display:flex;flex-direction:column;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.cp-cta{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--t1);text-decoration:none;transition:background .1s}
.cp-cta:hover{background:var(--surface);border-color:var(--brand);color:var(--brand)}
.cp-nav{display:flex;flex-direction:column;gap:1px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);text-align:left}
.cp-nav-a{display:block;font-size:11px;color:var(--t2);padding:5px 8px;border-radius:4px;text-decoration:none;cursor:pointer;transition:background .1s,color .1s}
.cp-nav-a:hover{background:var(--bg);color:var(--brand)}
.cp-right{display:flex;flex-direction:column;gap:10px}
.cp-sec{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cp-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;cursor:pointer;user-select:none}
.cp-sec-hdr:hover{background:var(--bg)}
.cp-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t2)}
.cp-sec-acts{display:flex;align-items:center;gap:7px}
.cp-arr{font-size:10px;color:var(--t3);transition:transform .15s}
.cp-sec.cp-closed .cp-arr{transform:rotate(-90deg)}
.cp-sec.cp-closed .cp-sec-body{display:none}
.cp-sec-body{padding:14px 16px;border-top:1px solid var(--border)}
.cp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px}
.cp-cell{font-size:11px}
.cp-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:2px}
.cp-val{color:var(--t1);line-height:1.5}
.cp-full{grid-column:span 2}
/* Candidate page — layout & left column cards */
.entity-page{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start;padding:24px}
.entity-left{position:sticky;top:24px;display:flex;flex-direction:column;gap:12px}
.entity-right{min-width:0;display:flex;flex-direction:column;gap:14px}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 10px;letter-spacing:1px}
.profile-name{font-size:17px;font-weight:700;color:var(--t1);line-height:1.3}
.profile-pref{display:block;font-size:11px;font-weight:400;color:var(--t3);margin-top:2px}
.profile-sub{font-size:12px;color:var(--t2);margin:3px 0 10px}
.compliance-bar-wrap{margin:10px 0}
.compliance-bar-label{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--t3);margin-bottom:4px}
.compliance-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden}
.compliance-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.contact-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:12px;color:var(--t1);text-decoration:none;margin-top:6px;cursor:pointer;box-sizing:border-box}
.contact-btn:hover{background:var(--brand-l);border-color:var(--brand);color:var(--brand)}
.facts-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-section-title{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.key-facts{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.key-fact-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:2px}
.key-fact-value{font-size:12px;font-weight:600;color:var(--t1)}
.team-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.team-row:last-child{margin-bottom:0}
.team-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600}
.team-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.2}
.team-role{font-size:10px;color:var(--t3)}
.section-nav{display:flex;flex-direction:column;gap:1px}
.section-nav a{display:block;padding:7px 10px;border-radius:5px;font-size:12px;color:var(--t2);text-decoration:none;cursor:pointer;transition:background .1s,color .1s}
.section-nav a:hover{background:var(--brand-pale);color:var(--brand)}
.cp-edit-foot{display:flex;gap:7px;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.ptab{padding:9px 13px;font-size:11px;font-weight:500;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .11s}
.ptab.on{color:var(--brand);font-weight:700;border-bottom-color:var(--brand)}

/* ACTIVITY FEED */
.act-entry{display:flex;gap:9px;padding:11px 15px;border-bottom:1px solid #f0f1f5;transition:background .08s}
.act-entry:hover{background:#f7f8fc}
.act-entry:last-child{border-bottom:none}
.act-dot-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.act-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-icon svg{width:12px;height:12px}
.act-line{flex:1;width:1px;background:var(--border);margin-top:3px;min-height:8px}
.act-body{flex:1}
.act-meta{font-size:10px;color:var(--t3);margin-bottom:2px;display:flex;align-items:center;gap:5px}
.act-tbadge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;text-transform:uppercase}
.act-content{font-size:12px;color:var(--t1);line-height:1.55}
.act-author{font-size:10px;color:var(--t3);margin-top:2px}
.note-add{padding:11px 15px;background:#f7f8fc;border-top:1px solid var(--border);flex-shrink:0}
.note-types{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.nt-btn{padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--t3);cursor:pointer;transition:all .11s;text-transform:uppercase}
.nt-btn.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.note-add textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:12px;resize:none;height:62px;color:var(--t1)}
.note-add-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:8px;width:100%;max-height:94vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mhdr{padding:13px 18px;background:var(--brand-d);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhdr h2{font-size:13px;font-weight:700;color:#fff}
.mclose{background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1}
.mclose:hover{color:#fff}
.mscroll{overflow-y:auto;flex:1}
.mfoot{padding:11px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#f7f8fc;flex-shrink:0}
.mtabs{display:flex;border-bottom:1px solid var(--border);background:#f7f8fc;flex-shrink:0;overflow-x:auto}
.mtab{padding:9px 14px;font-size:11px;font-weight:500;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .11s}
.mtab.on{color:var(--brand);font-weight:700;border-bottom-color:var(--brand)}

/* INFO STRIP */
.istrip{display:flex;gap:0;border-bottom:1px solid var(--border);background:#f7f8fc;overflow-x:auto;flex-shrink:0}
.icell{padding:9px 13px;border-right:1px solid var(--border);flex-shrink:0}
.icell:last-child{border-right:none}
.icell-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:2px}
.icell-val{font-size:11px;font-weight:600;color:var(--t1)}

/* FORMS */
.fb{padding:15px 17px}
.fr{display:grid;gap:10px;margin-bottom:11px}
.f1{grid-template-columns:1fr}.f2{grid-template-columns:1fr 1fr}.f3{grid-template-columns:1fr 1fr 1fr}.f4{grid-template-columns:repeat(4,1fr)}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2)}
.fg input,.fg select,.fg textarea{padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--t1);background:var(--surface);width:100%}
.fg textarea{resize:vertical;font-family:inherit;min-height:58px}
.req{color:var(--danger)}
.sh{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:15px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* COMPLIANCE */
.ci{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:4px;border:1px solid var(--border);margin-bottom:5px;background:var(--surface)}
.ci.done{background:#f5fdf8;border-color:#a0d8b0}
.ci.exp{background:#fffdf5;border-color:#e8c850}
.ci.xpd{background:#fff8f8;border-color:#f0b8b8}
.ci-cb{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border-s);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff}
.ci-cb.chk{background:var(--ok);border-color:var(--ok)}
.ci-cb svg{width:9px;height:9px;fill:#fff}
.ci-name{font-size:11px;font-weight:600;color:var(--t1)}
.ci.done .ci-name{text-decoration:line-through;color:var(--t3);font-weight:400}
.ci-desc{font-size:10px;color:var(--t3);margin-top:1px}
.ci-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.doc-ref{font-size:9px;background:var(--brand-l);color:var(--brand);padding:2px 5px;border-radius:2px;display:inline-flex;align-items:center;gap:3px;font-weight:700}
.att-btn{font-size:9px;padding:2px 6px;border-radius:2px;border:1px dashed var(--border-s);background:none;color:var(--t3);cursor:pointer}
.att-btn:hover{border-color:var(--brand);color:var(--brand)}

/* RATE CALC */
.rate-calc{background:linear-gradient(135deg,#f2edfb,#e5efff);border:1px solid #c0aee8;border-radius:4px;padding:11px 13px;margin-top:9px}
.rate-calc-lbl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
.rate-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:6px}
.rc{background:#fff;border-radius:4px;padding:7px 9px;border:1px solid var(--border)}
.rc-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:2px}
.rc-val{font-size:15px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums;line-height:1}
.rc-val small{font-size:9px;font-weight:500;color:var(--t3)}
.rc.hi{background:var(--brand);border-color:var(--brand)}
.rc.hi .rc-lbl{color:rgba(255,255,255,.6)}.rc.hi .rc-val{color:#fff}.rc.hi .rc-val small{color:rgba(255,255,255,.6)}
.btbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
.btbl th{padding:4px 7px;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);background:var(--brand-l);border-bottom:1px solid #c0aee8;text-align:left}
.btbl td{padding:4px 7px;border-bottom:1px solid #f0f1f5}
.btbl tr:nth-child(even) td{background:#f7f8fc}
.btbl tr:last-child td{border-bottom:none}
.btbl .br{text-align:center;font-variant-numeric:tabular-nums;font-weight:600}
.btbl .bl{text-align:center;font-variant-numeric:tabular-nums;font-weight:700;color:var(--brand)}

/* CALLOUTS */
.callout{border-radius:4px;padding:9px 12px;font-size:11px;line-height:1.6;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start}
.callout svg{width:12px;height:12px;flex-shrink:0;margin-top:1px}
.c-blue{background:var(--accent-l);border:1px solid #b0c8f0;color:#0040a0}
.c-amber{background:var(--warn-l);border:1px solid #e8c850;color:var(--warn)}
.c-green{background:var(--ok-l);border:1px solid #a0d8b0;color:var(--ok)}
.c-red{background:var(--danger-l);border:1px solid #f0b8b8;color:var(--danger)}
.c-purple{background:var(--brand-l);border:1px solid #c0aee8;color:var(--brand)}

/* ALERT ITEMS */
.ai{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:4px;margin-bottom:5px;border:1px solid;cursor:pointer}
.ai:hover{opacity:.85}
.ai-r{background:#fff8f8;border-color:#f0b8b8}.ai-a{background:#fffdf5;border-color:#e8c850}.ai-b{background:#f5f8ff;border-color:#b0c8f0}
.ai svg{width:13px;height:13px;flex-shrink:0;margin-top:1px}
.ai-title{font-size:11px;font-weight:700;color:var(--t1);margin-bottom:1px}
.ai-desc{font-size:10px;color:var(--t2);line-height:1.5}
.ai-act{margin-left:auto;font-size:9px;font-weight:700;padding:3px 7px;border-radius:3px;border:none;cursor:pointer;flex-shrink:0;background:var(--ok-l);color:var(--ok)}

/* TRAVEL */
.tb-block{background:#f7f8fc;border:1px solid var(--border);border-radius:4px;padding:11px;margin-bottom:8px}
.tb-block.appr{background:#f5fdf8;border-color:#a0d8b0}.tb-block.rej{background:#fff8f8;border-color:#f0b8b8}
.tb-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.tb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2)}
.ap-pill{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.ap-p{background:var(--warn-l);color:var(--warn)}.ap-ok{background:var(--ok-l);color:var(--ok)}.ap-r{background:var(--danger-l);color:var(--danger)}

/* CON TOGGLE */
.con-toggle{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.con-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:3px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--t2);transition:all .11s}
.con-pill:hover{border-color:var(--brand);color:var(--brand)}
.con-pill.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand)}

/* HOT STAR */
.hot-star{cursor:pointer;color:var(--t4);font-size:14px;transition:color .12s;background:none;border:none;padding:0 2px;line-height:1}
.hot-star.on{color:#d4900a}.hot-star:hover{color:#d4900a}

/* GLOBAL SEARCH */
.sr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:flex;align-items:flex-start;justify-content:center;padding-top:70px}
.sr-box{background:var(--surface);border-radius:8px;width:100%;max-width:560px;max-height:70vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.sr-head{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sr-head svg{width:14px;height:14px;fill:var(--t3);flex-shrink:0}
.sr-head input{flex:1;border:none;font-size:14px;color:var(--t1);outline:none}
.sr-head button{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer}
.sr-results{overflow-y:auto;flex:1}
.sr-sec{padding:7px 15px 3px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.sr-item{display:flex;align-items:flex-start;gap:9px;padding:8px 15px;cursor:pointer;border-bottom:1px solid #f0f1f5;transition:background .08s}
.sr-item:hover{background:#f7f8fc}.sr-item:last-child{border-bottom:none}
.sr-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sr-icon svg{width:12px;height:12px}
.sr-title{font-size:12px;font-weight:600;color:var(--t1)}
.sr-sub{font-size:10px;color:var(--t3);margin-top:1px}
.sr-hl{background:#fff3b0;border-radius:2px;padding:0 2px}
.sr-empty{padding:24px;text-align:center;color:var(--t3);font-size:12px}

/* MISC */
.empty-st{padding:28px;text-align:center;color:var(--t3);font-size:12px}
.empty-st svg{width:26px;height:26px;fill:var(--border);margin:0 auto 7px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.note-box{background:#fffef0;border:1px solid #e8da70;border-radius:4px;padding:9px 11px;font-size:11px;color:var(--t2);line-height:1.65;white-space:pre-wrap}
.reg-chip{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px;cursor:pointer;border:1px solid;margin:2px;transition:all .1px;text-transform:uppercase}
.reg-chip.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.reg-chip.unsel{background:#fff;color:var(--t3);border-color:var(--border)}
.reg-chip:hover{border-color:var(--brand);color:var(--brand)}
.redepl-badge{font-size:9px;font-weight:700;background:#fff3b0;color:#7a5200;padding:2px 5px;border-radius:2px;display:inline-block;margin-left:4px}
.toast{position:fixed;bottom:18px;right:18px;padding:9px 15px;border-radius:4px;font-size:11px;font-weight:600;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:9999;display:none}

/* LOGIN */
#ls{position:fixed;inset:0;background:linear-gradient(135deg,#1a1d2e,#250d48 50%,#003888 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.lc{background:var(--surface);border-radius:8px;padding:30px 26px;width:100%;max-width:380px;box-shadow:0 28px 70px rgba(0,0,0,.35)}

.lc-mark{width:34px;height:34px;background:var(--brand);border-radius:7px;display:flex;align-items:center;justify-content:center}
.lc-mark svg{width:19px;height:19px;fill:#fff}
.lc-brand b{display:block;font-size:13px;font-weight:800;color:var(--t1)}
.lc-brand small{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em}
.lc h2{font-size:18px;font-weight:800;color:var(--t1);margin-bottom:3px}
.lc p{font-size:11px;color:var(--t3);margin-bottom:17px}
.lc label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:4px;display:block}
.lc select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:4px;font-size:13px;margin-bottom:12px;cursor:pointer}
.lc select:focus{border-color:var(--brand);outline:none}
.lc-prev{min-height:30px;margin-bottom:15px}
.lc-btn{width:100%;padding:10px;background:var(--brand);color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer}
.lc-btn:hover{background:#4e2490}
@media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)!important}.g2,.g3{grid-template-columns:1fr}.f2,.f3,.f4{grid-template-columns:1fr}.rate-grid{grid-template-columns:repeat(2,1fr)}#panel{width:100%}}
</style>

// AUTOMATIONS
function getAutos(cands){
  var alerts=[];
  cands.forEach(function(c){
    c.submissions.forEach(function(s,i){
      if(s.status==="Submitted"&&!s.followUpDone){var d=ddiff(s.submittedDate);if(d!==null&&d<=-2)alerts.push({level:"red",type:"sub",title:"Follow-up 48h+ overdue: "+c.name,desc:"Submitted to "+s.facility+" "+Math.abs(d)+"d ago. Call now.",cid:c.id,tab:"Submissions",action:"Mark Done",afn:"markFU("+c.id+","+i+")"});else if(d!==null&&d<=-1)alerts.push({level:"amber",type:"sub",title:"Follow-up due: "+c.name,desc:"Submitted to "+s.facility+" yesterday. Chase today.",cid:c.id,tab:"Submissions",action:"Mark Done",afn:"markFU("+c.id+","+i+")"});}
      var OUTCOME_ST=["Contracted","Declined","No Response"];if(!OUTCOME_ST.includes(s.status)&&s.status!=="Promoting"&&s.status!=="Submitted"){var dSt=ddiff(s.submittedDate);if(dSt!==null&&dSt<=-7)alerts.push({level:"red",type:"sub",title:"Dead submission? "+c.name,desc:"No outcome in "+Math.abs(dSt)+"d at "+s.facility+". Close or chase.",cid:c.id,tab:"Submissions"});}
    });
    var ci=ciStatus(c);
    if(ci.stale&&["Active","Screening","Compliance","On Assignment","Redeployment"].indexOf(c.phase)>=0)alerts.push({level:"red",type:"checkin",title:"No check-in 14+ days: "+c.name,desc:"Last: "+(c.lastCheckin?fmt(c.lastCheckin):"never")+". Phase: "+c.phase,cid:c.id,tab:"Activity"});
    c.contracts.forEach(function(k){
      var d=ddiff(k.endDate);
      if(d!==null&&d>=0&&d<=(k.alertDays||14)&&k.status==="Active")alerts.push({level:d<=7?"red":"amber",type:"contract",title:"Contract expires "+d+"d: "+c.name,desc:k.facility+" — "+k.ward+" — ends "+fmt(k.endDate),cid:c.id,tab:"Contracts"});
      if(d!==null&&d>=14&&d<=21&&k.status==="Active")alerts.push({level:"blue",type:"extend",title:"Discuss extension: "+c.name,desc:"Contract at "+k.facility+" ends in "+d+" days.",cid:c.id,tab:"Contracts"});
      if(["Signed","Active"].indexOf(k.status)>=0){var lnk=c.travel.flights.concat(c.travel.accommodation).filter(function(t){return t.contractId===k.id;});if(!lnk.length)alerts.push({level:"amber",type:"travel",title:"No travel arranged: "+c.name,desc:"Active contract at "+k.facility+". Start: "+fmt(k.startDate),cid:c.id,tab:"Travel & Expenses"});}
      if(d!==null&&d>=22&&d<=45&&k.status==="Active")alerts.push({level:"blue",type:"redeploy",title:"Redeployment window: "+c.name,desc:"Contract ends "+fmt(k.endDate)+" ("+d+"d). Source next placement.",cid:c.id,tab:"Contracts"});
    });
    getCmpItems(c).forEach(function(item){var ci2=c.compliance.items[item.key];if(ci2&&ci2.checked&&ci2.expiry){var d=ddiff(ci2.expiry);if(d!==null&&d>=0&&d<=30)alerts.push({level:d<=7?"red":"amber",type:"comp",title:item.name+" expiring "+d+"d: "+c.name,desc:"Expiry: "+fmt(ci2.expiry),cid:c.id,tab:"Compliance"});if(d!==null&&d<0)alerts.push({level:"red",type:"comp",title:item.name+" EXPIRED: "+c.name,desc:"Expired "+Math.abs(d)+"d ago",cid:c.id,tab:"Compliance"});}});
  });
  return alerts;
}

function vc(){
  if(!CU)return[];
  if(CU.role==="ops")return candidates;
  if(CU.role==="consultant")return candidates.filter(function(c){return c.consultantId===CU.id;});
  if(CU.role==="admin"){var cs=candidates.filter(function(c){return CU.adminFor.indexOf(c.consultantId)>=0;});if(VCon)cs=cs.filter(function(c){return c.consultantId===VCon;});return cs;}
  return[];
}
function parseCSV(text){
  var lines=text.trim().split('\n');
  if(!lines.length)return[];
  var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_');});
  return lines.slice(1).filter(function(l){return l.trim();}).map(function(line){
    var vals=[];var cur='';var inQ=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'&&!inQ){inQ=true;}
      else if(ch==='"'&&inQ){inQ=false;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    vals.push(cur.trim());
    var obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]||'';});
    return obj;
  });
}

function importCSV(type){
  var input=document.createElement('input');
  input.type='file';
  input.accept='.csv,.xlsx,.xls';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var text=ev.target.result;
      var rows=parseCSV(text);
      if(!rows.length){showToast('No data found in file.',3000);return;}
      var added=0;var skipped=0;
      if(type==='candidates'){
        rows.forEach(function(row){
          var name=row.name||row.full_name||row.candidate_name||'';
          if(!name){skipped++;return;}
          var consName=row.consultant||row.consultant_name||'';
          var cons=users.find(function(u){return u.role==='consultant'&&u.name.toLowerCase().indexOf(consName.toLowerCase())>=0;});
          var newCand={
            id:uid(),
            name:name,
            classification:row.classification||row.role||row.job_title||'RN',
            clinicalSkills:(row.skills||row.clinical_skills||'').split(';').map(function(s){return s.trim();}).filter(Boolean),
            phase:row.phase||row.stage||'New Lead',
            priority:row.priority||'med',
            consultantId:cons?cons.id:(users.find(function(u){return u.role==='consultant';})||{id:2}).id,
            adminId:5,hot:false,
            phone:row.phone||row.mobile||'',
            email:row.email||'',
            state:row.state||'QLD',
            availableFrom:row.available_from||row.available||new Date().toISOString().slice(0,10),
            lastCheckin:new Date().toISOString().slice(0,10),
            regions:[],travelLocations:[],tags:[],
            activity:[{id:uid(),type:'System',content:'Imported from CSV',author:'System',ts:new Date().toISOString()}],
            compliance:{items:{}},submissions:[],
            travel:{flights:[],accommodation:[],carHire:[],expenses:[]},
            contracts:[],notes:'',preferences:''
          };
          candidates.push(newCand);
          added++;
        });
        showToast('Imported '+added+' candidates'+(skipped?' ('+skipped+' skipped - no name)':'')+'.', 4000);
        nav('candidates');
      } else if(type==='consultants'){
        rows.forEach(function(row){
          var name=row.name||row.full_name||row.consultant_name||'';
          if(!name){skipped++;return;}
          var exists=users.find(function(u){return u.name.toLowerCase()===name.toLowerCase();});
          if(exists){skipped++;return;}
          var colors=['#e84393','#00bcd4','#ff9800','#4caf50','#9c27b0','#f44336'];
          users.push({
            id:uid(),
            name:name,
            role:row.role||'consultant',
            email:row.email||'',
            initials:name.split(' ').map(function(n){return n[0];}).join('').slice(0,2).toUpperCase(),
            color:colors[users.length%colors.length],
            targets:{p:parseInt(row.placement_target)||4,s:parseInt(row.submission_target)||20},
            adminFor:[],
            consultantId:null
          });
          added++;
        });
        showToast('Imported '+added+' users'+(skipped?' ('+skipped+' skipped)':'')+'.', 4000);
        nav('team');
      }
      updateBadges();
    };
    reader.readAsText(file);
  };
  input.click();
}

  document.getElementById("p-body").innerHTML=renderPTab(c);

function renderPTab(c){
  if(pTab==="Activity"){
    var entries=[].concat(c.activity||[]).reverse();
    if(!entries.length)return'<div class="empty-st" style="padding:22px">'+I.pencil+' No activity recorded. Add a note above.</div>';
    return entries.map(function(e,idx){var color=NC[e.type]||"#454e68";var bg=NB[e.type]||"#f0f1f5";return'<div class="act-entry">'+'<div class="act-dot-col"><div class="act-icon" style="background:'+bg+';color:'+color+'">'+ntIcon(e.type)+'</div>'+(idx<entries.length-1?'<div class="act-line"></div>':"")+'</div>'+'<div class="act-body"><div class="act-meta"><span class="act-tbadge" style="background:'+bg+';color:'+color+'">'+e.type+'</span>'+fmtTS(e.ts)+'</div><div class="act-content">'+esc(e.content)+'</div><div class="act-author">'+esc(e.author)+'</div></div>'+'</div>';}).join("");}

  if(pTab==="Profile"){
  var ahpraD=c.ahpraExpiry?ddiff(c.ahpraExpiry):null;
  var ahpraWarn=ahpraD!==null&&ahpraD>=0&&ahpraD<=60;
  var ahpraExp=ahpraD!==null&&ahpraD<0;
  var auditLine=(c.lastEditedBy?'<div style="font-size:9px;color:var(--t3);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">Last edited by '+esc(c.lastEditedBy)+' — '+fmtTS(c.lastEditedAt)+(c.createdBy?' &middot; Created by '+esc(c.createdBy)+' — '+fmtTS(c.createdAt):'')+'</div>':'');
  var qi='<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:12px">'
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:8px">Quick Info</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px 14px;font-size:11px">'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">CLASSIFICATION</div><strong>'+esc(c.classification)+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">NURSE TYPE</div><strong>'+esc(c.nurseType||'RN')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">EXPERIENCE</div><strong>'+(c.yearsExperience?c.yearsExperience+' yrs':'—')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">MIN RATE</div><strong>'+(c.minRate?'$'+c.minRate+'/hr':'—')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">AHPRA NUMBER</div><strong>'+(c.ahpraNumber||'—')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">AHPRA EXPIRY</div><strong style="color:'+(ahpraExp?'var(--danger)':ahpraWarn?'#d4900a':'inherit')+'">'+(c.ahpraExpiry?fmt(c.ahpraExpiry)+(ahpraExp?' — EXPIRED':ahpraWarn?' ('+ahpraD+'d)':''):'—')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">AVAILABLE FROM</div><strong>'+(c.availableFrom?fmt(c.availableFrom):'Not set')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">PREF. BLOCK</div><strong>'+(c.preferredBlockLength?c.preferredBlockLength+' weeks':'Flexible')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">HOME STATE</div><strong>'+(c.state||'—')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">PREF. REGIONS</div><strong>'+(c.regions&&c.regions.length?c.regions.join(', '):'Flexible')+'</strong></div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">HAS CAR</div>'+(c.hasCar?'<span class="badge b-ok" style="font-size:9px">Yes</span>':'<span style="color:var(--t3)">No</span>')+'</div>'
    +'<div><div style="font-size:9px;color:var(--t3);margin-bottom:1px">ACCOMMODATION</div>'+(c.accommodationRequired?'<span class="badge b-am" style="font-size:9px">Required'+(c.partnerAccommodation?' + partner':'')+'</span>':'<span style="color:var(--t3)">Not required</span>')+'</div>'
    +'</div></div>';
  return'<div style="padding:13px 15px">'+auditLine+qi
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:7px">Contact</div>'
    +'<div style="font-size:12px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">'+I.phone+' '+esc(c.phone||"Not recorded")+'</div><div style="display:flex;align-items:center;gap:5px">'+I.mail+' '+esc(c.email||"Not recorded")+'</div></div>'
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:7px">Clinical Skills</div>'
    +'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px">'+c.clinicalSkills.map(function(s){return'<span class="badge b-tl">'+esc(s)+'</span>';}).join('')+'</div>'
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px">Travel Locations</div>'
    +'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px">'+(c.travelLocations.length?c.travelLocations.map(function(t){return'<span class="badge b-bl">'+esc(t)+'</span>';}).join(''):'<span style="font-size:11px;color:var(--t3)">None set</span>')+'</div>'
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px">Preferences</div>'
    +'<div style="font-size:11px;color:var(--t2);line-height:1.6;margin-bottom:10px">'+esc(c.preferences||"None recorded")+'</div>'
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px">Tags</div>'
    +'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px">'+(c.tags&&c.tags.length?c.tags.map(function(t){return'<span class="badge b-am">'+esc(t)+'</span>';}).join(''):'<span style="font-size:11px;color:var(--t3)">No tags</span>')+'</div>'
    +'</div>';}

  if(pTab==="Compliance"){
    var sc=cmpScore(c);var allR=getCmpItems(c).filter(function(i){return i.req;});var done=allR.filter(function(i){return c.compliance.items[i.key]&&c.compliance.items[i.key].checked;}).length;
    var baseSecs=BC.map(function(sec){return'<div style="margin-bottom:12px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:6px">'+esc(sec.section)+'</div>'+sec.items.map(function(item){return pCompItem(item,c);}).join("")+'</div>';}).join("");
    var regExtras=(c.regions||[]).reduce(function(a,r){var rc=RC[r];if(!rc)return a;return a+'<div style="margin-bottom:12px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:6px"><span class="badge" style="background:'+rc.color+'20;color:'+rc.color+'">'+rc.label+'</span> Additional</div>'+rc.extra.map(function(item){return pCompItem(item,c);}).join("")+'</div>';},"");
    return'<div style="padding:12px 15px"><div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:700;color:'+scColor(sc)+'">'+sc+'%</span><span style="font-size:10px;color:var(--t3)">'+done+'/'+allR.length+' required</span></div><div class="prog" style="gap:0"><div class="prog-t" style="width:100%;height:5px"><div class="prog-f" style="width:'+sc+'%;background:'+scColor(sc)+'"></div></div></div></div>'+baseSecs+regExtras+'</div>';}

  if(pTab==="Submissions"){
    var subs=c.submissions;
    var addBtn="<button class=\"btn btn-p btn-sm\" onclick=\"addSubP()\">+ New Submission</button>";
    var rows="";
    if(subs.length===0){
      rows="<div class=\"empty-st\" style=\"padding:18px\">No submissions yet</div>";
    }else{
      rows=subs.map(function(s,i){
        var fac=facilities.find(function(f){return f.id===s.facilityId;});
        var stageColors={"Promoting":"b-am","Submitted":"b-bl","Contracted":"b-gn","Declined":"b-rd","No Response":"b-gy"};
        var d=s.submittedDate?ddiff(s.submittedDate):null;
        var nf=s.status==="Submitted"&&!s.followUpDone&&d!==null&&d<=-1;
        return "<div class=\"sub-card\">"
          +"<div class=\"sub-hd\"><span class=\"badge "+(stageColors[s.status]||"b-gy")+"\">"+s.status+"</span>"
          +(nf?"<span class=\"badge b-rd\">Follow-up!</span>":"")
          +"<button class=\"btn btn-g btn-xs\" onclick=\"delSubP("+i+")\">Remove</button></div>"
          +"<div class=\"fg\"><label>Facility</label><select onchange=\"setSubFacility("+i+",this.value)\">"
            +"<option value=\"\">Select facility...</option>"
            +facilities.map(function(f){return "<option value=\""+f.id+"\""+(s.facilityId===f.id?" selected":"")+">"+esc(f.name)+" ("+f.state+")</option>";}).join("")
          +"</select></div>"
          +(fac?"<div class=\"fg\"><label>Ward</label><select onchange=\"EC.submissions["+i+"].ward=this.value\">"
            +"<option value=\"\">Select ward...</option>"
            +fac.wards.map(function(w){return "<option"+(s.ward===w.name?" selected":"")+">"+esc(w.name)+"</option>";}).join("")
          +"</select></div>"
          +"<div class=\"fg\"><label>Nurse Type</label><select onchange=\"EC.submissions["+i+"].nurseType=this.value\">"
            +(function(){var w=fac.wards.find(function(w){return w.name===s.ward;});var types=w?w.nurseTypes:["RN","EN","CN"];return types.map(function(t){return "<option"+(s.nurseType===t?" selected":"")+">"+t+"</option>";}).join("");})()
          +"</select></div>"
          :"<div style=\"font-size:10px;color:var(--t3);padding:6px 0\">Select a facility to choose ward</div>")
          +"<div class=\"fg\"><label>Status</label><select onchange=\"(function(v,idx){if(v==='Submitted'&&EC.submissions[idx].status!=='Submitted'){var checks=['Candidate personally briefed - wants this role?','CV current for this facility?','Compliance 60%+ complete?','Direct contact name at facility?'];for(var qi=0;qi<checks.length;qi++){if(!confirm('Pre-submission check '+(qi+1)+'/4:\\n\\n'+checks[qi]+'\\n\\nConfirm YES.')){showToast('Paused. Fix that first.',4000);return;}}EC.submissions[idx].submittedDate=new Date().toISOString().slice(0,10);showToast('Submitted. Chase in 48h.',3000);}EC.submissions[idx].status=v;savePanelSync();})(this.value,"+i+")\">"
          +SS.map(function(st){return "<option"+(s.status===st?" selected":"")+">"+st+"</option>";}).join("")
          +"</select></div>"
          +"<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">"
          +"<div class=\"fg\"><label>Submitted Date</label><input type=\"date\" value=\""+(s.submittedDate||"")+"\" oninput=\"EC.submissions["+i+"].submittedDate=this.value\"></div>"
          +"<div class=\"fg\"><label>Rate ($/hr)</label><input value=\""+esc(s.rate||"")+"\" oninput=\"EC.submissions["+i+"].rate=this.value\"></div>"
          +"</div>"
          +"<div class=\"fg\"><label>Notes</label><input value=\""+esc(s.notes)+"\" oninput=\"EC.submissions["+i+"].notes=this.value\"></div>"
          +(nf?"<div style=\"margin-top:6px\"><button class=\"btn btn-p btn-sm\" onclick=\"markFU("+c.id+","+i+")\">Mark Follow-up Done</button></div>":"")
          +"</div>";
      }).join("");
    }
    return "<div style=\"padding:12px 15px\"><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\"><span style=\"font-size:12px;font-weight:600;color:var(--t2)\">"+subs.length+" submission"+(subs.length!==1?"s":"")+"</span>"+addBtn+"</div>"+rows+"</div>";
  }
  if(pTab==="Travel & Expenses"){return pTravelTab(c);}
  if(pTab==="Contracts"){return pContractTab(c);}
  if(pTab==="Documents"){return renderDocsTab(c);}
  return "";
}

function pCompItem(item,c){
  var ci=c.compliance.items[item.key]||{};
  var d=ci.expiry?ddiff(ci.expiry):null;
  var expWarn=d!==null&&d>=0&&d<=30;
  var expExpired=d!==null&&d<0;
  var cls="ci"+(ci.checked?" done":expExpired?" xpd":expWarn?" exp":"");
  var h="<div class=\""+cls+"\"><div class=\"ci-cb "+(ci.checked?"chk":"")+"\" onclick=\"toggleCompP(&apos;"+item.key+"&apos;)\">"+(ci.checked?I.chk:"")+"</div>";
  h+="<div style=\"flex:1\"><div class=\"ci-name\">"+esc(item.name)+(item.req?" <span class=\"req\">*</span>":"")+"</div>";
  h+="<div class=\"ci-desc\">"+esc(item.desc)+"</div><div class=\"ci-meta\">";
  if(item.hasExpiry){
    h+="<input type=\"date\" value=\""+(ci.expiry||"")+"\" style=\"font-size:10px;padding:2px 5px;border:1px solid "+(expExpired?"var(--danger)":expWarn?"#d4900a":"var(--border)")+";border-radius:2px;width:130px\" onchange=\"setCompP(&apos;"+item.key+"&apos;,&apos;expiry&apos;,this.value)\">";
    if(expExpired)h+="<span style=\"font-size:9px;font-weight:700;color:var(--danger)\">EXPIRED</span>";
    else if(expWarn)h+="<span style=\"font-size:9px;font-weight:700;color:#d4900a\">Exp "+d+"d</span>";
  }
  if(ci.docUrl){
    h+="<div style=\"margin-top:4px\"><a href=\""+esc(ci.docUrl)+"\" target=\"_blank\" rel=\"noopener\" class=\"doc-ref\" style=\"text-decoration:none\">&#128206; "+esc(ci.docName||"Document")+"</a> "
      +"<span onclick=\"setCompP(&apos;"+item.key+"&apos;,&apos;docUrl&apos;,&apos;&apos;)\" style=\"cursor:pointer;opacity:.5;font-size:10px\">&times;</span></div>";
    if(ci.docAddedBy)h+="<div style=\"font-size:8px;color:var(--t3);margin-top:2px\">Added by "+esc(ci.docAddedBy)+" — "+fmtTS(ci.docAddedAt)+"</div>";
  }else{
    h+="<label class=\"att-btn\" style=\"cursor:pointer\">&#128206; Attach File<input type=\"file\" style=\"display:none\" onchange=\"uploadCompDoc(&apos;"+item.key+"&apos;,this)\"></label>";
  }
  if(ci.lastEditedBy)h+="<div style=\"font-size:8px;color:var(--t3);margin-top:3px\">Last edited by "+esc(ci.lastEditedBy)+" — "+fmtTS(ci.lastEditedAt)+"</div>";
  h+="</div></div></div>";
  return h;
}

  var apSel=function(type,i,val){return'<select onchange="EC.travel.'+type+'['+i+'].approvedBy=this.value" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:3px;font-size:11px"><option value="">Select approver</option>'+users.map(function(u){return'<option '+(val===u.name?"selected":"")+'>'+esc(u.name)+'</option>';}).join("")+'</select>';};

  var mkBl=function(items,type,lbl){return items.map(function(item,i){return"<div class=\"tb-block "+(item.approvalStatus==="Approved"?"appr":item.approvalStatus==="Rejected"?"rej":"")+"\">"+"<div class=\"tb-hdr\"><span class=\"tb-title\">"+lbl+" "+(i+1)+"</span><div style=\"display:flex;gap:5px;align-items:center\"><span class=\"ap-pill "+(item.approvalStatus==="Approved"?"ap-ok":item.approvalStatus==="Rejected"?"ap-r":"ap-p")+"\">"+item.approvalStatus+"</span>"+apBtns(type,i,item.approvalStatus)+"<button class=\"btn btn-g btn-xs\" onclick=\"delTravP(\&apos;"+type+"\&apos;,"+i+")\">&#215;</button></div></div>"+pTravFields(item,i,type,apSel)+"</div>";}).join("");};

  if(!q||q.length<2){document.getElementById("sr-res").innerHTML='<div class="sr-empty">Type at least 2 characters</div>';return;}
  var cands=vc();var ql=q.toLowerCase();
  var hl=function(txt){return String(txt).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+')','gi'),'<span class="sr-hl">$1</span>');};
  var html="";
  var byName=cands.filter(function(c){return c.name.toLowerCase().indexOf(ql)>=0||c.classification.toLowerCase().indexOf(ql)>=0||c.email.toLowerCase().indexOf(ql)>=0;});
  if(byName.length){html+='<div class="sr-sec">Candidates</div>';html+=byName.slice(0,5).map(function(c){return'<div class="sr-item" onclick="closeSearch();openPanel('+c.id+',&apos;Activity&apos;)"><div class="sr-icon" style="background:var(--brand-l);color:var(--brand)">'+I.person+'</div><div><div class="sr-title">'+hl(c.name)+'</div><div class="sr-sub">'+hl(c.classification)+' — '+c.phase+(c.availableFrom?" — Avail: "+fmt(c.availableFrom):"")+'</div></div></div>';}).join("");}
  var actM=[];cands.forEach(function(c){(c.activity||[]).forEach(function(e){if(e.content.toLowerCase().indexOf(ql)>=0)actM.push({c:c,e:e});});});
  if(actM.length){html+='<div class="sr-sec">Activity Notes</div>';html+=actM.slice(0,5).map(function(m){var color=NC[m.e.type]||"#454e68";var bg=NB[m.e.type]||"#f0f1f5";return'<div class="sr-item" onclick="closeSearch();openPanel('+m.c.id+',&apos;Activity&apos;)"><div class="sr-icon" style="background:'+bg+';color:'+color+'">'+ntIcon(m.e.type)+'</div><div><div class="sr-title">'+esc(m.c.name)+' <span style="font-size:9px;font-weight:700;color:var(--t3)">'+m.e.type.toUpperCase()+'</span></div><div class="sr-sub" style="max-width:380px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+hl(m.e.content.slice(0,100))+'</div><div style="font-size:9px;color:var(--t3)">'+fmtTS(m.e.ts)+'</div></div></div>';}).join("");}
  var byLoc=cands.filter(function(c){return c.travelLocations.some(function(l){return l.toLowerCase().indexOf(ql)>=0;});}).filter(function(c){return byName.indexOf(c)<0;});
  if(byLoc.length){html+='<div class="sr-sec">By Location</div>';html+=byLoc.slice(0,4).map(function(c){return'<div class="sr-item" onclick="closeSearch();openPanel('+c.id+',&apos;Profile&apos;)"><div class="sr-icon" style="background:var(--accent-l);color:var(--accent)">'+I.plane+'</div><div><div class="sr-title">'+esc(c.name)+'</div><div class="sr-sub">'+hl(c.travelLocations.join(", "))+'</div></div></div>';}).join("");}
  var bySkill=cands.filter(function(c){return c.clinicalSkills.some(function(s){return s.toLowerCase().indexOf(ql)>=0;})||(c.tags&&c.tags.some(function(t){return t.toLowerCase().indexOf(ql)>=0;}));}).filter(function(c){return byName.indexOf(c)<0&&byLoc.indexOf(c)<0;});
  if(bySkill.length){html+='<div class="sr-sec">By Skill / Tag</div>';html+=bySkill.slice(0,4).map(function(c){return'<div class="sr-item" onclick="closeSearch();openPanel('+c.id+',&apos;Profile&apos;)"><div class="sr-icon" style="background:var(--teal-l);color:var(--teal)">'+I.person+'</div><div><div class="sr-title">'+esc(c.name)+'</div><div class="sr-sub">'+hl(c.clinicalSkills.concat(c.tags||[]).join(", "))+'</div></div></div>';}).join("");}
  var byFac=facilities.filter(function(f){return f.name.toLowerCase().indexOf(ql)>=0||f.state.toLowerCase().indexOf(ql)>=0||(f.wards||[]).some(function(w){return w.name.toLowerCase().indexOf(ql)>=0;});});
  if(byFac.length){html+='<div class="sr-sec">Facilities</div>';html+=byFac.slice(0,3).map(function(f){return'<div class="sr-item" onclick="closeSearch();nav(&apos;facilities&apos;)"><div class="sr-icon" style="background:var(--ok-l);color:var(--ok)">'+I.hosp+'</div><div><div class="sr-title">'+hl(f.name)+'</div><div class="sr-sub">'+f.state+' — '+hl((f.wards||[]).map(function(w){return w.name;}).join(", "))+'</div></div></div>';}).join("");}
  var bySub=cands.filter(function(c){return c.submissions.some(function(s){return (s.facility||"").toLowerCase().indexOf(ql)>=0;});}).filter(function(c){return byName.indexOf(c)<0;});
  if(bySub.length){html+='<div class="sr-sec">Submissions</div>';html+=bySub.slice(0,3).map(function(c){var s=c.submissions.find(function(s){return (s.facility||"").toLowerCase().indexOf(ql)>=0;});return'<div class="sr-item" onclick="closeSearch();openPanel('+c.id+',&apos;Submissions&apos;)"><div class="sr-icon" style="background:#f0f1f5;color:var(--t2)">'+I.doc+'</div><div><div class="sr-title">'+esc(c.name)+'</div><div class="sr-sub">'+hl(s.facility)+" — "+esc(s.ward)+" — "+esc(s.status)+'</div></div></div>';}).join("");}
  document.getElementById("sr-res").innerHTML=html||'<div class="sr-empty">No results for "'+esc(q)+'"</div>';
}

function buildChaseList(){
  var cands=vc(),actions=[];
  cands.forEach(function(c){
    c.submissions.forEach(function(s,i){
      if(s.status==="Submitted"&&!s.followUpDone){
        var d=ddiff(s.submittedDate);
        if(d!==null&&d<=-1)actions.push({
          priority:d<=-2?1:2,color:"var(--danger)",icon:"&#128222;",
          label:"Call "+s.facility+" re: "+esc(c.name),
          detail:(d<=-2?"URGENT "+Math.abs(d)+"d overdue":"Due today")+" — "+c.classification,
          cid:c.id,tab:"Submissions",action:"markFU("+c.id+","+i+")",actionLabel:"Done"
        });
      }
      if(s.interviewDate){
        var di=ddiff(s.interviewDate);
        if(di!==null&&di>=0&&di<=1)actions.push({
          priority:1,color:"#8a3800",icon:"&#128197;",
          label:"Interview "+(di===0?"TODAY":"tomorrow")+": "+esc(c.name),
          detail:s.facility+" — make sure they are prepped",
          cid:c.id,tab:"Submissions",action:null,actionLabel:null
        });
      }
    });
    c.contracts.forEach(function(k){
      var d=ddiff(k.endDate);
      if(d!==null&&d>=0&&d<=14&&k.status==="Active")
        actions.push({priority:d<=7?1:2,color:d<=7?"var(--danger)":"#d4900a",icon:"&#128203;",
          label:"Extension talk: "+esc(c.name),
          detail:"Contract at "+k.facility+" ends in "+d+"d — have the conversation now",
          cid:c.id,tab:"Contracts",action:null,actionLabel:null});
      var ds=ddiff(k.startDate);
      if(ds!==null&&ds>=0&&ds<=5&&["Signed","Active"].indexOf(k.status)>=0
          &&(!k.shiftConfirmed||!k.flightConfirmed||!k.accomConfirmed))
        actions.push({priority:1,color:"var(--danger)",icon:"&#9992;",
          label:"Confirm start: "+esc(c.name),
          detail:"Starting "+(ds===0?"TODAY":"in "+ds+"d")+" — travel/accom/shift not confirmed",
          cid:c.id,tab:"Contracts",action:null,actionLabel:null});
    });
    var ci=ciStatus(c);
    if(ci.stale&&["Compliance","Submission","Offer","Contract"].indexOf(c.phase)>=0)
      actions.push({priority:3,color:"var(--t3)",icon:"&#128172;",
        label:"Check in: "+esc(c.name),
        detail:"No contact 14+ days — "+c.phase,
        cid:c.id,tab:"Activity",action:null,actionLabel:null});
  });
  actions.sort(function(a,b){return a.priority-b.priority;});
  return actions;
}

function renderMgmtDash(){
  document.getElementById("tb-h").textContent="Management Dashboard";
  document.getElementById("tb-s").textContent="Pipeline, follow-ups and conversions — all consultants";
  document.getElementById("tb-r").innerHTML="";
  var allC=candidates,cons=users.filter(function(u){return u.role==="consultant";});
  var OUTCOME=["Contracted","Declined","No Response"];
  var allS=allC.reduce(function(a,c){return a.concat(c.submissions.map(function(s){return Object.assign({},s,{cid:c.id,cn:c.name,cConsId:c.consultantId});},[]));}, []);
  var total=allS.length;
  var withOut=allS.filter(function(s){return OUTCOME.includes(s.status);});
  var noOutN=total-withOut.length;
  var noOutPct=total>0?Math.round(noOutN/total*100):0;
  var overdue=allS.filter(function(s){var d=ddiff(s.submittedDate);return s.status==="Submitted"&&!s.followUpDone&&d!==null&&d<=-1;});
  var stale=allS.filter(function(s){var d=ddiff(s.submittedDate);return !OUTCOME.includes(s.status)&&s.status!=="Promoting"&&d!==null&&d<=-7;});
  var accepted=allS.filter(function(s){return s.status==="Accepted";});
  var convRate=withOut.length>0?Math.round(accepted.length/withOut.length*100):0;
  var placed=allC.filter(function(c){return c.phase==="On Assignment"||c.phase==="Extension/Exit";});
  var activeCon=allC.reduce(function(a,c){return a+c.contracts.filter(function(k){return k.status==="Active";}).length;},0);
  var inPipe=allS.filter(function(s){return s.status==="Submitted"||s.status==="Promoting";});
  function sc(lbl,val,sub,col,urg){
    return '<div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid '+col+';border-radius:8px;padding:14px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:4px">'+lbl+'</div>'
      +'<div style="font-size:28px;font-weight:800;color:'+(urg?'var(--danger)':col)+';line-height:1">'+val+'</div>'
      +'<div style="font-size:11px;color:var(--t3);margin-top:4px">'+sub+'</div></div>';
  }
  var topRow='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">'
    +sc("Total Subs",total,"all time","var(--accent)",false)
    +sc("No Outcome",noOutPct+"%",noOutN+" of "+total+" subs",noOutPct>=50?"var(--danger)":"#d4900a",noOutPct>=50)
    +sc("Overdue F/U",overdue.length,"need chasing now","var(--danger)",overdue.length>0)
    +sc("Stale 7d+",stale.length,"no update in 7+ days","var(--danger)",stale.length>0)
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">'
    +sc("Placed",placed.length,"on assignment","var(--ok)",false)
    +sc("Active Contracts",activeCon,"running now","var(--ok)",false)
    +sc("Accepted Rate",convRate+"%","of subs with outcome","#3b1a6e",false)
    +sc("In Pipeline",inPipe.length,"submitted/under review","var(--accent)",false)
    +'</div>';
  var rows=cons.map(function(u){
    var mc=allC.filter(function(c){return c.consultantId===u.id;});
    var ms=mc.reduce(function(a,c){return a.concat(c.submissions);}, []);
    var mo=ms.filter(function(s){return OUTCOME.includes(s.status);});
    var mn=ms.length-mo.length;
    var mp=ms.length>0?Math.round(mn/ms.length*100):0;
    var mov=ms.filter(function(s){var d=ddiff(s.submittedDate);return s.status==="Submitted"&&!s.followUpDone&&d!==null&&d<=-1;});
    var mst=ms.filter(function(s){var d=ddiff(s.submittedDate);return !OUTCOME.includes(s.status)&&s.status!=="Promoting"&&d!==null&&d<=-7;});
    var mpl=mc.filter(function(c){return c.phase==="On Assignment"||c.phase==="Extension/Exit";});
    var mac=ms.filter(function(s){return s.status==="Accepted";});
    var col=mp>=60?"var(--danger)":mp>=40?"#d4900a":"var(--ok)";
    return '<tr onclick="setVC('+u.id+');nav(&apos;candidates&apos;)" style="cursor:pointer">'
      +'<td><div style="display:flex;align-items:center;gap:8px">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:'+u.color+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff">'+u.initials+'</div>'
      +'<span style="font-weight:600">'+esc(u.name)+'</span></div></td>'
      +'<td style="text-align:center">'+mc.length+'</td>'
      +'<td style="text-align:center">'+ms.length+'</td>'
      +'<td style="text-align:center;font-weight:700;color:'+col+'">'+mn+' <span style="font-size:10px;font-weight:400;color:var(--t3)">('+mp+'%)</span></td>'
      +'<td style="text-align:center;font-weight:700;color:'+(mov.length>0?"var(--danger)":"var(--ok)")+'">'+mov.length+'</td>'
      +'<td style="text-align:center;font-weight:700;color:'+(mst.length>0?"var(--danger)":"var(--ok)")+'">'+mst.length+'</td>'
      +'<td style="text-align:center">'+mpl.length+'</td>'
      +'<td style="text-align:center;font-weight:700;color:var(--ok)">'+mac.length+'</td>'
      +'</tr>';
  }).join("");
  var tbl='<div class="card" style="margin-bottom:12px">'
    +'<div class="card-hd"><div class="card-title">Consultant Breakdown</div>'
    +'<div style="font-size:10px;color:var(--t3)">Click a row to view their pipeline</div></div>'
    +'<table class="tbl"><thead><tr>'
    +'<th>Consultant</th><th style="text-align:center">Cands</th>'
    +'<th style="text-align:center">Subs</th><th style="text-align:center">No Outcome</th>'
    +'<th style="text-align:center">Overdue F/U</th><th style="text-align:center">Stale</th>'
    +'<th style="text-align:center">Placed</th><th style="text-align:center">Accepted</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>';
  var ovl="";
  if(overdue.length){
    ovl='<div class="card" style="margin-bottom:12px">'
      +'<div class="card-hd"><div class="card-title" style="color:var(--danger)">&#9888; Overdue Follow-ups</div></div>'
      +'<table class="tbl"><thead><tr><th>Candidate</th><th>Facility</th><th>Who</th><th>Submitted</th><th>Days</th><th></th></tr></thead><tbody>'
      +overdue.map(function(s){
        var c=allC.find(function(x){return x.id===s.cid;});
        var u=c?uById(c.consultantId):null;
        var d=Math.abs(ddiff(s.submittedDate)||0);
        var si=c?c.submissions.findIndex(function(x){return x.id===s.id;}):-1;
        return '<tr onclick="openPanel('+s.cid+',&apos;Submissions&apos;)" style="cursor:pointer">'
          +'<td class="cp">'+esc(s.cn)+'</td>'
          +'<td style="font-size:11px">'+esc(s.facility)+'</td>'
          +'<td><span style="background:'+(u?u.color:"#888")+';color:#fff;font-size:10px;padding:2px 6px;border-radius:3px">'+(u?u.initials:"?")+'</span></td>'
          +'<td style="font-size:10px;color:var(--t3)">'+fmt(s.submittedDate)+'</td>'
          +'<td style="font-weight:700;color:'+(d>=2?"var(--danger)":"#d4900a")+'">'+d+'d</td>'
          +'<td><button class="btn btn-g btn-xs" onclick="event.stopPropagation();markFU('+s.cid+','+si+')">Done</button></td>'
          +'</tr>';
      }).join("")
      +'</tbody></table></div>';
  }
  var stl="";
  if(stale.length){
    stl='<div class="card">'
      +'<div class="card-hd"><div class="card-title" style="color:var(--danger)">&#128683; Stale Submissions (7d+)</div></div>'
      +'<table class="tbl"><thead><tr><th>Candidate</th><th>Facility</th><th>Status</th><th>Who</th><th>Days</th></tr></thead><tbody>'
      +stale.map(function(s){
        var c=allC.find(function(x){return x.id===s.cid;});
        var u=c?uById(c.consultantId):null;
        var d=Math.abs(ddiff(s.submittedDate)||0);
        return '<tr onclick="openPanel('+s.cid+',&apos;Submissions&apos;)" style="cursor:pointer">'
          +'<td class="cp">'+esc(s.cn)+'</td>'
          +'<td style="font-size:11px">'+esc(s.facility)+'</td>'
          +'<td><span class="badge '+bClass(s.status)+'">'+s.status+'</span></td>'
          +'<td><span style="background:'+(u?u.color:"#888")+';color:#fff;font-size:10px;padding:2px 6px;border-radius:3px">'+(u?u.initials:"?")+'</span></td>'
          +'<td style="font-weight:700;color:var(--danger)">'+d+'d</td>'
          +'</tr>';
      }).join("")
      +'</tbody></table></div>';
  }
  document.getElementById("page").innerHTML=topRow+tbl+ovl+stl;
};

function cpAutoCreateCompliance(cid){
  var c=candidates.find(function(x){return x.id===cid;});if(!c)return;
  showToast('Creating standard checklist...');
  var rows=CP_STD.map(function(it){
    return{candidate_id:cid,key:it.key,item_label:it.label,category:it.category,status:'Not Started',checked:false,is_required:true};
  });
  _sb.from('compliance_items').insert(rows).select().then(function(res){
    if(res.error){showToast('Error: '+res.error.message,'err');return;}
    var items={};
    (res.data||[]).forEach(function(row){
      items[row.key]={id:row.id,checked:false,expiry:'',docName:'',docUrl:'',docAddedBy:'',docAddedAt:'',lastEditedBy:'',lastEditedAt:'',
        category:row.category||'Other',itemLabel:row.item_label||row.key,status:'Not Started',verifiedBy:'',verifiedAt:'',isRequired:true,documentUrl:'',documentId:null};
    });
    c.compliance={items:items};

}

function cpUpdateComplianceStatus(cid,key,status){
  var c=candidates.find(function(x){return x.id===cid;});if(!c||!c.compliance||!c.compliance.items[key])return;
  var item=c.compliance.items[key];
  var checked=status==='Verified'||status==='Received';
  item.status=status;item.checked=checked;
  if(item.id){
    _sb.from('compliance_items').update({status:status,checked:checked,last_edited_by:CU.name,last_edited_at:new Date().toISOString()}).eq('id',item.id).then(function(res){
      if(res.error)showToast('Update error','err');else showToast('Status updated');
      renderCandPage();
    });
  } else {renderCandPage();}
}

function renderCpCompliance(c){
  var items=c.compliance&&c.compliance.items||{};
  var keys=Object.keys(items);
  if(!keys.length){
    return'<div style="text-align:center;padding:20px 0">'
      +'<div style="font-size:28px;margin-bottom:8px">&#128203;</div>'
      +'<div style="color:var(--t2);font-size:12px;margin-bottom:12px">No compliance checklist recorded.</div>'
      +'<button class="btn btn-p" onclick="cpAutoCreateCompliance('+c.id+')">Create Standard Checklist (13 items)</button>'
      +'</div>';
  }
  var total=keys.length;
  var done=keys.filter(function(k){var it=items[k];return it.checked||it.status==='Verified'||it.status==='Received';}).length;
  var pct=total?Math.round(done/total*100):0;
  var h='<div style="margin-bottom:12px;display:flex;align-items:center;gap:10px">'
    +'<div style="flex:1"><div class="prog-t" style="width:100%;height:6px"><div class="prog-f" style="width:'+pct+'%;background:'+scColor(pct)+'"></div></div></div>'
    +'<span style="font-size:13px;font-weight:700;color:'+scColor(pct)+'">'+pct+'%</span>'
    +'<span style="font-size:10px;color:var(--t3)">'+done+'/'+total+' items</span>'
    +'</div>';
  var stCfg={'Not Started':'b-gy','Requested':'b-am','Received':'b-bl','Expired':'b-rd','Verified':'b-ok','Waived':'b-tl'};
  var cats={};
  CP_STD.forEach(function(std){
    if(!items[std.key])return;
    var cat=items[std.key].category||std.category;
    if(!cats[cat])cats[cat]=[];
    cats[cat].push({key:std.key,label:items[std.key].itemLabel||std.label,item:items[std.key]});
  });
  keys.forEach(function(k){
    if(!CP_STD.find(function(s){return s.key===k;})){
      var it=items[k];var cat=it.category||'Other';
      if(!cats[cat])cats[cat]=[];
      cats[cat].push({key:k,label:it.itemLabel||k,item:it});
    }
  });
  Object.keys(cats).forEach(function(cat){
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin:12px 0 5px">'+cat+'</div>';
    cats[cat].forEach(function(entry){
      var it=entry.item;
      var st=it.status||'Not Started';
      var cls=stCfg[st]||'b-gy';
      var expWarn=it.expiry&&ddiff(it.expiry)!==null&&ddiff(it.expiry)<60;
      h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">'
        +'<div style="flex:1;font-size:11px">'+esc(entry.label)
        +(it.expiry?'<span style="font-size:9px;color:'+(expWarn?'var(--warn)':'var(--t3)')+';margin-left:6px">exp '+fmt(it.expiry)+(expWarn?' ⚠':'')+'</span>':'')
        +(it.docUrl?'<a href="'+esc(it.docUrl)+'" target="_blank" style="font-size:9px;color:var(--accent);margin-left:6px">doc &#8599;</a>':'')
        +'</div>'
        +'<select onchange="cpUpdateComplianceStatus('+c.id+',&apos;'+entry.key+'&apos;,this.value)" onclick="event.stopPropagation()" style="font-size:10px;padding:2px 4px;border:1px solid var(--border);border-radius:5px;background:var(--surface)">'
        +Object.keys(stCfg).map(function(s){return'<option'+(st===s?' selected':'')+'>'+s+'</option>';}).join('')
        +'</select>'
        +'<span class="badge '+cls+'" style="font-size:9px;white-space:nowrap">'+esc(st)+'</span>'
        +'</div>';
    });
  });
  return h;
}

function renderCpContracts(c){
  var conts=c.contracts||[];
  if(!conts.length)return'<div style="text-align:center;padding:20px 0;color:var(--t3);font-size:12px">No contracts recorded.</div>';
  var h='';
  conts.slice().reverse().forEach(function(k){
    var d=k.endDate?ddiff(k.endDate):null;
    var active=k.status==='Active';

    var col=active?'var(--ok)':k.status==='Completed'?'var(--t3)':'var(--warn)';
    var totalW=k.startDate&&k.endDate?Math.max(1,Math.round((new Date(k.endDate)-new Date(k.startDate))/(7*86400000))):0;
    var elapsed=active&&k.startDate&&totalW?Math.min(100,Math.round((Date.now()-new Date(k.startDate).getTime())/(7*86400000*totalW)*100)):0;
    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;padding:12px 14px;border-left:3px solid '+col+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
      +'<div><div style="font-size:13px;font-weight:600">'+esc(k.facility)+'</div>'
      +'<div style="font-size:11px;color:var(--t3)">'+esc(k.ward)+'</div>'
      +'<div style="font-size:11px;color:var(--t2);margin-top:3px">'+(k.startDate?fmt(k.startDate):'?')+' → '+(k.endDate?fmt(k.endDate):'?')+(totalW?'  <span style="color:var(--t3);font-size:10px">'+totalW+' wks</span>':'')+'</div>'
      +(k.rate?'<div style="font-size:12px;font-weight:700;color:var(--ok);margin-top:3px">$'+esc(k.rate)+'/hr</div>':'')
      +(ending?'<div style="font-size:10px;color:var(--warn);font-weight:700;margin-top:3px">&#9888; Ends in '+d+' days</div>':'')
      +(k.notes?'<div style="font-size:10px;color:var(--t3);margin-top:4px">'+esc(k.notes)+'</div>':'')
      +'</div>'
      +'<span style="font-size:9px;padding:2px 7px;border-radius:9px;background:'+col+'18;color:'+col+';border:1px solid '+col+'44;font-weight:600;flex-shrink:0">'+esc(k.status||'Active')+'</span>'

function matchCandidateToRole(c,role){
  var fac=facilities.find(function(f){return f.id===role.facilityId;});
  var facState=(fac?fac.state:'').toLowerCase();
  var roleWard=(role.ward||'').toLowerCase();
  var candClass=(c.classification||'').toLowerCase();
  var candSkills=(c.clinicalSkills||[]).map(function(s){return s.toLowerCase();});
  var specMatch=candClass.indexOf(roleWard)>=0||roleWard.indexOf(candClass)>=0||
    candSkills.some(function(s){return s.indexOf(roleWard)>=0||roleWard.indexOf(s)>=0;});
  if(!specMatch)return null;
  var candLocs=(c.regions||[]).concat(c.travelLocations||[]).map(function(r){return r.toLowerCase();});
  var stateMatch=!facState||!candLocs.length||
    candLocs.some(function(r){return r.indexOf(facState)>=0||facState.indexOf(r.split(/\s/)[0])>=0;});
  var availMatch=!role.startDate||!c.availableFrom||c.availableFrom<=role.startDate;
  if(specMatch&&stateMatch&&availMatch)return'Strong';
  return'Possible';
}

  return'<div style="display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--border)">'

function openSubmitPackage(candId,roleId){
  var c=candidates.find(function(x){return x.id===candId;});
  var role=roles.find(function(r){return r.id===roleId;});
  if(!c||!role)return;
  var fac=facilities.find(function(f){return f.id===role.facilityId;});
  var sep='─'.repeat(38);
  var lines=['CANDIDATE SUBMISSION',sep,'',
    'Candidate:      '+c.name,
    'Classification: '+c.classification,
    'Specialties:    '+((c.clinicalSkills||[]).join(', ')||'—'),
    'Available from: '+(c.availableFrom?fmt(c.availableFrom):'TBC'),
    'Home state:     '+(c.state||'—'),
    'Preferred:      '+((c.regions&&c.regions.length)?c.regions.join(', '):'Flexible'),
    '','SUBMITTING FOR:',
    'Facility:       '+(fac?fac.name:'—')+(fac?' ('+fac.state+')':''),
    'Ward:           '+role.ward,
    'Nurse type:     '+role.nurseType,
    'Dates:          '+(role.startDate?fmt(role.startDate):'TBC')+(role.endDate?' – '+fmt(role.endDate):''),
    '','COMPLIANCE DOCUMENTS:'];
  var compItems=Object.keys((c.compliance&&c.compliance.items)||{});
  var hasDocs=false;
  compItems.forEach(function(key){var item=c.compliance.items[key];if(item.checked||item.docUrl){hasDocs=true;lines.push('• '+key.replace(/_/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase();})+(item.docUrl?' — '+item.docUrl:'  ✓'));}});
  (c.documents||[]).forEach(function(d){hasDocs=true;lines.push('• '+d.fileName+' — '+d.fileUrl);});
  if(!hasDocs)lines.push('  (no documents uploaded yet)');

  document.getElementById('m-ttl').textContent='Submission Package — '+c.name;
  document.getElementById('m-info').innerHTML='<div style="padding:10px 18px 0;font-size:11px;color:var(--t3)">Review and copy this package to send to the facility.</div>';

  document.getElementById('m-foot').innerHTML='<span></span><div style="display:flex;gap:7px"><button class="btn btn-g btn-sm" onclick="closeModal()">Close</button><button class="btn btn-p btn-sm" onclick="var t=document.getElementById(\'sub-pkg\');navigator.clipboard&&navigator.clipboard.writeText(t.value).then(function(){showToast(\'Copied to clipboard\');}).catch(function(){t.select();document.execCommand(\'copy\');showToast(\'Copied\');})">&#128203; Copy to Clipboard</button></div>';
  document.getElementById('mo').style.display='flex';
