function renderContracts(){
  var all=vc().reduce(function(a,c){return a.concat(c.contracts.map(function(k){return Object.assign({},k,{cid:c.id,cn:c.name,cc:c.classification,cConsId:c.consultantId});}));}, []);
  document.getElementById("tb-h").textContent="Contracts";
  document.getElementById("tb-s").textContent=all.length+" contracts — "+all.filter(function(k){return k.status==="Active";}).length+" active";
  document.getElementById("tb-r").innerHTML='<button class="btn btn-p" onclick="qMod(&apos;Contracts&apos;)">Add contract</button> <button class="btn btn-g btn-sm" onclick="expAll(&apos;contracts&apos;)">'+I.dl+' Export</button>';

  // ── HERO (summary strip) — real aggregates from `all`; pipeline-value uses
  // the same rate*hours*(days-remaining/7) formula already used on the
  // Management Dashboard. No fabricated data.
  var activeContracts=all.filter(function(k){return k.status==="Active";});
  var expiringSoonCount=activeContracts.filter(function(k){var d=ddiff(k.endDate);return d!==null&&d>=0&&d<=21;}).length;
  var pipelineVal=activeContracts.reduce(function(sum,k){var r=parseFloat(k.rate)||0,h=parseFloat(k.hours)||0,d=ddiff(k.endDate);return d&&d>0?sum+r*h*(d/7):sum;},0);
  var fmtMon=function(n){return n>=1e6?"$"+(n/1e6).toFixed(1)+"M":n>=1e3?"$"+(n/1e3).toFixed(0)+"K":"$"+Math.round(n);};
  function heroStat(icon,label,val){return'<div style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 16px">'
    +'<div style="width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;margin-bottom:10px">'+ico(icon,16,'#fff')+'</div>'
    +'<div style="font-size:11px;font-weight:400;color:#CECBF6;margin-bottom:2px">'+label+'</div>'
    +'<div style="font-size:26px;font-weight:500;color:#fff;line-height:1">'+val+'</div>'
    +'</div>';}
  var heroHtml='<div style="position:relative;overflow:hidden;border-radius:20px;padding:26px 30px;margin-bottom:20px;background:var(--brand-grad);box-shadow:0 20px 40px -20px rgba(38,33,92,.55)">'
    +'<div style="position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);top:-90px;right:-40px;pointer-events:none"></div>'
    +'<div style="position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:14px">'
    +heroStat(I.case,'Total contracts',all.length)
    +heroStat(I.chk,'Active',activeContracts.length)
    +heroStat(I.warn,'Expiring soon',expiringSoonCount)
    +heroStat(I.sheet,'Pipeline value',fmtMon(pipelineVal))
    +'</div></div>';

  var cards=all.map(function(k){
    var d=ddiff(k.endDate);
    var isDanger=d!==null&&d<=14&&d>=0;
    var isWarn=d!==null&&d<=21&&d>14;
    var col=k.status==="Active"?(isDanger?"var(--danger)":isWarn?"var(--warn)":"var(--ok)"):"var(--t3)";
    var rateClean=cleanRate(k.rate);
    var totalW=k.startDate&&k.endDate?Math.max(1,Math.round((new Date(k.endDate)-new Date(k.startDate))/(7*86400000))):0;
    var elapsed=k.status==="Active"&&k.startDate&&totalW?Math.min(100,Math.max(0,Math.round((Date.now()-new Date(k.startDate).getTime())/(7*86400000*totalW)*100))):0;
    return'<div class="card clickable" style="margin-bottom:12px;padding:16px;border-left:3px solid '+col+'" onclick="openCandPage('+k.cid+')">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
      +'<div><div style="font-size:13px;font-weight:500">'+esc(k.cn)+'</div>'
      +'<div style="font-size:10px;color:var(--t3)">'+esc(k.cc)+(k.cConsId?" — "+((uById(k.cConsId)||{name:""}).name):"")+'</div>'
      +(isDanger?'<div style="font-size:10px;font-weight:500;color:var(--danger);margin-top:4px">Expires in '+d+' day'+(d===1?"":"s")+'</div>':isWarn?'<div style="font-size:10px;font-weight:500;color:var(--warn);margin-top:4px">Expires in '+d+' days</div>':"")
      +'</div>'
      +'<span class="badge '+bClass(k.status)+'">'+k.status+'</span>'
      +'<button class="btn btn-g btn-xs" style="margin-left:6px" onclick="event.stopPropagation();openContractEditModal('+k.id+')">Edit</button>'
      +'<button class="btn btn-g btn-xs" style="margin-left:6px" onclick="event.stopPropagation();openManagePlacement('+k.id+')">Manage placement</button>'
      +'</div>'
      +'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">'
      +'<span class="badge b-pu">'+esc(k.facility)+'</span>'
      +'<span class="badge b-tl">'+esc(k.ward)+'</span>'
      +(rateClean!==""?'<span class="badge b-gr">$'+rateClean+'/hr &middot; '+(k.hours||"?")+'h/wk</span>':"")
      +(k.healthRegion?'<span class="badge b-gr">'+esc(k.healthRegion)+'</span>':"")
      +'</div>'
      +(k.status==="Active"&&totalW?'<div style="margin-bottom:8px"><div class="prog-t" style="width:100%;height:4px"><div class="prog-f" style="width:'+elapsed+'%;background:linear-gradient(90deg,rgba(255,255,255,.5),rgba(255,255,255,0) 70%),'+col+'"></div></div></div>':"")
      +'<div style="display:flex;gap:14px;padding-top:8px;border-top:1px solid var(--border);flex-wrap:wrap">'
      +'<div><div style="font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)">Start</div><div style="font-size:11px;font-weight:500">'+fmt(k.startDate)+'</div></div>'
      +'<div><div style="font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)">End</div><div style="font-size:11px;font-weight:500;color:'+col+'">'+fmt(k.endDate)+'</div></div>'
      +(d!==null&&k.status==="Active"?'<div><div style="font-size:8px;font-weight:500;text-transform:uppercase;color:var(--t3)">Remaining</div><div style="font-size:11px;font-weight:500;color:'+col+'">'+(d===0?"Today":d<0?"Expired "+Math.abs(d)+"d ago":d+"d")+'</div></div>':"")
      +(k.notes?'<div style="flex:1"><div style="font-size:8px;font-weight:500;text-transform:uppercase;color:var(--t3)">Notes</div><div style="font-size:10px;color:var(--t2)">'+esc(k.notes.slice(0,80))+(k.notes.length>80?"...":"")+'</div></div>':"")
      +'</div></div>';
  }).join("");

  document.getElementById("page").innerHTML=heroHtml+(cards||'<div class="card"><div class="empty-st">No contracts</div></div>');
}

function renderFacilities(){
  facilities.forEach(function(f){
    f.activeContracts=candidates.reduce(function(a,c){return a+c.contracts.filter(function(k){return k.facilityId===f.id&&k.status==="Active";}).length;},0);
    var allSubs=candidates.reduce(function(a,c){return a.concat(c.submissions.filter(function(s){return s.facilityId===f.id;}));}, []);
    f.totalSubs=allSubs.length;
    f.contractedSubs=allSubs.filter(function(s){return s.status==="Accepted";}).length;
    f.convRate=allSubs.length>0?Math.round(f.contractedSubs/allSubs.length*100):null;
  });

  var states=["All"].concat(Array.from(new Set(facilities.map(function(f){return f.state;}))).sort());
  var types=["All"].concat(Array.from(new Set(facilities.map(function(f){return f.type;}))).sort());

// KEYBOARD
document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();openSearch("");return;}
  if(e.key==="/"){
    var tag=(document.activeElement||{}).tagName||'';
    var editable=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||(document.activeElement&&document.activeElement.isContentEditable);
    if(!editable){e.preventDefault();openSearch("");return;}
  }
  if(e.key==="Escape"){
    if(document.getElementById('confirm-ov').style.display==='flex'){cancelConfirm();return;}
    if(document.getElementById('mo').style.display==='flex'){closeModal();return;}
    if(document.getElementById('sf-ov').style.display==='flex'){if(!sfSentConfirmed)closeSF();return;}
    if(document.getElementById('sr-ov').style.display==='flex'){closeSearch();return;}
    if(cpEditing){cancelCpEdit();return;}
    if(cpNAEditing){cpNAEditing=false;renderCandPage();return;}
    if(listNAEditId!==null){listNAEditId=null;renderCandidates();return;}
    if(facEditing){cancelFacEdit();return;}
  }
  if(e.key==="Tab"){
    var trapEl=_activeOverlayContainer();
    if(trapEl){
      var els=_focusableEls(trapEl);
      if(els.length){
        var idx=els.indexOf(document.activeElement);
        if(e.shiftKey){
          if(idx<=0){e.preventDefault();els[els.length-1].focus();}
        } else {
          if(idx===-1||idx===els.length-1){e.preventDefault();els[0].focus();}
        }
      }
    }
  }
});
document.getElementById("sr-inp").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    var top=document.querySelector("#sr-res .sr-item");
    if(top)top.click();
  }
});

// INIT

function buildChaseList(){
  var cands=vc(),actions=[];
  cands.forEach(function(c){
    c.submissions.forEach(function(s,i){
      if(s.status==="Submitted"&&!s.followUpDone){
        var d=ddiff(s.submittedDate);
        if(d!==null&&d<=-1)actions.push({
          priority:d<=-2?1:2,color:"var(--danger)",icon:I.phone,
          label:"Call "+s.facility+" re: "+esc(c.name),
          detail:(d<=-2?"URGENT "+Math.abs(d)+"d overdue":"Due today")+" — "+c.classification,
          cid:c.id,tab:"Submissions",action:"markFU("+c.id+","+i+")",actionLabel:"Done"
        });
      }
      if(s.interviewDate){
        var di=ddiff(s.interviewDate);
        if(di!==null&&di>=0&&di<=1)actions.push({
          priority:1,color:"#8a3800",icon:I.cal,
          label:"Interview "+(di===0?"TODAY":"tomorrow")+": "+esc(c.name),
          detail:s.facility+" — make sure they are prepped",
          cid:c.id,tab:"Submissions",action:null,actionLabel:null
        });
      }
    });
    c.contracts.forEach(function(k){
      var d=ddiff(k.endDate);
      if(d!==null&&d>=0&&d<=14&&k.status==="Active")
        actions.push({priority:d<=7?1:2,color:d<=7?"var(--danger)":"#d4900a",icon:I.doc,
          label:"Extension talk: "+esc(c.name),
          detail:"Contract at "+k.facility+" ends in "+d+"d — have the conversation now",
          cid:c.id,tab:"Contracts",action:null,actionLabel:null});
      var ds=ddiff(k.startDate);
      if(ds!==null&&ds>=0&&ds<=5&&["Signed","Active"].indexOf(k.status)>=0
          &&(!k.shiftConfirmed||!k.flightConfirmed||!k.accomConfirmed))
        actions.push({priority:1,color:"var(--danger)",icon:I.plane,
          label:"Confirm start: "+esc(c.name),
          detail:"Starting "+(ds===0?"TODAY":"in "+ds+"d")+" — travel/accom/shift not confirmed",
          cid:c.id,tab:"Contracts",action:null,actionLabel:null});
    });
    var ci=ciStatus(c);
    if(ci.stale&&["Compliance","Submission","Offer","Contract"].indexOf(c.phase)>=0)
      actions.push({priority:3,color:"var(--t3)",icon:I.person,
        label:"Check in: "+esc(c.name),
        detail:"No contact 14+ days — "+c.phase,
        cid:c.id,tab:"Activity",action:null,actionLabel:null});
  });
  actions.sort(function(a,b){return a.priority-b.priority;});
  return actions;
}

function renderMgmtDash(){
  document.getElementById("tb-h").textContent="Management Dashboard";
  document.getElementById("tb-s").textContent="Pipeline, follow-ups and conversions — all consultants";
  document.getElementById("tb-r").innerHTML="";
  var allC=candidates,cons=users.filter(function(u){return u.role==="consultant";});
  var OUTCOME=["Accepted","Withdrawn","Declined"];
  var allS=allC.reduce(function(a,c){return a.concat(c.submissions.map(function(s){return Object.assign({},s,{cid:c.id,cn:c.name,cConsId:c.consultantId});},[]));}, []);
  var total=allS.length;
  var withOut=allS.filter(function(s){return OUTCOME.includes(s.status);});
  var noOutN=total-withOut.length;
  var noOutPct=total>0?Math.round(noOutN/total*100):0;
  var overdue=allS.filter(function(s){var d=ddiff(s.submittedDate);return s.status==="Submitted"&&!s.followUpDone&&d!==null&&d<=-1;});
  var stale=allS.filter(function(s){var d=ddiff(s.submittedDate);return (s.status==="Promoting"||s.status==="Submitted")&&d!==null&&d<=-7;});
  var accepted=allS.filter(function(s){return s.status==="Accepted";});
  var convRate=withOut.length>0?Math.round(accepted.length/withOut.length*100):0;
  var placed=allC.filter(function(c){return c.phase==="On Assignment"||c.phase==="Extension/Exit";});
  var activeCon=allC.reduce(function(a,c){return a+c.contracts.filter(function(k){return k.status==="Active";}).length;},0);
  var inPipe=allS.filter(function(s){return s.status==="Submitted"||s.status==="Promoting";});
  var pipelineVal=allC.reduce(function(sum,c){return sum+c.contracts.reduce(function(t,k){
    if(k.status!=="Active")return t;
    var r=parseFloat(k.rate)||0,h=parseFloat(k.hours)||0,d=ddiff(k.endDate);
    return d&&d>0?t+r*h*(d/7):t;
  },0);},0);
  var fmtMon=function(n){return n>=1e6?"$"+(n/1e6).toFixed(1)+"M":n>=1e3?"$"+(n/1e3).toFixed(0)+"K":"$"+Math.round(n);};
  function sc(lbl,val,sub,col,urg){
    return '<div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid '+col+';border-radius:8px;padding:16px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:4px">'+lbl+'</div>'
      +'<div style="font-size:28px;font-weight:800;color:'+(urg?'var(--danger)':col)+';line-height:1">'+val+'</div>'
      +'<div style="font-size:11px;color:var(--t3);margin-top:4px">'+sub+'</div></div>';
  }
  var topRow='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">'

function cpAutoCreateCompliance(cid){
  var c=candidates.find(function(x){return x.id===cid;});if(!c)return;
  showToast('Creating standard checklist...');
  var rows=CP_STD.map(function(it){
    return{candidate_id:cid,item_key:it.key,item_label:it.label,category:it.category,status:'Not Started',checked:false,is_required:true};
  });
  sb.from('compliance_items').insert(rows).select().then(function(res){
    if(res.error){showToast('Error: '+res.error.message,'err');return;}
    var items={};
    (res.data||[]).forEach(function(row){
      items[row.item_key]={id:row.id,checked:false,expiry:'',docName:'',docUrl:'',docAddedBy:'',docAddedAt:'',lastEditedBy:'',lastEditedAt:'',
        category:row.category||'Other',itemLabel:row.item_label||row.item_key,status:'Not Started',verifiedBy:'',verifiedAt:'',isRequired:true,documentUrl:'',documentId:null};
    });
    c.compliance={items:items};
    showToast('Standard checklist created');
    renderCandPage();
  });
}

function cpUpdateComplianceStatus(cid,key,status){
  var c=candidates.find(function(x){return x.id===cid;});if(!c||!c.compliance||!c.compliance.items[key])return;
  var item=c.compliance.items[key];
  if(item.status===status)return;
  var checked=status==='Verified'||status==='Received';
  var prevStatus=item.status,prevChecked=item.checked;
  item.status=status;item.checked=checked;
  renderCandPage();
  if(item.id){
    sb.from('compliance_items').update({status:status,checked:checked,last_edited_by:CU.name,last_edited_at:new Date().toISOString()}).eq('id',item.id).then(function(res){
      if(res.error){item.status=prevStatus;item.checked=prevChecked;showToast('Update failed — reverted','err');renderCandPage();}
    });
    var msg=compLabel(key,item.itemLabel)+' marked '+status+' by '+CU.name;
    var ts=new Date().toISOString();
    sb.from('activity').insert({candidate_id:cid,type:'System',content:msg,author:CU.name,author_id:CU.id||null,ts:ts}).then(function(r){if(r.error)console.error('[DB] comp status activity',r.error);});
    if(!c.activity)c.activity=[];
    c.activity.push({type:'System',content:msg,author:CU.name,ts:ts,_synced:true});
  }
}

  var expInput=document.getElementById('cpdf-exp-'+key);
  var expiry=expInput?expInput.value:'';
  var modeFile=document.querySelector('input[name="cpdf-mode-'+key+'"][value="file"]');
  var isFile=modeFile&&modeFile.checked;
  var fileUrl='',fileName='';
  if(isFile){
    var fi=document.getElementById('cpdf-input-'+key);
    if(!fi||!fi.files[0]){showToast('Choose a file','err');return;}
    var file=fi.files[0];
    showToast('Uploading '+file.name+'...');
    var safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    var path='candidates/'+cid+'/'+safe;
    var up=await sb.storage.from('candidate-docs').upload(path,file,{upsert:true});
    if(up.error){showToast('Upload failed: '+up.error.message,'err');console.error(up.error);return;}
    fileUrl=sb.storage.from('candidate-docs').getPublicUrl(path).data.publicUrl;
    fileName=file.name;
  } else {
    var ui=document.getElementById('cpdf-url-val-'+key);
    if(!ui||!ui.value.trim()){showToast('Enter a URL','err');return;}
    fileUrl=ui.value.trim();
    fileName=fileUrl.split('/').pop().split('?')[0]||'Document';
    path=null;
  }
  var docRow={candidate_id:cid,compliance_item_id:it.id||null,file_name:fileName,file_url:fileUrl,file_path:path||null,uploaded_by:CU.name,category:'Compliance',created_at:new Date().toISOString()};
  if(expiry)docRow.expires_at=expiry;
  var ins=await sb.from('documents').insert(docRow).select('id').single();
  if(ins.error){showToast('Failed to save document: '+ins.error.message,'err');console.error(ins.error);return;}
  var compUpdate={document_id:ins.data.id,document_url:fileUrl};
  if(expiry)compUpdate.expiry=expiry;
  var upd=await sb.from('compliance_items').update(compUpdate).eq('id',it.id);
  if(upd.error){showToast('Linked to doc table but failed to update item: '+upd.error.message,'err');console.error(upd.error);}
  it.documentId=ins.data.id;it.documentUrl=fileUrl;it.docName=fileName;
  if(expiry)it.expiry=expiry;
  if(!c.documents)c.documents=[];
  c.documents.unshift({id:ins.data.id,fileName:fileName,filePath:path||null,fileUrl:fileUrl,uploadedBy:CU.name,uploadedAt:new Date().toISOString(),category:'Compliance',complianceItemId:it.id});
  showToast('Document attached');
  renderCandPage();setTimeout(function(){cpScrollTo('compliance');setTimeout(function(){flashElement('cpcomp-'+key);},80);},150);
}

async function cpUnlinkComplianceDoc(cid,key){
  var c=candidates.find(function(x){return x.id===cid;});if(!c)return;
  var it=c.compliance.items[key];if(!it||!it.id)return;
  var r=await sb.from('compliance_items').update({document_id:null,document_url:null}).eq('id',it.id);
  if(r.error){showToast('Failed to unlink: '+r.error.message,'err');console.error(r.error);return;}
  it.documentId=null;it.documentUrl='';it.docName='';
  showToast('Document unlinked');
  renderCandPage();setTimeout(function(){cpScrollTo('compliance');},150);
}

var CONTRACT_STATUSES=['Draft','Signed','Active','Expiring','Completed','Cancelled'];
function cleanRate(r){var n=parseFloat(r);return isNaN(n)?'':n;}
function cpUpdateContractStatus(cid,kid,status){
  var c=candidates.find(function(x){return x.id===cid;});if(!c)return;
  var k=(c.contracts||[]).find(function(x){return x.id===kid;});if(!k)return;
  if(k.status===status)return;
  var prev=k.status;
  k.status=status;
  renderCandPage();
  sb.from('contracts').update({status:status,last_edited_by:CU.name,last_edited_at:new Date().toISOString()}).eq('id',kid).then(function(r){
    if(r.error){k.status=prev;showToast('Update failed — reverted: '+r.error.message,'err');renderCandPage();return;}
    var msg='Contract status updated to '+status+' — '+(k.facility||'facility');
    var ts=new Date().toISOString();
    if(!c.activity)c.activity=[];
    c.activity.push({type:'System',content:msg,author:CU.name,ts:ts,_synced:false});
    sb.from('activity').insert({candidate_id:cid,entity_type:'candidate',entity_id:cid,author_id:CU.id||null,type:'System',content:msg,author:CU.name,ts:ts}).then(function(r2){if(r2.error)console.error('[DB] contract status activity',r2.error);});
    // CONTRACT-EDIT-BRIEF Stage 4: status stays owned by this dropdown (not
    // moved into the edit form), but now logs to the same contract_audit
    // table and insert pattern as saveContractEdit() — one row, id never sent.
    sb.from('contract_audit').insert({contract_id:kid,field_name:'status',
      old_value:auditVal(prev),new_value:auditVal(status),
      changed_by:CU.name,changed_at:ts}).then(function(r3){if(r3.error)console.error('[DB] contract status audit',r3.error);});
  });
}
function renderCpContracts(c){

      +'</select>'
      +'</div>'
      +'</div>'
      +(active&&totalW?'<div style="margin-top:8px"><div class="prog-t" style="width:100%;height:4px"><div class="prog-f" style="width:'+elapsed+'%;background:'+col+'"></div></div><div style="font-size:9px;color:var(--t3);margin-top:4px">'+elapsed+'% through</div></div>':'')
      +'</div>';
  });
  return h;

  }
  return h;

// ── GENERAL FILES COMPONENT (candidate + facility) ────────────────────────────
var FILE_CATS=['CV','Contract','Rates/Competitor','Reference','Photo','Other'];
var filesUI={};
function filesUIState(key){if(!filesUI[key])filesUI[key]={filter:'All',sortCol:'date',sortDir:'desc',pending:[],showSuperseded:false,editingId:null,dragOver:false};return filesUI[key];}
function filesEntity(type,id){return type==='candidate'?candidates.find(function(x){return x.id===id;}):facilities.find(function(x){return x.id===id;});}
function filesRerenderPage(type){if(type==='candidate')renderCandPage();else renderFacPage();}
function filesBucketPrefix(type){return type==='candidate'?'candidates':'facilities';}
function filesDbCol(type){return type==='candidate'?'candidate_id':'facility_id';}
function fileCatClass(cat){return {CV:'b-bl',Contract:'b-pu','Rates/Competitor':'b-am',Reference:'b-tl',Photo:'b-gn',Other:'b-gr'}[cat]||'b-gr';}
function guessFileCategory(name){
  var n=(name||'').toLowerCase();
  if(/\.(jpe?g|png|gif|heic|webp)$/.test(n))return 'Photo';
  var tokens=n.split(/[^a-z0-9]+/).filter(Boolean);
  if(tokens.indexOf('cv')>=0||tokens.indexOf('resume')>=0)return 'CV';
  if(tokens.indexOf('contract')>=0)return 'Contract';
  if(tokens.indexOf('rate')>=0||tokens.indexOf('rates')>=0||tokens.indexOf('competitor')>=0)return 'Rates/Competitor';
  if(tokens.indexOf('ref')>=0||tokens.indexOf('reference')>=0||tokens.indexOf('references')>=0)return 'Reference';
  return 'Other';
}
async function uploadGeneralFile(type,id,file){
  var safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  var path=filesBucketPrefix(type)+'/'+id+'/general/'+Date.now()+'_'+safe;
  var r=await sb.storage.from('documents').upload(path,file);
  if(r.error)throw new Error(r.error.message);
  return {url:sb.storage.from('documents').getPublicUrl(path).data.publicUrl,path:path};
}
function filesSortDocs(docs,col,dir){
  return docs.slice().sort(function(a,b){
    var av,bv;
    if(col==='name'){av=(a.fileName||'').toLowerCase();bv=(b.fileName||'').toLowerCase();}
    else if(col==='category'){av=a.category||'';bv=b.category||'';}
    else if(col==='size'){av=a.fileSize||0;bv=b.fileSize||0;}
    else if(col==='uploadedBy'){av=(a.uploadedBy||'').toLowerCase();bv=(b.uploadedBy||'').toLowerCase();}
    else {av=a.uploadedAt||'';bv=b.uploadedAt||'';}
    if(av<bv)return dir==='asc'?-1:1;
    if(av>bv)return dir==='asc'?1:-1;
    return 0;
  });
}
function filesSetFilter(type,id,cat){filesUIState(type+':'+id).filter=cat;filesRerenderPage(type);}
function filesSetSort(type,id,col){
  var st=filesUIState(type+':'+id);
  if(st.sortCol===col)st.sortDir=st.sortDir==='asc'?'desc':'asc';
  else{st.sortCol=col;st.sortDir=col==='date'?'desc':'asc';}
  filesRerenderPage(type);
}
function filesToggleSuperseded(type,id){var st=filesUIState(type+':'+id);st.showSuperseded=!st.showSuperseded;filesRerenderPage(type);}
function filesOnDragOver(type,id){filesUIState(type+':'+id).dragOver=true;filesRerenderPage(type);}
function filesOnDragLeave(type,id){filesUIState(type+':'+id).dragOver=false;filesRerenderPage(type);}
function filesOnDrop(type,id,ev){filesUIState(type+':'+id).dragOver=false;filesAddPending(type,id,ev.dataTransfer&&ev.dataTransfer.files);}
function filesOnPick(type,id,input){filesAddPending(type,id,input.files);input.value='';}
function filesAddPending(type,id,fileList){
  if(!fileList||!fileList.length)return;
  var st=filesUIState(type+':'+id);
  Array.from(fileList).forEach(function(file){st.pending.push({file:file,category:guessFileCategory(file.name),description:'',status:'pending'});});
  filesRerenderPage(type);
}
function filesRemovePending(type,id,idx){filesUIState(type+':'+id).pending.splice(idx,1);filesRerenderPage(type);}
function filesSetPendingCat(type,id,idx,val){filesUIState(type+':'+id).pending[idx].category=val;}
function filesSetPendingDesc(type,id,idx,val){filesUIState(type+':'+id).pending[idx].description=val;}

function logFileActivity(type,id,msg){
  var ts=new Date().toISOString();
  if(type==='candidate'){
    sb.from('activity').insert({candidate_id:id,entity_type:'candidate',entity_id:id,type:'System',content:msg,author:CU.name,author_id:CU.id||null,ts:ts}).then(function(r){if(r.error)console.error('[DB] file activity',r.error);});
    var c=candidates.find(function(x){return x.id===id;});
    if(c){if(!c.activity)c.activity=[];c.activity.push({type:'System',content:msg,author:CU.name,ts:ts,_synced:true});}
  } else {
    sb.from('activity').insert({entity_type:'facility',entity_id:id,type:'System',content:msg,author:CU.name,author_id:CU.id||null,ts:ts}).then(function(r){if(r.error)console.error('[DB] file activity',r.error);});
    if(!facActivityCache[id])facActivityCache[id]=[];
    facActivityCache[id].unshift({type:'System',content:msg,author:CU.name,ts:ts,entity_type:'facility',entity_id:id});
  }
}

async function filesUploadAll(type,id){
  var st=filesUIState(type+':'+id);
  var ent=filesEntity(type,id);
  if(!ent)return;
  var dbCol=filesDbCol(type);
  for(var i=0;i<st.pending.length;i++){
    var p=st.pending[i];
    if(p.status==='done')continue;
    p.status='uploading';filesRerenderPage(type);
    try{
      var result=await uploadGeneralFile(type,id,p.file);
      var row={file_name:p.file.name,file_path:result.path,file_url:result.url,
        file_size:p.file.size,file_type:p.file.type||'',category:p.category||'Other',
        description:p.description||null,uploaded_by:CU.name,is_current:true};
      row[dbCol]=id;
      var ins=await sb.from('documents').insert(row).select('id,uploaded_at').single();
      if(ins.error)throw ins.error;
      var doc={id:ins.data.id,fileName:row.file_name,filePath:row.file_path,fileUrl:row.file_url,
        fileSize:row.file_size,fileType:row.file_type,category:row.category,
        description:row.description||'',uploadedBy:row.uploaded_by,
        uploadedAt:ins.data.uploaded_at||new Date().toISOString(),isCurrent:true,complianceItemId:null};
      if(!ent.documents)ent.documents=[];
      ent.documents.unshift(doc);
      logFileActivity(type,id,'Uploaded '+p.file.name+' ('+doc.category+')');
      p.status='done';
    }catch(e){p.status='error';showToast('Upload failed: '+e.message,'err');console.error('[filesUploadAll]',e);}
    filesRerenderPage(type);
  }
  setTimeout(function(){st.pending=st.pending.filter(function(p){return p.status!=='done';});filesRerenderPage(type);},900);
}

function filesEditCat(type,id,docId,val){
  var ent=filesEntity(type,id);if(!ent)return;
  var d=(ent.documents||[]).find(function(x){return x.id===docId;});if(!d)return;
  var prev=d.category;d.category=val;filesRerenderPage(type);
  sb.from('documents').update({category:val}).eq('id',docId).then(function(r){
    if(r.error){d.category=prev;showToast('Update failed','err');filesRerenderPage(type);}
  });
}
function filesToggleEditRow(type,id,docId){
  var st=filesUIState(type+':'+id);
  st.editingId=st.editingId===docId?null:docId;
  filesRerenderPage(type);
  if(st.editingId)setTimeout(function(){var el=document.getElementById('files-desc-'+docId);if(el)el.focus();},60);
}
function filesSaveDesc(type,id,docId){
  var ent=filesEntity(type,id);if(!ent)return;
  var d=(ent.documents||[]).find(function(x){return x.id===docId;});if(!d)return;
  var input=document.getElementById('files-desc-'+docId);
  var val=input?input.value.trim():'';
  d.description=val;
  filesUIState(type+':'+id).editingId=null;
  filesRerenderPage(type);
  sb.from('documents').update({description:val||null}).eq('id',docId).then(function(r){if(r.error)showToast('Save failed','err');});
}
function filesSupersede(type,id,docId){
  var ent=filesEntity(type,id);if(!ent)return;
  var d=(ent.documents||[]).find(function(x){return x.id===docId;});if(!d)return;
  d.isCurrent=false;filesRerenderPage(type);
  sb.from('documents').update({is_current:false}).eq('id',docId).then(function(r){
    if(r.error){d.isCurrent=true;showToast('Update failed','err');filesRerenderPage(type);}else showToast('Marked superseded');
  });
}
function filesDelete(type,id,docId,filePath,fileName){
  showConfirm({title:'Delete "'+fileName+'"?',message:'This cannot be undone.',confirmLabel:'Delete'},function(){
    var ent=filesEntity(type,id);if(!ent)return;
    (async function(){
      try{
        if(filePath)await sb.storage.from('documents').remove([filePath]);
        var r=await sb.from('documents').delete().eq('id',docId);
        if(r.error)throw r.error;
        ent.documents=(ent.documents||[]).filter(function(d){return d.id!==docId;});
        logFileActivity(type,id,'Deleted file '+fileName);
        showToast('Document deleted');
        filesRerenderPage(type);
      }catch(e){showToast('Delete failed: '+e.message,'err');console.error('[filesDelete]',e);}
    })();
  });
}

function buildReadinessPanel(c){
  var reqItems=getCmpItems(c).filter(function(i){return i.req;});
  var total=reqItems.length;
  var done=reqItems.filter(function(x){return compItemDone(c.compliance.items[x.key]);}).length;
  var pct=total?Math.round(done/total*100):0;
  var regions=c.regions&&c.regions.length?c.regions:['General'];
  return regions.map(function(state){
    var col=pct>=100?'var(--ok)':pct>=60?'#d97706':'var(--danger)';
    var dot='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0"></span>';
    return '<div style="display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border)">'
      +dot
      +'<span style="font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(state)+'</span>'
      +'<span style="font-size:10px;font-weight:700;color:'+col+'">'+done+'/'+total+'</span>'
      +'</div>';
  }).join('');
}

function buildMatchedRoles(c){
  var open=roles.filter(function(r){return r.status==='Open'||r.status==='Likely';});
  if(!open.length)return '<div class="empty-st" style="padding:12px 0;margin-top:4px">No open roles yet. Add roles via the Job Board.</div>';
  var matched=open.map(function(r){return{r:r,mo:matchScore(c,r)};}).filter(function(x){return x.mo.score>0;});
  if(!matched.length)return '<div class="empty-st" style="padding:12px 0;margin-top:4px">No matching roles found for this candidate\'s nurse type and skills.</div>';
  matched.sort(function(a,b){return b.mo.score-a.mo.score;});
  return matched.map(function(m){
    var r=m.r,mo=m.mo,fac=facilities.find(function(f){return f.id===r.facilityId;})||{};
    var facName=esc(fac.name||'Unknown Facility');
    var state=fac.state?'<span style="color:var(--t3)">&nbsp;&middot;&nbsp;'+esc(fac.state)+'</span>':'';
    var dates=r.startDate?(fmt(r.startDate)+(r.endDate?' &rarr; '+fmt(r.endDate):'')):'Dates TBC';
    var pos=r.positionsAvailable||1;
    var key='bm_'+c.id+'_'+r.id;
    var col=mo.score>=70?'var(--ok)':mo.score>=40?'#d97706':'var(--t3)';
    var breakdown=_scoreOpen[key]?scoreBreakdownHtml(mo):'';
    return '<div class="row-hover" style="padding:8px 12px;border:1px solid var(--border);border-radius:7px;margin-bottom:8px;border-left:3px solid '+col+'" onclick="selectedRoleId='+r.id+';nav(&apos;jobboard&apos;)">'
      +'<div style="display:flex;align-items:center;gap:12px">'
      +scoreRingHtml(mo.score,26,key)
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-weight:600;font-size:12px">'+facName+state+'</div>'
      +'<div style="font-size:11px;color:var(--t3);margin-top:4px">'+esc(r.ward||'Ward TBC')+' &middot; '+esc(r.nurseType)+' &middot; '+dates+' &middot; '+pos+' position'+(pos!==1?'s':'')+'</div>'
      +'</div>'
      +'<button class="btn btn-p btn-sm" style="font-size:10px;padding:4px 12px;flex-shrink:0" onclick="event.stopPropagation();openSubFlow('+c.id+','+r.id+')">Submit</button>'
      +'</div>'+breakdown
      +'</div>';
  }).join('');
}

function openFacPage(id){
  curFacId=id;facEditing=null;facEditData=null;
  facOpen={overview:true,roles:false,submissions:false,contracts:false,checklist:false,compliance:true,contacts:false,documents:false,activity:false};
  nav('facilityprofile');
  var f0=facilities.find(function(x){return x.id===id;});if(f0)pushRecent('facility',id,f0.name,f0.state);
  if(sb&&!facActivityCache[id]){
    sb.from('activity').select('*').eq('entity_type','facility').eq('entity_id',id).order('ts',{ascending:false}).then(function(r){
      if(!r.error){facActivityCache[id]=(r.data||[]);if(curFacId===id)renderFacPage();}
    });
  }
  if(sb&&!facFilesLoaded[id]){
    facFilesLoaded[id]=true;
    sb.from('documents').select('*').eq('facility_id',id).then(function(r){
      if(!r.error){
        var f=facilities.find(function(x){return x.id===id;});
        if(f)f.documents=(r.data||[]).map(mapDocRow);
        if(curFacId===id)renderFacPage();
      }
    });
  }
}

function facScrollTo(id){facOpen[id]=true;renderFacPage();setTimeout(function(){var el=document.getElementById('fps-'+id);if(el)el.scrollIntoView({behavior:'smooth'});},60);}
function facNavA(id,label){return '<a class="cp-nav-a" onclick="event.preventDefault();facScrollTo(\''+id+'\')">'+label+'</a>';}
function facToggle(id){facOpen[id]=!facOpen[id];renderFacPage();}

function startFacEdit(id){
  var f=facilities.find(function(x){return x.id===curFacId;});
  if(!f)return;
  facEditing=id;facEditData=JSON.parse(JSON.stringify(f));
  facOpen[id]=true;renderFacPage();
}
function cancelFacEdit(){facEditing=null;facEditData=null;renderFacPage();}

function saveFacSection(id){
  if(!facEditData)return;
  var f=facilities.find(function(x){return x.id===curFacId;});
  if(!f)return;
  Object.assign(f,facEditData);
  f.lastEditedBy=CU.name;f.lastEditedAt=new Date().toISOString();
  facEditing=null;facEditData=null;
  var upd={last_edited_by:f.lastEditedBy,last_edited_at:f.lastEditedAt};
  if(id==='overview'){upd.notes=f.notes||null;upd.notes_candidate=f.notesCandidate||null;}
  if(sb){sb.from('facilities').update(upd).eq('id',curFacId).then(function(r){if(r.error){showToast('Save error','err');console.error(r.error);}else showToast('Saved');});}
  renderFacPage();
}

function facSec(id,title,body,actHtml,badge){
  var isOpen=facOpen[id]!==false;
  var isEd=facEditing===id;
  var hActs=actHtml!==undefined?actHtml:(isEd
    ?'<button class="btn btn-p btn-sm" onclick="event.stopPropagation();saveFacSection(\''+id+'\')" style="font-size:10px;padding:3px 9px">Save</button>'
     +'<button class="btn btn-g btn-sm" onclick="event.stopPropagation();cancelFacEdit()" style="font-size:10px;padding:3px 9px">Cancel</button>'
    :'<button class="btn btn-g btn-sm" onclick="event.stopPropagation();startFacEdit(\''+id+'\')" style="font-size:10px;padding:3px 9px">Edit</button>');
  return '<div class="cp-sec'+(isOpen?'':' cp-closed')+'" id="fps-'+id+'">'
    +'<div class="cp-sec-hdr" onclick="facToggle(\''+id+'\')">'
    +'<span class="cp-sec-title">'+title+(badge?' <span style="font-size:10px;font-weight:400;color:var(--t3);margin-left:4px">'+badge+'</span>':'')+'</span>'
    +'<div class="cp-sec-acts">'+hActs+'<span class="cp-arr">&#9660;</span></div>'
    +'</div>'
    +'<div class="cp-sec-body">'+body+'</div>'
    +'</div>';
}

function addFacActivity(facId){
  var txt=(document.getElementById('fac-act-txt')||{}).value||'';
  if(!txt.trim())return;
  var entry={type:facActType,content:txt,author:CU.name,entity_type:'facility',entity_id:facId,ts:new Date().toISOString()};
  if(!facActivityCache[facId])facActivityCache[facId]=[];
  facActivityCache[facId].unshift(entry);
  if(sb){sb.from('activity').insert([{type:entry.type,content:entry.content,author:entry.author,author_id:CU.id||null,entity_type:'facility',entity_id:facId,ts:entry.ts}]).then(function(r){if(r.error){showToast('Activity save failed: '+r.error.message,'err');console.error('[DB] fac activity',r.error);}});}
  renderFacPage();
}

function resolveFacilityRequirements(f){
  var stateRows=complianceRequirements.filter(function(r){return r.level==='state'&&r.state===f.state;});
  var hhsRows=complianceRequirements.filter(function(r){return r.level==='health_service'&&f.healthAuthority&&r.scope_name===f.healthAuthority;});
  var facRows=complianceRequirements.filter(function(r){return r.level==='facility'&&(r.facility_id===f.id||(r.scope_name&&r.scope_name===f.name));});
  var wardRows=complianceRequirements.filter(function(r){return r.level==='ward'&&f.healthAuthority&&r.scope_name===f.healthAuthority;});
  return {state:stateRows,healthService:hhsRows,facility:facRows,ward:wardRows};
}

function crGroupHtml(label,rows){
  if(!rows.length)return'';
  return '<div style="font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);padding:8px 12px 4px">'+esc(label)+'</div>'
    +rows.map(crReqRowHtml).join('');
}
function renderFacComplianceRequirements(f){
  var resolved=resolveFacilityRequirements(f);
  var total=resolved.state.length+resolved.healthService.length+resolved.facility.length+resolved.ward.length;
  if(!total){
    return '<div class="empty-st">'+I.chk+'<b>No compliance requirements loaded yet</b><p>State, health service, and facility-level requirements will appear here once loaded for '+esc(f.state||'this state')+'.</p></div>';
  }
  var stateLabel=(SR[f.state]&&SR[f.state].label)||f.state||'State';
  return '<div style="background:var(--bg);border-radius:12px;padding:4px 0;overflow:hidden">'
    +crGroupHtml(stateLabel+' (all facilities)',resolved.state)
    +crGroupHtml(f.healthAuthority||'Health service',resolved.healthService)
    +crGroupHtml('This facility',resolved.facility)
    +crGroupHtml('Ward-specific (conditional)',resolved.ward)
    +'</div>';
}

function renderFacContacts(f,fContacts,isAdminOps){
  if(!fContacts.length&&!f.contactName){return '<div class="empty-st">'+I.person+'<b>No contacts recorded</b><p>Add a contact from the Edit Details panel to keep this facility\'s people on file.</p></div>';}
  var rows='';
  if(fContacts.length){
    rows=fContacts.map(function(c){
      var initials=c.name.split(' ').filter(Boolean).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2)||'?';
      return '<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)">'
        +'<div style="width:36px;height:36px;border-radius:10px;background:var(--brand-grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0">'+initials+'</div>'
        +'<div style="flex:1">'
        +'<div style="font-size:12px;font-weight:500;color:var(--t1)">'+esc(c.name)+'</div>'
        +(c.title?'<div style="font-size:10px;color:var(--t3)">'+esc(c.title)+'</div>':'')
        +'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">'
        +(c.isPrimary?'<span class="badge b-pu" style="font-size:8px">Primary</span>':'')
        +(c.isSubmissionContact?'<span class="badge b-gn" style="font-size:8px">Submission Contact</span>':'')
        +'</div>'
        +(c.email?'<a href="mailto:'+esc(c.email)+'" class="contact-btn" style="margin-top:8px">'+I.mail+''+esc(c.email)+'</a>':'')
        +(c.phone?'<a href="tel:'+esc(c.phone)+'" class="contact-btn">'+I.phone+''+esc(c.phone)+'</a>':'')
        +'</div></div>';
    }).join('');
  } else {
    rows='<div style="padding:12px 0;border-bottom:1px solid var(--border)">'
      +'<div style="font-size:12px;font-weight:500;color:var(--t1)">'+esc(f.contactName)+'</div>'
      +(f.contactEmail?'<a href="mailto:'+esc(f.contactEmail)+'" class="contact-btn" style="margin-top:8px">'+I.mail+''+esc(f.contactEmail)+'</a>':'')
      +(f.contactPhone?'<a href="tel:'+esc(f.contactPhone)+'" class="contact-btn">'+I.phone+''+esc(f.contactPhone)+'</a>':'')
      +(f.secondaryContactName?'<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:500">Secondary contact</div><div style="font-size:12px;font-weight:500;color:var(--t1)">'+esc(f.secondaryContactName)+'</div>'+(f.secondaryContactEmail?'<a href="mailto:'+esc(f.secondaryContactEmail)+'" class="contact-btn" style="margin-top:8px">'+I.mail+''+esc(f.secondaryContactEmail)+'</a>':'')+(f.secondaryContactPhone?'<a href="tel:'+esc(f.secondaryContactPhone)+'" class="contact-btn">'+I.phone+''+esc(f.secondaryContactPhone)+'</a>':'')+'</div>':'')
      +'</div>';
  }
  return rows;
}

function renderFacActivitySection(f){
  var acts=facActivityCache[f.id]||[];
  var types=['Note','Call','Email','Meeting'];
  var ICO={Note:I.pencil,Call:I.phone,Email:I.mail,Meeting:I.meet};
  var COL={Note:'var(--accent)',Call:'var(--ok)',Email:'#8B5CF6',Meeting:'var(--warn)'};
  var inputHtml='<div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:12px">'
    +'<div style="display:flex;gap:4px;margin-bottom:8px">'
    +types.map(function(t){return '<button class="btn btn-sm '+(facActType===t?'btn-p':'btn-g')+'" onclick="event.stopPropagation();setFacActType(\''+t+'\')" style="font-size:10px;padding:4px 8px">'+t+'</button>';}).join('')
    +'</div>'
    +'<textarea id="fac-act-txt" rows="3" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;resize:vertical;font-family:inherit;box-sizing:border-box" placeholder="Log a '+facActType.toLowerCase()+'..."></textarea>'
    +'<div style="display:flex;justify-content:flex-end;margin-top:8px">'
    +'<button class="btn btn-p btn-sm" onclick="addFacActivity('+f.id+')">Add '+facActType+'</button>'
    +'</div></div>';
  if(!acts.length){return inputHtml+'<div style="color:var(--t3);font-size:12px;text-align:center;padding:16px 0">No activity recorded yet.</div>';}
  return inputHtml+acts.map(function(a){
    var icoHtml=ico(ICO[a.type]||I.pencil,13);var col=COL[a.type]||'var(--t3)';
    var ts=a.ts?new Date(a.ts):'';
    var tsStr=ts?(ts.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+' '+ts.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})):'';
    return '<div style="display:flex;gap:10px;margin-bottom:12px">'
      +'<div style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:'+col+'1a;color:'+col+';display:flex;align-items:center;justify-content:center">'+icoHtml+'</div>'
      +'<div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
      +'<span style="font-size:10px;font-weight:500;color:'+col+'">'+esc(a.type||'Note')+'</span>'
      +'<span style="font-size:10px;color:var(--t3)">'+esc(a.author||'')+'</span>'
      +(tsStr?'<span style="font-size:9px;color:var(--t3);margin-left:auto">'+tsStr+'</span>':'')
      +'</div><div style="font-size:11px;color:var(--t2);line-height:1.5;white-space:pre-wrap">'+esc(a.content||'')+'</div></div>'
      +'</div>';
  }).join('');
}

function cpRenderIncrEdit(d){
  var si=d.stateIncrements||{};
  var sts=Object.keys(si).sort();
  if(!sts.length)return'<div style="font-size:11px;color:var(--t3);padding:4px 0">No rows. Click "+ Add State" to begin.</div>';
  var h='<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr>'
    +'<th style="font-size:8px;text-transform:uppercase;color:var(--t3);font-weight:700;border-bottom:1px solid var(--border);padding:4px 4px;text-align:left">State</th>'
    +'<th style="font-size:8px;text-transform:uppercase;color:var(--t3);font-weight:700;border-bottom:1px solid var(--border);padding:4px 4px;text-align:left">Class.</th>'
    +'<th style="font-size:8px;text-transform:uppercase;color:var(--t3);font-weight:700;border-bottom:1px solid var(--border);padding:4px 4px;text-align:left">Increment</th>'
    +'<th style="font-size:8px;text-transform:uppercase;color:var(--t3);font-weight:700;border-bottom:1px solid var(--border);padding:4px 4px;text-align:left">Status</th>'
    +'<th style="font-size:8px;text-transform:uppercase;color:var(--t3);font-weight:700;border-bottom:1px solid var(--border);padding:4px 4px;text-align:left">Hrs</th>'
    +'<th style="border-bottom:1px solid var(--border)"></th>'
    +'</tr></thead><tbody>';
  sts.forEach(function(st){
    var r=si[st];
    h+='<tr>'
      +'<td style="padding:4px 4px;border-bottom:1px solid var(--border)"><strong>'+esc(st)+'</strong></td>'
      +'<td style="padding:4px 4px;border-bottom:1px solid var(--border)"><input value="'+esc(r.classification||'')+'" oninput="cpEditData.stateIncrements[&apos;'+st+'&apos;].classification=this.value" style="width:60px;font-size:10px;padding:4px 4px;border:1px solid var(--border);border-radius:3px"></td>'
      +'<td style="padding:4px 4px;border-bottom:1px solid var(--border)"><input value="'+esc(r.increment||'')+'" oninput="cpEditData.stateIncrements[&apos;'+st+'&apos;].increment=this.value" style="width:65px;font-size:10px;padding:4px 4px;border:1px solid var(--border);border-radius:3px" placeholder="RN2.4"></td>'
      +'<td style="padding:4px 4px;border-bottom:1px solid var(--border)"><select onchange="cpEditData.stateIncrements[&apos;'+st+'&apos;].status=this.value" style="font-size:10px;padding:4px 4px;border:1px solid var(--border);border-radius:3px">'+['Activated','Not Activated','Pending'].map(function(s){return'<option'+(r.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></td>'
      +'<td style="padding:4px 4px;border-bottom:1px solid var(--border)"><input type="number" value="'+(r.hours||'')+'" oninput="cpEditData.stateIncrements[&apos;'+st+'&apos;].hours=this.value?+this.value:0" style="width:50px;font-size:10px;padding:4px 4px;border:1px solid var(--border);border-radius:3px"></td>'
      +'<td style="padding:4px 4px;border-bottom:1px solid var(--border)"><button onclick="cpRemoveIncrRow(&apos;'+st+'&apos;)" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:15px;line-height:1;padding:0">&times;</button></td>'
      +'</tr>'
      +'<tr><td colspan="6" style="padding:4px 4px 4px;border-bottom:1px solid var(--border)"><input value="'+esc(r.notes||'')+'" oninput="cpEditData.stateIncrements[&apos;'+st+'&apos;].notes=this.value" style="width:100%;font-size:9px;padding:4px 4px;border:1px solid var(--border);border-radius:3px;color:var(--t3)" placeholder="Notes, e.g. confirmed by payroll July 2025"></td></tr>';
  });
  h+='</tbody></table>';
  return h;
}
function cpAddIncrRow(){
  var all=['NSW','VIC','QLD','SA','WA','NT','TAS','ACT'];
  var si=cpEditData.stateIncrements||{};
  var avail=all.filter(function(s){return !si[s];});
  if(!avail.length){showToast('All states already added');return;}
  if(!cpEditData.stateIncrements)cpEditData.stateIncrements={};
  cpEditData.stateIncrements[avail[0]]={classification:'RN',increment:'',status:'Not Activated',hours:0,notes:''};
  var w=document.getElementById('cp-incr-wrap');if(w)w.innerHTML=cpRenderIncrEdit(cpEditData);
}
function cpRemoveIncrRow(st){
  if(cpEditData&&cpEditData.stateIncrements)delete cpEditData.stateIncrements[st];
  var w=document.getElementById('cp-incr-wrap');if(w)w.innerHTML=cpRenderIncrEdit(cpEditData);
}

// ── EXPLAINABLE MATCH SCORE ─────────────────────────────────────────────────
// Score out of 100, broken into named factors so a consultant can always see
// why a candidate ranks where they do (never a black-box number).
function matchScore(c,role){
  var fac=facilities.find(function(f){return f.id===role.facilityId;})||{};
  var factors=[],score=0;

  var cnt=(c.nurseType||'').toUpperCase(),rnt=(role.nurseType||'').toUpperCase();
  var ntMatch=!!cnt&&!!rnt&&cnt===rnt;
  factors.push({label:'Nurse type',points:ntMatch?30:0,max:30,met:ntMatch,
    detail:ntMatch?'Nurse type match ('+role.nurseType+')':'Nurse type mismatch'+(c.nurseType&&role.nurseType?' ('+c.nurseType+' vs '+role.nurseType+')':'')});
  if(ntMatch)score+=30;

  var facState=(fac.state||'').toLowerCase();
  var homeMatch=!!facState&&(c.state||'').toLowerCase()===facState;
  var regionMatch=!homeMatch&&!!facState&&(c.regions||[]).some(function(r){return r.toLowerCase()===facState;});
  var locMatch=homeMatch||regionMatch;
  factors.push({label:'Location',points:locMatch?20:0,max:20,met:locMatch,
    detail:homeMatch?'Home state match ('+fac.state+')':regionMatch?'Preferred region includes '+fac.state:'No home-state or preferred-region match'});
  if(locMatch)score+=20;

  var cs=cmpScore(c);
  var compPts=cs>=90?25:cs>=80?15:0;
  factors.push({label:'Compliance',points:compPts,max:25,met:compPts>0,detail:'Compliance '+cs+'%'});
  score+=compPts;

  var avFrom=c.availableFrom?new Date(c.availableFrom):null;
  var rStart=role.startDate?new Date(role.startDate):null;
  var availMet=false,availDetail='Availability unknown';
  if(avFrom&&rStart){
    var diffDays=Math.round((avFrom-rStart)/86400000);
    if(diffDays<=14){availMet=true;availDetail=diffDays<=0?'Available before role starts':'Available '+diffDays+'d after start — within window';}
    else{var wks=Math.round(diffDays/7);availDetail='Not available until '+(wks>=1?wks+' week'+(wks!==1?'s':''):diffDays+'d')+' after start';}
  }
  factors.push({label:'Availability',points:availMet?15:0,max:15,met:availMet,detail:availDetail});
  if(availMet)score+=15;

  var priorAccepted=(c.submissions||[]).some(function(s){return s.status==='Accepted'&&s.facilityId===role.facilityId;});
  var priorContract=(c.contracts||[]).some(function(k){return k.facilityId===role.facilityId;});
  var priorMatch=priorAccepted||priorContract;
  factors.push({label:'Facility history',points:priorMatch?10:0,max:10,met:priorMatch,
    detail:priorMatch?'Prior placement at '+(fac.name||'this facility'):'No prior placement here'});
  if(priorMatch)score+=10;

  return{score:score,factors:factors};
}
var _scoreOpen={};
function toggleScoreBreakdown(key,e){
  if(e)e.stopPropagation();
  _scoreOpen[key]=!_scoreOpen[key];
  renderPage();
}
function scoreRingHtml(score,size,key){
  size=size||28;
  var col=score>=70?'var(--ok)':score>=40?'var(--warn)':'var(--t3)';
  var onclick=key?'toggleScoreBreakdown(\''+key+'\',event)':'event.stopPropagation()';
  return '<span class="score-ring" onclick="'+onclick+'" title="'+(key?'Click for score breakdown':'Score')+'" style="display:inline-flex;align-items:center;justify-content:center;width:'+size+'px;height:'+size+'px;border-radius:50%;border:2px solid '+col+';color:'+col+';font-size:'+Math.round(size*0.36)+'px;font-weight:500;flex-shrink:0;cursor:pointer">'+score+'</span>';
}
function scoreBreakdownHtml(mo){
  return '<div style="margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:8px;display:flex;flex-direction:column;gap:4px" onclick="event.stopPropagation()">'
    +mo.factors.map(function(f){
      return '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:10px;color:'+(f.met?'var(--ok)':'var(--t3)')+'">'
        +'<span>'+esc(f.detail)+'</span><span style="font-weight:500;flex-shrink:0">+'+f.points+'</span></div>';
    }).join('')
    +'</div>';
}
function roleMatchList(pool,role){
  return pool.map(function(c){return{c:c,mo:matchScore(c,role)};})
    .filter(function(x){return x.mo.score>0;})
    .sort(function(a,b){return b.mo.score-a.mo.score;});
}
function roleMatchPillHtml(pool,role,ringSize){
  var list=roleMatchList(pool,role);
  if(!list.length)return'';
  var strongCount=list.filter(function(x){return x.mo.score>=70;}).length;
  return '<span style="display:inline-flex;align-items:center;gap:5px">'+scoreRingHtml(list[0].mo.score,ringSize||20)
    +'<span style="font-size:10px;color:var(--t3)">'+list.length+' match'+(list.length!==1?'es':'')+(strongCount?' · '+strongCount+' strong':'')+'</span></span>';
}

function renderMatchRow(c,role,checkItems,mo){
  var sc=cmpScore(c);
  var required=checkItems.filter(function(ci){return ci.required;});
  var ticked=required.filter(function(ci){var comp=(c.compliance&&c.compliance.items[ci.item_key])||{};return comp.checked&&comp.docUrl;}).length;
  var readyIcon=required.length?(ticked===required.length?'<span title="Checklist complete" style="color:var(--ok);flex-shrink:0;display:inline-flex">'+ico(I.chk,12)+'</span>':'<span title="'+ticked+'/'+required.length+' items" style="color:var(--warn);font-size:10px;flex-shrink:0">'+ticked+'/'+required.length+'</span>'):'';
  var key='rm_'+c.id+'_'+role.id;
  var breakdown=_scoreOpen[key]?scoreBreakdownHtml(mo):'';
  return'<div class="row-hover" style="padding:8px;margin:0 -8px;border-bottom:1px solid var(--border);border-radius:8px" onclick="openCandPage('+c.id+')">'
    +'<div style="display:flex;align-items:center;gap:7px">'
    +scoreRingHtml(mo.score,24,key)
    +'<div style="flex:1;min-width:0">'
    +'<div style="font-size:11px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(c.name)+'</div>'
    +'<div style="font-size:10px;color:var(--t3)">'+esc(c.classification)+' &middot; '+sc+'% compliant'+(c.availableFrom?' &middot; Avail '+fmt(c.availableFrom):'')+'</div>'
    +'</div>'+readyIcon
    +'<button onclick="event.stopPropagation();openSubmitPackage('+c.id+','+role.id+')" class="btn btn-p btn-xs">Submit</button>'
    +'</div>'+breakdown
    +'</div>';
}

function saveRole(){
  if(!ER.facilityId){showToast('Select a facility first','err');return;}
  if(!ER.ward.trim()){showToast('Enter a ward or specialty','err');return;}
  ER.lastEditedBy=CU.name;ER.lastEditedAt=new Date().toISOString();
  if(!ER.id){ER.createdBy=CU.name;ER.createdAt=new Date().toISOString();}
  var idx=roles.findIndex(function(r){return r.id===ER.id;});
  if(idx>=0)roles[idx]=ER;else roles.push(ER);
  closeModal();renderPage();
  syncRoleToDb(ER).catch(function(e){showToast('DB sync error','err');console.error('[DB] role',e);});
}

function delRole(){
  var fac=facilities.find(function(f){return f.id===ER.facilityId;});
  var label=(ER.ward||'Role')+(fac?' at '+fac.name:'');
  showConfirm({title:'Delete '+label+'?',message:'This cannot be undone.',confirmLabel:'Delete'},function(){
    roles=roles.filter(function(r){return r.id!==ER.id;});
    if(selectedRoleId===ER.id)selectedRoleId=null;
    closeModal();renderPage();
    if(ER.id)sb.from('roles').delete().eq('id',ER.id).then(function(r){if(r.error){showToast('Delete failed: '+r.error.message,'err');console.error('[DB] del role',r.error);}});
  });
}

var EK=null;
function findSubAndCand(subId){
  var found=null,cand=null;
  candidates.some(function(c){var s=(c.submissions||[]).find(function(x){return x.id===subId;});if(s){found=s;cand=c;return true;}return false;});
  return{sub:found,cand:cand};
}

    rateType:'Casual',rate:'',hours:'',healthRegion:'',loadingPct:0,perDiem:0,oncallRate:'',
    contractNumber:'',notes:'',supervisor:''};

  document.getElementById('m-info').innerHTML='';document.getElementById('m-tabs').innerHTML='';

function saveContract(){
  if(!EK.facilityId){showToast('Select a facility','err');return;}
  if(!EK.startDate||!EK.endDate){showToast('Start and end date are required','err');return;}
  if(!EK.rate){showToast('Rate is required','err');return;}
  if(!EK.hours){showToast('Weekly hours are required','err');return;}
  var cand=candidates.find(function(c){return c.id===EK.candidateId;});
  if(!cand){showToast('Candidate not found','err');return;}
  var fac=facilities.find(function(f){return f.id===EK.facilityId;})||{};
  var nowIso=new Date().toISOString();
  var payload={candidate_id:EK.candidateId,facility_id:EK.facilityId,facility:fac.name||'',
    submission_id:EK.submissionId||null,role_id:EK.roleId||null,
    ward:EK.ward||'',status:'Draft',start_date:EK.startDate,end_date:EK.endDate,
    rate_type:EK.rateType||'Casual',rate:String(EK.rate),hours:String(EK.hours),
    health_region:EK.healthRegion||null,loading_pct:EK.loadingPct||0,per_diem:EK.perDiem||0,
    oncall_rate:EK.oncallRate||null,contract_number:EK.contractNumber||null,notes:EK.notes||null,
    supervisor:EK.supervisor||null,last_edited_by:CU.name,last_edited_at:nowIso,
    created_by:CU.name,created_at:nowIso};
  sb.from('contracts').insert(payload).select().single().then(function(r){
    if(r.error){showToast('Save error: '+r.error.message,'err');console.error('[DB] contract insert',r.error);return;}
    var newContract={id:r.data.id,facilityId:EK.facilityId,facility:fac.name||'',
      submissionId:EK.submissionId,roleId:EK.roleId,
      ward:EK.ward||'',status:'Draft',startDate:EK.startDate,endDate:EK.endDate,
      rateType:EK.rateType||'Casual',rate:String(EK.rate),hours:String(EK.hours),
      alertDays:14,healthRegion:EK.healthRegion||'',loadingPct:EK.loadingPct||0,perDiem:EK.perDiem||0,
      oncallRate:EK.oncallRate||'',notes:EK.notes||'',
      flightConfirmed:false,accomConfirmed:false,shiftConfirmed:false,
      lastEditedBy:CU.name,lastEditedAt:nowIso};
    if(!cand.contracts)cand.contracts=[];
    cand.contracts.push(newContract);
    if(['Submission','Offer'].indexOf(cand.phase)>=0){
      cand.phase='Contract';
      sb.from('candidates').update({phase:'Contract'}).eq('id',cand.id).then(function(r2){if(r2.error)console.error('[DB] phase->Contract',r2.error);});
    }
    var msg='Contract created — '+(fac.name||'facility')+(EK.ward?' — '+EK.ward:'')+' ('+fmt(EK.startDate)+' to '+fmt(EK.endDate)+')';
    if(!cand.activity)cand.activity=[];
    cand.activity.push({type:'System',content:msg,author:CU.name,ts:nowIso,_synced:false});
    sb.from('activity').insert({candidate_id:cand.id,entity_type:'candidate',entity_id:cand.id,author_id:CU.id||null,type:'System',content:msg,author:CU.name,ts:nowIso}).then(function(r3){if(r3.error)console.error('[DB] contract activity',r3.error);});
    showToast('Contract created');
    closeModal();renderPage();
  });
}

// Fields covered by the audit diff — everything the edit form exposes except
// facility (handled separately below, so old/new can be logged as facility
// names rather than raw facility_id numbers).
var CONTRACT_EDIT_FIELDS=[
  {k:'ward',col:'ward'},{k:'rateType',col:'rate_type'},
  {k:'startDate',col:'start_date'},{k:'endDate',col:'end_date'},
  {k:'hours',col:'hours'},{k:'loadingPct',col:'loading_pct'},
  {k:'perDiem',col:'per_diem'},{k:'oncallRate',col:'oncall_rate'},
  {k:'healthRegion',col:'health_region'},{k:'supervisor',col:'supervisor'},
  {k:'firstShiftTime',col:'first_shift_time'},{k:'alertDays',col:'alert_days'},
  {k:'docUrl',col:'doc_url'},{k:'flightConfirmed',col:'flight_confirmed'},
  {k:'accomConfirmed',col:'accom_confirmed'},{k:'shiftConfirmed',col:'shift_confirmed'},
  {k:'notes',col:'notes'}
];
function auditVal(v){return v===null||v===undefined?'':String(v);}
function saveContractEdit(){
  var hit=findContractById(ECTid),k=hit.contract,cand=hit.cand;
  if(!k||!cand){showToast('Contract not found','err');return;}
  var fac=facilities.find(function(f){return f.id===ECT.facilityId;})||{};
  var nowIso=new Date().toISOString();
  // contracts.id is GENERATED ALWAYS AS IDENTITY — per-row .update().eq('id',...),
  // same confirmed pattern as submissions/contracts/facilities/users. id is never
  // sent in the payload.
  var payload={facility_id:ECT.facilityId||null,facility:fac.name||'',
    ward:ECT.ward||'',rate_type:ECT.rateType||'Casual',
    start_date:ECT.startDate||null,end_date:ECT.endDate||null,
    hours:ECT.hours?String(ECT.hours):null,loading_pct:ECT.loadingPct||0,per_diem:ECT.perDiem||0,
    oncall_rate:ECT.oncallRate||null,health_region:ECT.healthRegion||null,
    supervisor:ECT.supervisor||null,first_shift_time:ECT.firstShiftTime||null,
    alert_days:ECT.alertDays||14,doc_url:ECT.docUrl||null,
    flight_confirmed:!!ECT.flightConfirmed,accom_confirmed:!!ECT.accomConfirmed,
    shift_confirmed:!!ECT.shiftConfirmed,notes:ECT.notes||null,
    last_edited_by:CU.name,last_edited_at:nowIso};
  sb.from('contracts').update(payload).eq('id',ECTid).then(function(r){
    if(r.error){showToast('Save error: '+r.error.message,'err');console.error('[DB] contract edit update',r.error);return;}
    var auditRows=[];
    if(ECT.facilityId!==k.facilityId){
      var oldFac=facilities.find(function(f){return f.id===k.facilityId;});
      auditRows.push({contract_id:ECTid,field_name:'facility',
        old_value:auditVal(oldFac&&oldFac.name),new_value:auditVal(fac.name),
        changed_by:CU.name,changed_at:nowIso});
    }
    CONTRACT_EDIT_FIELDS.forEach(function(f){
      var oldVal=auditVal(k[f.k]),newVal=auditVal(ECT[f.k]);
      if(oldVal!==newVal)auditRows.push({contract_id:ECTid,field_name:f.col,
        old_value:oldVal,new_value:newVal,changed_by:CU.name,changed_at:nowIso});
    });
    var applyLocal=function(){
      k.facilityId=ECT.facilityId;k.facility=fac.name||'';
      CONTRACT_EDIT_FIELDS.forEach(function(f){k[f.k]=ECT[f.k];});
      k.lastEditedBy=CU.name;k.lastEditedAt=nowIso;
      showToast('Contract saved');
      closeModal();renderPage();
    };
    // Audit insert never sends id — contract_audit.id is also GENERATED ALWAYS
    // AS IDENTITY. Only rows for fields that actually changed are written.
    if(auditRows.length){
      sb.from('contract_audit').insert(auditRows).then(function(r2){
        if(r2.error)console.error('[DB] contract edit audit',r2.error);
        applyLocal();
      });
    } else {
      applyLocal();
    }
  });
}

// expense id column to link back to a specific record.
var MP_DOC_TABLE={flights:'flights',accom:'accommodation',cars:'car_hire',expenses:'expenses'};
var MP_DOC_ARR={flights:'flights',accom:'accommodation',cars:'carHire',expenses:'expenses'};
function mpDocBlockHtml(type,item){

async function mpUploadDoc(type,id,inputEl){
  var file=inputEl.files&&inputEl.files[0];
  if(!file)return;
  var hit=findContractById(MPContractId),cand=hit.cand;
  if(!cand){showToast('Contract not found','err');return;}
  showToast('Uploading '+file.name+'...');
  try{
    var result=await uploadToStorage(cand.id,file,type);
    var addedBy=CU.name,addedAt=new Date().toISOString();
    var payload={doc_url:result.url,doc_added_by:addedBy,doc_added_at:addedAt};
    var r=await sb.from(MP_DOC_TABLE[type]).update(payload).eq('id',id);
    if(r.error){showToast('Save error: '+r.error.message,'err');console.error('[DB] '+type+' doc update',r.error);return;}
    var arr=cand.travel[MP_DOC_ARR[type]]||[];
    var rec=arr.find(function(x){return x.id===id;});
    if(rec){rec.docUrl=result.url;rec.docAddedBy=addedBy;rec.docAddedAt=addedAt;}

function mpSaveFlight(){

    airline:isBooked?(MPFlight.airline||null):null,

    to_loc:isBooked?(MPFlight.to||null):null,

    cost:isBooked?(MPFlight.cost||null):null,

function mpUpdateFlight(){
  if(!MPFlight.status){showToast('Choose a status first','err');return;}
  var id=MPFlightEditId;

  }).join('');
  body+='<button class="btn btn-g btn-sm" style="margin-top:8px" onclick="editCLItems.push({facility_id:editCLFacId,item_key:\'\',item_label:\'\',required:true,sort_order:editCLItems.length});_renderChecklistModal()">+ Add Item</button>';

  document.getElementById('m-body').innerHTML=body;
  document.getElementById('m-foot').innerHTML='<span></span><div style="display:flex;gap:7px"><button class="btn btn-g btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-p btn-sm" onclick="saveChecklist()">Save</button></div>';
}

function saveChecklist(){
  facilityChecklists=facilityChecklists.filter(function(ci){return ci.facility_id!==editCLFacId;});
  editCLItems.forEach(function(ci,i){ci.sort_order=i;});
  facilityChecklists=facilityChecklists.concat(editCLItems);
  closeModal();renderPage();
  sb.from('facility_checklists').delete().eq('facility_id',editCLFacId).then(function(del){
    if(del.error){console.error('[DB] checklist del',del.error);return;}
    if(!editCLItems.length)return;
    var rows=editCLItems.map(function(ci){return{facility_id:ci.facility_id,item_key:ci.item_key,item_label:ci.item_label,required:!!ci.required,sort_order:ci.sort_order,created_by:CU.name};});
    sb.from('facility_checklists').insert(rows).then(function(r){
      if(r.error)console.error('[DB] checklist ins',r.error);
      else loadFacilityChecklists().then(function(d){facilityChecklists=d;}).catch(function(){});
    });
  });
}

function openSubFlow(candId,roleId){
  var c=candidates.find(function(x){return x.id===candId;});
  if(!c)return;
  var role=roleId?roles.find(function(r){return r.id===roleId;}):null;
  var fac=role?facilities.find(function(f){return f.id===role.facilityId;}):null;
  sfCandId=candId;sfRoleId=roleId||null;
  sfStep=1;sfSpiel=c.spiel||'';sfSavedSpiel=c.spiel||'';
  sfNotes='';sfCheckSnap={};sfSentConfirmed=false;sfSaveToCand=true;sfEmailOpened=false;
  sfStartDate=role?(role.startDate||''):'';sfEndDate=role?(role.endDate||''):'';
  sfSelectedDocIds=(c.documents||[]).filter(function(d){return !d.complianceItemId&&d.category==='CV'&&d.isCurrent!==false;}).map(function(d){return d.id;});
  sfTo=(fac&&(fac.submissionEmail||fac.contactEmail))||'';
  sfSubject='HCA Submission — '+c.name+' — '+c.classification+(fac?' — '+fac.name:'');
  document.getElementById('sf-ov').style.display='flex';
  sfRender();
}

function closeSF(){document.getElementById('sf-ov').style.display='none';}

function sfSaveState(){
  var ta=document.getElementById('sf-spiel-ta');if(ta)sfSpiel=ta.value;
  var na=document.getElementById('sf-notes-ta');if(na)sfNotes=na.value;
  var te=document.getElementById('sf-to');if(te)sfTo=te.value;
  var se=document.getElementById('sf-subj');if(se)sfSubject=se.value;
  var cb=document.getElementById('sf-save-spiel');if(cb)sfSaveToCand=cb.checked;
  var sd=document.getElementById('sf-start-date');if(sd)sfStartDate=sd.value;
  var ed=document.getElementById('sf-end-date');if(ed)sfEndDate=ed.value;
}

function sfNext(){
  sfSaveState();
  if(sfStep===3)sfBuildCheckSnap();
  sfStep++;sfRender();
  var inner=document.getElementById('sf-inner');if(inner)inner.scrollTop=0;
}

function sfBack(){
  sfSaveState();sfStep--;sfRender();
  var inner=document.getElementById('sf-inner');if(inner)inner.scrollTop=0;
}

function sfSaveDraft(){showToast('Draft saved');closeSF();}

function sfSetEmailOpened(){
  sfEmailOpened=true;
  var btn=document.getElementById('sf-confirm-btn');
  if(btn){btn.style.display='inline-flex';}
}

function sfToggleDoc(id){
  var i=sfSelectedDocIds.indexOf(id);
  if(i>=0)sfSelectedDocIds.splice(i,1);else sfSelectedDocIds.push(id);
  sfRender();
}

function sfPickRole(id){
  sfRoleId=id?parseInt(id):null;
  var role=sfRoleId?roles.find(function(r){return r.id===sfRoleId;}):null;
  var fac=role?facilities.find(function(f){return f.id===role.facilityId;}):null;
  var c=candidates.find(function(x){return x.id===sfCandId;});
  if(fac){sfTo=fac.submissionEmail||fac.contactEmail||sfTo;}
  if(c){sfSubject='HCA Submission — '+c.name+' — '+c.classification+(fac?' — '+fac.name:'');}
  if(role){sfStartDate=role.startDate||'';sfEndDate=role.endDate||'';}
  sfRender();
}

function sfAddBizDays(date,days){
  var d=new Date(date);var added=0;
  while(added<days){d.setDate(d.getDate()+1);if(d.getDay()!==0&&d.getDay()!==6)added++;}
  return d.toISOString().slice(0,10);
}

function sfBuildCheckSnap(){
  var c=candidates.find(function(x){return x.id===sfCandId;});
  var role=sfRoleId?roles.find(function(r){return r.id===sfRoleId;}):null;
  var fac=role?facilities.find(function(f){return f.id===role.facilityId;}):null;
  sfCheckSnap={};
  if(!c||!fac)return;
  var items=facilityChecklists.filter(function(ci){return ci.facility_id===fac.id;});
  var compItems=(c.compliance&&c.compliance.items)||{};
  items.forEach(function(ci){
    var key=ci.item_key||ci.item_label||'';
    var matched=compItems[key];
    var verified=matched&&matched.status==='Verified';
    var hasDoc=!!(matched&&matched.docUrl);
    sfCheckSnap[key]={status:(verified&&hasDoc)?'ok':matched?'warn':'miss',label:ci.item_label||key,required:!!ci.required};
  });
}

function sfBuildEmailBody(c,role,fac){
  var contact=fac&&fac.contactName?fac.contactName:'Hiring Manager';
  var sep='─'.repeat(40);
  var lines=[];
  lines.push('Dear '+contact+',','');
  lines.push('Please find enclosed a candidate submission from Healthcare Australia Travel Nursing.','');
  lines.push(sep,'CANDIDATE DETAILS');
  lines.push('Name:              '+c.name);
  lines.push('Classification:    '+c.classification+(c.nurseType&&c.nurseType!==c.classification?' ('+c.nurseType+')':''));
  if(c.clinicalSkills&&c.clinicalSkills.length)lines.push('Specialties:       '+c.clinicalSkills.join(', '));
  if(c.availableFrom)lines.push('Available From:    '+fmt(c.availableFrom));
  if(c.state)lines.push('Home State:        '+c.state);
  if(c.regions&&c.regions.length)lines.push('Preferred Regions: '+c.regions.join(', '));
  if(sfStartDate||sfEndDate)lines.push('Proposed Dates:    '+(sfStartDate?fmt(sfStartDate):'TBC')+' — '+(sfEndDate?fmt(sfEndDate):'TBC'));
  lines.push('');
  if(sfSpiel){lines.push(sep,'ABOUT '+c.name.toUpperCase(),'',sfSpiel,'');}
  if(c.certifications&&c.certifications.length){
    lines.push(sep,'KEY CERTIFICATIONS');
    c.certifications.forEach(function(cert){lines.push('  • '+cert);});
    lines.push('');
  }
  var compItems=(c.compliance&&c.compliance.items)||{};
  var verifiedKeys=Object.keys(compItems).filter(function(k){return compItems[k].status==='Verified';});
  if(verifiedKeys.length){
    lines.push(sep,'COMPLIANCE DOCUMENTS');
    verifiedKeys.forEach(function(k){var it=compItems[k];lines.push('  • '+k.replace(/_/g,' ')+(it.docUrl?' — '+it.docUrl:'  ✓'));});
    lines.push('');
  }
  var attachedDocs=(c.documents||[]).filter(function(d){return sfSelectedDocIds.indexOf(d.id)>=0;});
  if(attachedDocs.length){
    lines.push(sep,'ATTACHED DOCUMENTS');
    attachedDocs.forEach(function(d){lines.push('  • '+(d.fileName||'Document'));});
    lines.push('');
  }
  var si=c.stateIncrements||{};
  var siKeys=Object.keys(si).filter(function(s){return si[s]&&si[s].increment;});
  if(siKeys.length){
    lines.push(sep,'INCREMENT LEVEL');
    lines.push(siKeys.map(function(s){return s+': '+si[s].increment;}).join(' | '));
    lines.push('');
  }
  if(sfNotes){lines.push(sep,'ADDITIONAL NOTES',sfNotes,'');}
  lines.push(sep,'','Please do not hesitate to contact me with any questions.','','Kind regards,',
    CU.name,'Healthcare Australia Travel Nursing',(CU.phone||''));
  return lines.join('\n');
}

  h+='<label for="sf-doc-upload" class="btn btn-g btn-xs" style="cursor:pointer;margin-top:10px;display:inline-flex">Upload new file</label>'

async function sfUploadNewDoc(inputEl){
  var file=inputEl.files&&inputEl.files[0];
  if(!file)return;
  inputEl.value='';
  var c=candidates.find(function(x){return x.id===sfCandId;});
  if(!c||!sb)return;
  var category=guessFileCategory(file.name);
  showToast('Uploading '+file.name+'...');
  try{
    var result=await uploadToStorage(sfCandId,file,category);
    var row={candidate_id:sfCandId,file_name:file.name,file_path:result.path,file_url:result.url,
      file_size:file.size,file_type:file.type||'',category:category,uploaded_by:CU.name,is_current:true};
    var ins=await sb.from('documents').insert(row).select('id,uploaded_at').single();
    if(ins.error)throw ins.error;
    var doc={id:ins.data.id,fileName:file.name,filePath:result.path,fileUrl:result.url,
      fileSize:file.size,fileType:file.type||'',uploadedBy:CU.name,
      uploadedAt:ins.data.uploaded_at||new Date().toISOString(),category:category,
      description:'',isCurrent:true,complianceItemId:null};
    if(!c.documents)c.documents=[];
    c.documents.unshift(doc);
    sfSelectedDocIds.push(doc.id);
    showToast('Uploaded and attached');
    sfRender();
  }catch(e){
    showToast('Upload failed: '+e.message,'err');console.error('[DB] sf upload',e);
  }
}

function sfStep3Html(c,role,fac){
  if(!role||!fac){
    return '<div style="background:var(--bg);border-radius:8px;padding:24px;font-size:12px;color:var(--t2);text-align:center">'
      +'No role selected &mdash; compliance check skipped. You can still proceed.</div>'
      +sfDocAttachHtml(c);
  }
  var items=facilityChecklists.filter(function(ci){return ci.facility_id===fac.id;});
  if(!items.length){
    return '<div style="background:var(--bg);border-radius:12px;padding:24px">'
      +'<div style="font-size:13px;font-weight:500;color:var(--t2);margin-bottom:8px">No checklist configured for this facility.</div>'
      +'<div style="font-size:11px;color:var(--t3)">Set one up on the Facility page. You can still proceed with this submission.</div>'
      +'</div>'
      +sfDocAttachHtml(c);
  }
  var compItems=(c.compliance&&c.compliance.items)||{};
  var reqItems=items.filter(function(ci){return ci.required;});
  var ready=0;
  var rows=items.map(function(ci){
    var key=ci.item_key||ci.item_label||'';
    var matched=compItems[key];
    var verified=matched&&matched.status==='Verified';
    var hasDoc=!!(matched&&matched.docUrl);
    var status=(verified&&hasDoc)?'ok':matched?'warn':'miss';
    if(ci.required&&status==='ok')ready++;
    var statusIcon=status==='ok'?I.chk:status==='warn'?I.warn:I.cross;
    var col=status==='ok'?'var(--ok)':status==='warn'?'var(--warn)':'var(--danger)';
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'
      +'<span style="color:'+col+';flex-shrink:0;width:20px;display:flex;justify-content:center">'+ico(statusIcon,15)+'</span>'
      +'<span style="flex:1;font-size:12px;color:var(--t1)">'+esc(ci.item_label||key)+'</span>'
      +(ci.required?'<span style="font-size:9px;font-weight:500;color:var(--danger);flex-shrink:0">REQ</span>':'<span style="font-size:9px;color:var(--t3);flex-shrink:0">opt</span>')
      +(status==='ok'?'<span style="color:var(--ok);display:inline-flex">'+ico(I.doc,13)+'</span>':'')
      +'</div>';
  }).join('');
  var pct=reqItems.length>0?Math.round(ready/reqItems.length*100):100;
  var allGood=pct===100;
  var summary='<div style="display:flex;align-items:center;gap:14px;background:'+(allGood?'var(--ok-l)':'var(--warn-l)')+';border-radius:12px;padding:16px 16px;margin-bottom:16px">'
    +'<div style="font-size:28px;font-weight:500;color:'+(allGood?'var(--ok)':'var(--warn)')+'">'+pct+'%</div>'
    +'<div><div style="font-size:13px;font-weight:500;color:var(--t1)">'+ready+' of '+reqItems.length+' required items ready</div>'
    +(allGood
      ?'<div style="font-size:11px;color:var(--ok)">All required compliance documents are on file.</div>'
      :'<div style="font-size:11px;color:var(--warn)">Missing items will be noted in the submission record.</div>')
    +'</div></div>';
  return summary+rows+sfDocAttachHtml(c);
}

function sfRender(){
  var c=candidates.find(function(x){return x.id===sfCandId;});
  var role=sfRoleId?roles.find(function(r){return r.id===sfRoleId;}):null;
  var fac=role?facilities.find(function(f){return f.id===role.facilityId;}):null;
  if(!c){closeSF();return;}
  var LABELS=['Review','Spiel','Compliance & Docs','Email Preview','Send'];
  var stepsBar='<div style="display:flex;align-items:center;margin-bottom:24px">'
    +LABELS.map(function(lbl,i){
      var n=i+1;var done=n<sfStep;var cur=n===sfStep;
      var bg=done?'var(--ok)':cur?'var(--brand)':'var(--border)';
      var fc=(done||cur)?'#fff':'var(--t3)';
      var lc=done?'var(--ok)':cur?'var(--brand)':'var(--t3)';
      var cell='<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0">'

var _notifyAudioCtx=null;
function playNotifySound(){
  if(CU&&CU.notifyMuted)return;
  try{
    if(!_notifyAudioCtx)_notifyAudioCtx=new (window.AudioContext||window.webkitAudioContext)();
    var ctx=_notifyAudioCtx;
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.type='sine';osc.frequency.value=880;
    gain.gain.setValueAtTime(0.0001,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.16,ctx.currentTime+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.35);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start();osc.stop(ctx.currentTime+0.36);
  }catch(e){console.error('[notify sound]',e);}
}

// ── LOAD FUNCTIONS ─────────────────────────────────
async function fetchAll(table){
  var pageSize=1000,from=0,all=[];
  while(true){
    var r=await sb.from(table).select('*').range(from,from+pageSize-1);
    if(r.error)return r;
    all=all.concat(r.data||[]);
    if(!r.data||r.data.length<pageSize)break;
    from+=pageSize;
  }
  return{data:all,error:null};
}
async function loadUsers(){
  var r=await sb.from('users').select('*');
  if(r.error)throw r.error;
  return (r.data||[]).map(mapUser);
}
async function loadFacilities(){
  var results=await Promise.all([sb.from('facilities').select('*'),sb.from('wards').select('*'),sb.from('facility_contacts').select('*')]);
  if(results[0].error)throw results[0].error;
  var wByFac={};
  (results[1].data||[]).forEach(function(w){if(!wByFac[w.facility_id])wByFac[w.facility_id]=[];wByFac[w.facility_id].push(w);});
  facilityContacts=(results[2].data||[]).map(function(c){return{id:c.id,facilityId:c.facility_id,name:c.name||'',title:c.title||'',email:c.email||'',phone:c.phone||'',isPrimary:!!c.is_primary,isSubmissionContact:!!c.is_submission_contact,notes:c.notes||''};});
  return (results[0].data||[]).map(function(f){return mapFacility(f,wByFac[f.id]);});
}
async function loadCandidates(){
  // Supabase/PostgREST caps a bare select at 1000 rows by default. These child tables
  // scale with candidate count and now exceed that on several tables, which was silently
  // truncating results (a candidate's rows past row 1000 just never loaded). Page through
  // everything instead of trusting a single select to return the full table.
  var results=await Promise.all([
    fetchAll('candidates'),
    fetchAll('activity'),
    fetchAll('compliance_items'),
    fetchAll('submissions'),
    fetchAll('contracts'),
    fetchAll('flights'),
    fetchAll('accommodation'),
    fetchAll('car_hire'),
    fetchAll('expenses'),
    fetchAll('documents')
  ]);
  results.forEach(function(r){if(r.error)throw r.error;});
  var byC=function(arr){var m={};(arr||[]).forEach(function(x){var cid=x.candidate_id;if(!m[cid])m[cid]=[];m[cid].push(x);});return m;};
  var acts=byC(results[1].data),comps=byC(results[2].data),subs=byC(results[3].data),
      cons=byC(results[4].data),fls=byC(results[5].data),acs=byC(results[6].data),
      cars=byC(results[7].data),exps=byC(results[8].data),docs=byC(results[9].data);
  return (results[0].data||[]).map(function(row){
    var cid=row.id;
    _dbCandIds.add(cid);
    return mapCandidate(row,acts[cid],comps[cid],subs[cid],cons[cid],fls[cid],acs[cid],cars[cid],exps[cid],docs[cid]);
  });
}
