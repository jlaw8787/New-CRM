function saveFac(){
  if(!EF.name){showToast("Name required","err");return;}
  var dupe=facilities.find(function(f){return f.id!==EF.id&&f.name.toLowerCase().trim()===EF.name.toLowerCase().trim();});
  function proceedSaveFac(){
    EF.lastEditedBy=CU.name;EF.lastEditedAt=new Date().toISOString();
    var isNew=!EFid;
    if(isNew){EF.createdBy=CU.name;EF.createdAt=new Date().toISOString();}
    var idx=facilities.findIndex(function(f){return f.id===EF.id;});
    if(idx>=0)facilities[idx]=EF;else facilities.push(EF);
    var payload={name:EF.name,state:EF.state,region:EF.region||null,
      type:EF.type,beds:EF.beds||null,contact_name:EF.contactName||null,
      contact_email:EF.contactEmail||null,contact_phone:EF.contactPhone||null,
      notes:EF.notes||null,last_edited_by:EF.lastEditedBy,last_edited_at:EF.lastEditedAt,
      created_by:EF.createdBy||null,created_at:EF.createdAt||null
    };
    // facilities.id is GENERATED ALWAYS AS IDENTITY — a batch/single .upsert() with
    // an explicit id fails outright (Postgres 428C9), same failure mode as
    // submissions/contracts above. Existing rows: .update().eq('id',...), which
    // never touches the identity column. New rows: plain .insert() with no id at
    // all, then capture the real generated id back so the wards write below (and
    // local state) use it, not the client-side placeholder id.
    var writeFac=isNew
      ?sb.from('facilities').insert(payload).select('id').then(function(r){
        if(r.error||!r.data||!r.data[0]){console.error('[DB] saveFac insert',r.error);return Promise.reject(r.error);}
        EF.id=r.data[0].id;
        return EF.id;
      })
      :sb.from('facilities').update(payload).eq('id',EFid).then(function(r){
        if(r.error){console.error('[DB] saveFac update',r.error);return Promise.reject(r.error);}
        return EFid;
      });
    writeFac.then(function(facId){
      return sb.from('wards').delete().eq('facility_id',facId).then(function(r){
        if(r.error){console.error('[DB] saveFac wards del',r.error);return;}
        if(!EF.wards||!EF.wards.length)return;
        return sb.from('wards').insert(EF.wards.map(function(w){
          return{facility_id:facId,name:w.name,nurse_types:w.nurseTypes};
        }));
      });
    }).then(function(r){
      if(r&&r.error)console.error('[DB] saveFac wards ins',r.error);
      showToast(EF.name+" saved");
    }).catch(function(e){showToast("Save error","err");console.error('[DB] saveFac',e);});
    closeModal();renderPage();
  }
  if(dupe){
    showConfirm({title:'Possible duplicate facility',message:'A facility named "'+dupe.name+'" already exists. Save anyway?',confirmLabel:'Save Anyway',danger:false},proceedSaveFac);
  } else {
    proceedSaveFac();
  }
}

  if(idx>=0)users[idx]=EU;else users.push(EU);

  };

  // facilities/submissions/contracts. Existing rows: .update().eq('id',...).
  // New rows: plain .insert() with no id, then capture the real generated id
  // back and correct the login dropdown option that was optimistically built
  // with the client-side placeholder id.
  if(isNew){
    sb.from('users').insert(payload).select('id').then(function(r){
      if(r.error||!r.data||!r.data[0]){showToast('Save failed: '+(r.error&&r.error.message),'err');console.error('[DB] saveUser insert',r.error);return;}
      EU.id=r.data[0].id;
      var opt=Array.from(sel.options).find(function(o){return o.value===String(tempId);});
      if(opt)opt.value=EU.id;
    });
  } else {
    sb.from('users').update(payload).eq('id',EUid).then(function(r){
      if(r.error){showToast('Save failed: '+r.error.message,'err');console.error('[DB] saveUser update',r.error);}
    });
  }
  showToast(EU.name+" saved");closeModal();renderPage();
}

async function uploadToStorage(candidateId, file, category) {
  var safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  var path = candidateId + '/' + (category||'general') + '/' + Date.now() + '_' + safe;
  var r = await sb.storage.from('candidate-docs').upload(path, file);
  if (r.error) throw new Error(r.error.message);
  return { url: sb.storage.from('candidate-docs').getPublicUrl(path).data.publicUrl, path: path };
}
function docIcon(type) {
  if (type) {
    if (type.indexOf('sheet') >= 0 || type.indexOf('excel') >= 0) return ico(I.sheet,18);
    if (type.indexOf('image') >= 0) return ico(I.photo,18);
    if (type.indexOf('zip') >= 0 || type.indexOf('compressed') >= 0) return ico(I.archive,18);
  }
  return ico(I.doc,18);
}

    }
    statusEl.textContent='('+(si+1)+'/6) Saving '+sc.name+'...';
    candidates.push(sc);
    try{
      await syncCandidateToDb(sc);
      added++;
      statusEl.textContent='('+(si+1)+'/6) '+sc.name+' saved ✓';
    }catch(e){
      candidates.splice(candidates.indexOf(sc),1);
      statusEl.textContent='Error on '+sc.name+': '+e.message;
      console.error('[seed]',e);
      if(btn)btn.disabled=false;
      return;
    }
  }
  statusEl.textContent='Done — '+added+' added, '+skipped+' skipped. Reloading...';
  setTimeout(function(){window.location.reload();},1500);
}

// ── INIT ──────────────────────────────────────────
async function initApp(){
  sb=supabase.createClient(SUPA_URL,SUPA_KEY);
  var body=document.getElementById('lc-body');
  var origHtml=body.innerHTML;
  body.innerHTML='<div class="skel" style="height:18px;width:110px;margin-bottom:8px"></div>'
    +'<div class="skel" style="height:11px;width:220px;margin-bottom:20px"></div>'
    +'<div class="skel" style="height:9px;width:80px;margin-bottom:6px"></div>'
    +'<div class="skel" style="height:38px;margin-bottom:16px"></div>'
    +'<div class="skel" style="height:38px"></div>';
  try{
    var loaded=await Promise.all([loadUsers(),loadFacilities(),loadCandidates(),loadRoles(),loadFacilityChecklists(),loadFollowups(),loadComplianceRequirements()]);
    users=loaded[0];facilities=loaded[1];candidates=loaded[2];roles=loaded[3];facilityChecklists=loaded[4];followups=loaded[5];complianceRequirements=loaded[6];
    // Resolve submission facility names (no 'facility' text col in DB — derive from facilityId)
    candidates.forEach(function(c){c.submissions.forEach(function(s){if(!s.facility&&s.facilityId){var f=facilities.find(function(fac){return fac.id===s.facilityId;});if(f)s.facility=f.name;}});});
    reconcileCompliance();
    backfillComplianceLabels();
    backfillSubmissionFollowups();
    body.innerHTML=origHtml;
    initLogin();
  }catch(e){
    console.error('[initApp]',e);
    // Distinguish a real connectivity/DB failure (network TypeError, or a PostgREST
    // error object with code/details/hint) from a JS bug in our own code (which would
    // otherwise misleadingly present as "Connection failed" with no way to diagnose it).
    var isPgError=e&&typeof e==='object'&&('code' in e)&&('details' in e||'hint' in e);
    var msg=String((e&&e.message)||e||'');
    var isNetworkError=(typeof navigator!=='undefined'&&navigator.onLine===false)||/fetch|network/i.test(msg);
    var label=(isPgError||isNetworkError)?'Connection failed':'Application error';
    body.innerHTML='<div style="text-align:center;padding:12px 0 4px">'
      +'<div style="width:40px;height:40px;border-radius:50%;background:var(--danger-l);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--danger)">'+I.warn+'</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:6px">'+label+'</div>'
      +'<div style="font-size:11px;color:var(--t3);margin-bottom:16px;word-break:break-word">'+esc(msg)+'</div>'
      +'<button class="lc-btn" onclick="initApp()">Retry</button></div>';
  }
}
window.addEventListener('popstate',function(){if(CU)routeFromHash();});
initApp();
</script>
