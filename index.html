<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCA — Travel Nursing Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#F7F7FB;color:#1A1A2E;min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#c8cad1;border-radius:3px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#26215C!important;box-shadow:0 0 0 3px rgba(38,33,92,.1)}
:root{
  --brand:#26215C;--brand-mid:#534AB7;--brand-d:#1c1846;--brand-l:#EEEDFE;--brand-pale:#F7F6FE;
  --brand-grad:linear-gradient(135deg,#26215C,#534AB7);
  --accent:#185FA5;--accent-l:#E6F1FB;
  --ok:#0F6E56;--ok-l:#E1F5EE;
  --warn:#BA7517;--warn-l:#FAEEDA;
  --danger:#993C1D;--danger-l:#FAECE7;
  --teal:#0a7a72;--teal-l:#e3f5f3;
  --border:#e5e4ee;--border-s:#c8cad1;
  --bg:#F7F7FB;--surface:#ffffff;
  --t1:#1A1A2E;--t2:#5a5f7a;--t3:#9397ae;--t4:#c8cad1;
  --sb:#ffffff;
  --shadow-card:0 2px 6px rgba(38,33,92,.05),0 16px 32px -22px rgba(38,33,92,.4);
}
svg{fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;overflow:visible}
.app{display:flex;min-height:100vh}
#sb{width:240px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:300;overflow-y:auto}
#main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* SIDEBAR */
.sb-logo{height:56px;padding:0 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-mark{width:32px;height:32px;background:var(--brand-grad);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:500;color:#fff;letter-spacing:.5px;box-shadow:0 3px 8px rgba(38,33,92,.35)}
.sb-brand b{display:block;font-size:14px;font-weight:500;color:var(--t1);line-height:1.2}
.sb-brand small{font-size:10px;color:var(--t3);letter-spacing:.01em}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-grp{padding:4px 0 8px}
.sb-gl{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:8px 16px 4px;display:block}
.sbi{display:flex;align-items:center;gap:9px;width:calc(100% - 16px);height:38px;margin:1px 8px;padding:0 12px;cursor:pointer;font-size:13px;font-weight:400;color:var(--t2);background:none;border:none;border-radius:8px;text-align:left;position:relative;transition:all .12s;white-space:nowrap}
.sbi:hover{color:var(--t1);background:var(--bg)}
.sbi.on{color:var(--brand);font-weight:500;background:var(--brand-l)}
.sbi svg{width:15px;height:15px;stroke:currentColor;fill:none;flex-shrink:0;opacity:.7}.sbi.on svg{opacity:1}
.nb{margin-left:auto;font-size:9px;font-weight:500;padding:2px 6px;border-radius:10px;color:#fff;flex-shrink:0}
.nb-r{background:var(--danger)}.nb-b{background:var(--accent)}.nb-a{background:var(--warn)}
.sb-foot{flex-shrink:0;border-top:1px solid var(--border);padding:10px 12px}
.sb-user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 8px;border-radius:8px;transition:background .12s}
.sb-user:hover{background:var(--bg)}
.sb-av{border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:500;color:#fff;flex-shrink:0}
.sb-ui{flex:1;min-width:0}
.sb-ui b{display:block;font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ui small{font-size:10px;color:var(--t3);text-transform:capitalize}
.sb-sw{font-size:10px;color:var(--t3);background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;flex-shrink:0;transition:all .12s}
.sb-sw:hover{color:var(--brand);border-color:var(--brand)}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-l h1{font-size:18px;font-weight:500;color:var(--t1)}
.tb-l .sub{font-size:11px;color:var(--t3);margin-top:1px}
.tb-r{display:flex;align-items:center;gap:8px}
.tb-search{display:flex;align-items:center;gap:7px;color:var(--t3);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;transition:border-color .12s ease,color .12s ease;margin-left:auto;flex-shrink:0}
.tb-search:hover{border-color:var(--border-s);color:var(--t2)}
.tb-search svg{width:14px;height:14px;stroke:currentColor;fill:none;flex-shrink:0}
.tb-search span{white-space:nowrap}
.tb-search-kbd{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:0 5px;font-size:10px;font-weight:600;color:var(--t3);margin-left:4px}
.tb-recent-btn{display:flex;align-items:center;gap:6px;color:var(--t3);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;transition:border-color .12s ease,color .12s ease;flex-shrink:0}
.tb-recent-btn:hover{border-color:var(--border-s);color:var(--t2)}
.tb-recent-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;flex-shrink:0}
.tb-recent-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);z-index:150;min-width:220px;padding:6px;display:flex;flex-direction:column;gap:1px}
.tb-recent-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:7px 8px;border:none;background:none;border-radius:5px;cursor:pointer;font-size:12px;color:var(--t1)}
.tb-recent-item:hover{background:var(--brand-pale)}
.tb-recent-ico{flex-shrink:0;display:flex;color:var(--t3)}
.tb-recent-ico svg{width:14px;height:14px}
.tb-recent-txt{display:flex;flex-direction:column;min-width:0}
.tb-recent-txt b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-recent-txt small{font-size:10px;color:var(--t3)}
.abar{background:var(--brand-d);padding:7px 20px;display:flex;align-items:center;gap:9px;font-size:11px;color:rgba(255,255,255,.88)}
.abar svg{width:12px;height:12px;stroke:rgba(255,255,255,.6);fill:none;flex-shrink:0}
.abar .dis{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.4);font-size:15px;cursor:pointer}
.page{padding:16px 20px;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:8px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;font-size:12px;padding:6px 13px}
.btn:active{transform:translateY(1px);opacity:.85}
.btn:focus-visible,button:focus-visible{outline:2px solid var(--brand);outline-offset:2px;box-shadow:0 0 0 4px rgba(38,33,92,.15)}
.btn svg{width:12px;height:12px;flex-shrink:0}
.btn-p{background:var(--brand-grad);color:#fff;box-shadow:0 2px 6px rgba(38,33,92,.3)}.btn-p:hover{background:var(--brand-mid);box-shadow:0 3px 10px rgba(38,33,92,.4)}
.btn-a{background:var(--accent);color:#fff}.btn-a:hover{background:#124876}
.btn-g{background:var(--surface);color:var(--t2);border:0.5px solid var(--border)}.btn-g:hover{background:var(--bg);border-color:var(--border-s)}
.btn-d{background:var(--danger);color:#fff}
.btn-ok{background:var(--ok-l);color:var(--ok);border:1px solid #a0d8b0;font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;font-weight:500;transition:background .12s ease}
.btn-ok:hover{background:#d5f0de}.btn-ok:active{transform:translateY(1px)}
.btn-rj{background:var(--danger-l);color:var(--danger);border:1px solid #f0b8b8;font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;font-weight:500;transition:background .12s ease}
.btn-rj:hover{background:#fbd9d9}.btn-rj:active{transform:translateY(1px)}
.btn-sm{font-size:11px;padding:4px 10px}.btn-xs{font-size:10px;padding:3px 7px;border-radius:6px}
.btn-ghost{background:transparent;color:var(--brand);font-size:11px;padding:4px 7px;border-radius:6px;transition:background .12s ease}.btn-ghost:hover{background:var(--brand-l)}.btn-ghost:active{opacity:.8}

/* INTERACTION STATES */
.row-hover{cursor:pointer;transition:background .12s ease}
.row-hover:hover{background:var(--brand-pale)}
.dim-hover{cursor:pointer;transition:opacity .12s ease}
.dim-hover:hover{opacity:.85}
.icon-btn-danger{background:none;border:none;cursor:pointer;color:var(--t3);transition:color .12s ease}
.icon-btn-danger:hover{color:var(--danger)}
.toggle-pill{padding:4px 12px;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;color:var(--t2);background:transparent;transition:background .12s ease,color .12s ease}
.toggle-pill:hover{background:rgba(38,33,92,.1)}
.toggle-pill.on{background:var(--brand);color:#fff}
.card.clickable{cursor:pointer;transition:box-shadow .12s ease,border-color .12s ease,transform .12s ease}
.card.clickable:hover{box-shadow:0 4px 10px rgba(38,33,92,.08),0 20px 36px -22px rgba(38,33,92,.45);border-color:var(--brand);transform:translateY(-1px)}

/* CARDS */
.card{background:var(--surface);border-radius:16px;border:0.5px solid var(--border);box-shadow:var(--shadow-card)}
.card>.tbl:first-child th:first-child{border-top-left-radius:15px}
.card>.tbl:first-child th:last-child{border-top-right-radius:15px}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:6px}
.card-title svg{width:13px;height:13px;stroke:var(--t3);fill:none}

/* STATS */
.stats{display:grid;gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border-radius:8px;padding:13px 15px;border:1px solid var(--border);border-top:3px solid transparent}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.stat-val{font-size:22px;font-weight:800;color:var(--t1);line-height:1;font-variant-numeric:tabular-nums}
.stat-tbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.stat-tf{height:100%;border-radius:2px;transition:width .4s}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);padding:8px 12px;background:#f7f8fc;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:50px;z-index:2}
.tbl td{padding:9px 12px;border-bottom:1px solid #f0f1f5;font-size:12px;vertical-align:middle;color:var(--t1)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover td{background:var(--brand-pale)}
.tbl tbody tr.r-alert td{background:#fff8f8}
.cp{font-weight:600;color:var(--t1)}.cs{font-size:10px;color:var(--t3);margin-top:1px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:500;padding:2px 7px;border-radius:6px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.b-pu{background:var(--brand-l);color:var(--brand)}.b-bl{background:var(--accent-l);color:var(--accent)}
.b-tl{background:var(--teal-l);color:var(--teal)}.b-gn{background:var(--ok-l);color:var(--ok)}
.b-am{background:var(--warn-l);color:var(--warn)}.b-rd{background:var(--danger-l);color:var(--danger)}
.match-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.match-strong{background:var(--ok-l);color:var(--ok)}.match-poss{background:var(--warn-l);color:var(--warn)}
.sla-chip{display:inline-flex;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap}
.sla-a{background:var(--warn-l);color:var(--warn)}.sla-r{background:var(--danger-l);color:var(--danger)}
.kb-wrap{display:flex;gap:12px;overflow-x:auto;padding:14px 14px 20px;align-items:flex-start}
.kb-col{min-width:230px;flex:0 0 230px;display:flex;flex-direction:column}
.kb-hd{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:9px 12px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;gap:6px}
.kb-cards{background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:8px;min-height:56px;display:flex;flex-direction:column;gap:8px}
.kb-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:10px 12px;cursor:pointer;box-shadow:var(--shadow-card);transition:box-shadow .12s;position:relative}
.kb-card:hover{box-shadow:0 4px 10px rgba(38,33,92,.08),0 20px 36px -22px rgba(38,33,92,.45)}
.kb-menu-btn{position:absolute;top:5px;right:5px;width:22px;height:22px;border:none;background:transparent;border-radius:4px;cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:15px;padding:0;line-height:1}
.kb-menu-btn:hover{background:var(--border);color:var(--t1)}
.kb-menu{position:absolute;top:26px;right:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.13);z-index:100;min-width:164px;padding:4px 0}
.kb-mi{display:block;width:100%;text-align:left;padding:6px 12px;font-size:11px;border:none;background:none;cursor:pointer;color:var(--t1);white-space:nowrap}
.kb-mi:hover{background:var(--brand-pale)}
.kb-ml{padding:5px 12px 2px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.kb-ms{height:1px;background:var(--border);margin:3px 0}
.sub-st-sel{font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;background:#fff;color:var(--t1);cursor:pointer}
.b-gr{background:#f0f1f5;color:#454e68}.b-ny{background:#e5eaf5;color:#1a3060}
.b-or{background:#fff0e5;color:#8a3800}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.d-gn{background:var(--ok)}.d-am{background:#d4900a}.d-rd{background:var(--danger)}.d-gr{background:var(--border-s)}.d-pu{background:var(--brand)}

/* PROGRESS */
.prog{display:flex;align-items:center;gap:6px}
.prog-t{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;transition:width .35s}
.prog-lbl{font-size:10px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.pbar{display:flex;height:3px;border-radius:2px;overflow:hidden;background:var(--border)}
.pseg{flex:1;margin-right:1px}.pseg:last-child{margin-right:0}

/* PIPELINE STRIP */
.pipe-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px;overflow-x:auto}
.pipe-steps{display:flex;align-items:center}
.pipe-node{display:flex;flex-direction:column;align-items:center;padding:6px 9px;border-radius:4px;cursor:pointer;transition:all .12s;min-width:76px;border:1px solid transparent;gap:3px}
.pipe-node:hover{background:var(--brand-l)}.pipe-node.on{background:var(--brand-l);border-color:var(--brand)}
.pipe-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff}
.pipe-nl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t2);text-align:center;line-height:1.3}
.pipe-node.on .pipe-nl{color:var(--brand)}
.pipe-cnt{font-size:11px;font-weight:800;font-variant-numeric:tabular-nums}
.pipe-ch{font-size:11px;color:var(--border-s);margin:0 1px;flex-shrink:0}

/* FILTER */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.sw-wrap{position:relative;display:inline-flex;align-items:center}
.sw-wrap input{padding:6px 10px 6px 27px;border:1px solid var(--border);border-radius:4px;font-size:12px;width:220px;background:var(--surface)}
.sw-ico{position:absolute;left:8px;width:12px;height:12px;stroke:var(--t3);fill:none;pointer-events:none}
.fpill{padding:5px 10px;border-radius:3px;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--t3);cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.05em}
.fpill.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand)}

/* SLIDE PANEL */
#panel{position:fixed;top:0;right:0;bottom:0;width:430px;background:var(--surface);border-left:1px solid var(--border);z-index:250;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease;box-shadow:-8px 0 32px rgba(38,33,92,.18)}
#panel.open{transform:translateX(0)}
.p-hdr{padding:15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--brand-grad)}
.p-hdr h2{font-size:14px;font-weight:500;color:#fff}
.p-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1}
.p-close:hover{color:#fff}
.p-scroll{overflow-y:auto;flex:1}
.p-tabs{display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.ptab-scroll{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}
.ptab-scroll::-webkit-scrollbar{display:none}
.ptab-arr{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:14px;padding:0 8px;cursor:pointer;transition:color .12s;line-height:1;display:flex;align-items:center}
.ptab-arr:hover{color:var(--brand)}

/* JOB BOARD */
.jb-filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:12px 14px;background:var(--surface);border-radius:14px;border:0.5px solid var(--border);box-shadow:var(--shadow-card)}
.jb-filter-bar select{padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:#fff;color:var(--t1);cursor:pointer;font-family:inherit}
.jb-filter-bar select:focus{outline:none;border-color:var(--brand)}
.jb-split{display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start}
.jb-list{display:flex;flex-direction:column;gap:8px}
.jb-detail{position:sticky;top:10px}
.role-card{background:var(--surface);border:0.5px solid var(--border);border-left:4px solid var(--border);border-radius:14px;padding:12px 14px;cursor:pointer;box-shadow:var(--shadow-card);transition:box-shadow .12s,border-color .12s}
.role-card:hover{box-shadow:0 4px 10px rgba(38,33,92,.08),0 20px 36px -22px rgba(38,33,92,.45);border-color:var(--brand)}
.role-open{border-left-color:var(--ok)}
.role-likely{border-left-color:var(--warn)}
.role-sel{border-color:var(--brand);box-shadow:0 0 0 2px rgba(38,33,92,.15)}
.role-detail-card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow-card)}
.match-pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.02em;vertical-align:middle}
.match-strong{background:#e8f5e9;color:#2e7d32}
.match-poss{background:#fff3e0;color:#b45309}
/* CANDIDATE FULL PAGE */
.cp-wrap{display:grid;grid-template-columns:240px 1fr;gap:18px;align-items:start;padding:14px 16px}
.cp-left{position:sticky;top:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.cp-avatar{width:60px;height:60px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin:0 auto 10px;letter-spacing:1px}
.cp-name{font-size:14px;font-weight:700;color:var(--t1);line-height:1.3}
.cp-pref{display:block;font-size:10px;font-weight:400;color:var(--t3);margin-top:1px}
.cp-sub{font-size:10px;color:var(--t2);margin:4px 0 8px}
.cp-comp-row{display:flex;justify-content:space-between;align-items:center;margin:10px 0 4px}
.cp-contact{display:flex;flex-direction:column;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.cp-cta{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--t1);text-decoration:none;transition:background .12s}
.cp-cta:hover{background:var(--surface);border-color:var(--brand);color:var(--brand)}
.cp-nav{display:flex;flex-direction:column;gap:1px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);text-align:left}
.cp-nav-a{display:block;font-size:11px;color:var(--t2);padding:5px 8px;border-radius:4px;text-decoration:none;cursor:pointer;transition:background .12s,color .12s}
.cp-nav-a:hover{background:var(--bg);color:var(--brand)}
.cp-right{display:flex;flex-direction:column;gap:10px}
.cp-sec{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;box-shadow:var(--shadow-card);overflow:hidden}
.cp-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none}
.cp-sec-hdr:hover{background:var(--bg)}
.cp-sec-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--t2)}
.cp-sec-acts{display:flex;align-items:center;gap:7px}
.cp-arr{font-size:10px;color:var(--t3);transition:transform .12s}
.cp-sec.cp-closed .cp-arr{transform:rotate(-90deg)}
.cp-sec.cp-closed .cp-sec-body{display:none}
.cp-sec-body{padding:14px 16px;border-top:1px solid var(--border)}
.cp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}
.cp-cell{font-size:11px}
.cp-lbl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:2px}
.cp-val{color:var(--t1);line-height:1.5}
.cp-full{grid-column:span 2}
/* Candidate page — layout & left column cards */
.entity-page{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start;padding:24px}
.entity-left{position:sticky;top:24px;display:flex;flex-direction:column;gap:12px}
.entity-right{min-width:0}
.cp-tabbar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto;flex-shrink:0}
.cp-tab{padding:10px 14px;font-size:12px;font-weight:400;color:var(--t3);cursor:pointer;border:none;background:none;border-radius:8px 8px 0 0;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap}
.cp-tab:hover{color:var(--t1);background:var(--bg)}
.cp-tab.on{color:var(--brand);font-weight:500;background:var(--brand-l);border-bottom-color:var(--brand)}
/* FILES COMPONENT */
.files-drop{border:2px dashed var(--border-s);border-radius:8px;padding:22px;text-align:center;cursor:pointer;transition:border-color .12s,background .12s;background:var(--bg);margin-bottom:14px}
.files-drop:hover,.files-drop.drag-on{border-color:var(--brand);background:var(--brand-pale)}
.files-drop-txt{font-size:12px;color:var(--t2);font-weight:600}
.files-drop-sub{font-size:10px;color:var(--t3);margin-top:3px}
.files-pending{border:1px solid var(--border);border-radius:7px;padding:10px;margin-bottom:14px;background:var(--surface)}
.files-pending-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.files-pending-row:last-of-type{border-bottom:none}
.files-tbl{width:100%;border-collapse:collapse;font-size:12px}
.files-tbl th{position:sticky;top:50px;background:var(--surface);z-index:1;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);font-weight:700;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
.files-tbl th:hover{color:var(--brand)}
.files-tbl td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.files-tbl tr.superseded td{opacity:.5}
.files-cat-sel{font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;border:none;text-transform:uppercase;letter-spacing:.03em;cursor:pointer}
.files-act-btn{background:none;border:none;cursor:pointer;color:var(--t3);padding:3px;border-radius:4px;display:inline-flex;align-items:center}
.files-act-btn:hover{background:var(--bg);color:var(--brand)}
.files-act-btn.danger:hover{background:var(--danger-l);color:var(--danger)}
.profile-card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow-card);text-align:center}
.profile-avatar{width:64px;height:64px;border-radius:18px;background:var(--brand-grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;margin:0 auto 12px;letter-spacing:1px;box-shadow:0 4px 12px rgba(38,33,92,.3)}
.profile-name{font-size:18px;font-weight:500;color:var(--t1);line-height:1.3}
.profile-pref{display:block;font-size:11px;font-weight:400;color:var(--t3);margin-top:4px}
.profile-sub{font-size:12px;color:var(--t2);margin:4px 0 12px}
.compliance-bar-wrap{margin:12px 0}
.compliance-bar-label{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--t3);margin-bottom:4px}
.compliance-bar{height:6px;border-radius:3px;background:var(--bg);overflow:hidden}
.compliance-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.contact-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);font-size:12px;color:var(--t1);text-decoration:none;margin-top:6px;cursor:pointer;box-sizing:border-box}
.contact-btn:hover{background:var(--brand-l);border-color:var(--brand);color:var(--brand)}
.contact-btn svg{width:14px;height:14px;flex-shrink:0}
.nticon svg{width:16px;height:16px;flex-shrink:0}
.facts-card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow-card)}
.card-section-title{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.key-facts{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.key-fact-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:2px}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)}
.key-fact-value{font-size:12px;font-weight:500;color:var(--t1)}
.team-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.team-row:last-child{margin-bottom:0}
.team-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:500}
.team-name{font-size:12px;font-weight:500;color:var(--t1);line-height:1.2}
.team-role{font-size:10px;color:var(--t3)}
.section-nav{display:flex;flex-direction:column;gap:1px}
.section-nav a{display:block;padding:7px 10px;border-radius:5px;font-size:12px;color:var(--t2);text-decoration:none;cursor:pointer;transition:background .12s,color .12s}
.section-nav a:hover{background:var(--brand-pale);color:var(--brand)}
.cp-edit-foot{display:flex;gap:7px;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.ptab{padding:9px 13px;font-size:11px;font-weight:500;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .12s}
.ptab.on{color:var(--brand);font-weight:700;border-bottom-color:var(--brand)}

/* ACTIVITY FEED */
.act-entry{display:flex;gap:9px;padding:11px 15px;border-bottom:1px solid #f0f1f5;transition:background .12s}
.act-entry:hover{background:#f7f8fc}
.act-entry:last-child{border-bottom:none}
.act-dot-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.act-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-icon svg{width:12px;height:12px}
.act-line{flex:1;width:1px;background:var(--border);margin-top:3px;min-height:8px}
.act-body{flex:1}
.act-meta{font-size:10px;color:var(--t3);margin-bottom:2px;display:flex;align-items:center;gap:5px}
.act-tbadge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;text-transform:uppercase}
.act-content{font-size:12px;color:var(--t1);line-height:1.55}
.act-author{font-size:10px;color:var(--t3);margin-top:2px}
.note-add{padding:11px 15px;background:#f7f8fc;border-top:1px solid var(--border);flex-shrink:0}
.note-types{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.nt-btn{padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--t3);cursor:pointer;transition:all .12s;text-transform:uppercase}
.nt-btn.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.note-add textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:12px;resize:none;height:62px;color:var(--t1)}
.note-add-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(26,26,46,.5);backdrop-filter:blur(2px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:16px;width:100%;max-height:94vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(26,26,46,.32)}
.mhdr{padding:15px 18px;background:var(--brand-grad);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhdr h2{font-size:14px;font-weight:500;color:#fff}
.mclose{background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1}
.mclose:hover{color:#fff}
.mscroll{overflow-y:auto;flex:1}
.mfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg);flex-shrink:0}
.mtabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;overflow-x:auto}
.mtab{padding:9px 14px;font-size:11px;font-weight:400;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .12s}
.mtab.on{color:var(--brand);font-weight:500;border-bottom-color:var(--brand)}

/* INFO STRIP */
.istrip{display:flex;gap:0;border-bottom:1px solid var(--border);background:#f7f8fc;overflow-x:auto;flex-shrink:0}
.icell{padding:9px 13px;border-right:1px solid var(--border);flex-shrink:0}
.icell:last-child{border-right:none}
.icell-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:2px}
.icell-val{font-size:11px;font-weight:600;color:var(--t1)}

/* FORMS */
.fb{padding:15px 17px}
.fr{display:grid;gap:10px;margin-bottom:11px}
.f1{grid-template-columns:1fr}.f2{grid-template-columns:1fr 1fr}.f3{grid-template-columns:1fr 1fr 1fr}.f4{grid-template-columns:repeat(4,1fr)}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2)}
.fg input,.fg select,.fg textarea{padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--t1);background:var(--surface);width:100%}
.fg textarea{resize:vertical;font-family:inherit;min-height:58px}
.req{color:var(--danger)}
.sh{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:15px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* COMPLIANCE */
.ci{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:4px;border:1px solid var(--border);margin-bottom:5px;background:var(--surface)}
.ci.done{background:#f5fdf8;border-color:#a0d8b0}
.ci.exp{background:#fffdf5;border-color:#e8c850}
.ci.xpd{background:#fff8f8;border-color:#f0b8b8}
.ci-cb{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border-s);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff}
.ci-cb.chk{background:var(--ok);border-color:var(--ok)}
.ci-cb svg{width:9px;height:9px;stroke:#fff;fill:none;stroke-width:2.5}
.ci-name{font-size:11px;font-weight:600;color:var(--t1)}
.ci.done .ci-name{text-decoration:line-through;color:var(--t3);font-weight:400}
.ci-desc{font-size:10px;color:var(--t3);margin-top:1px}
.ci-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.doc-ref{font-size:9px;background:var(--brand-l);color:var(--brand);padding:2px 5px;border-radius:2px;display:inline-flex;align-items:center;gap:3px;font-weight:700}
.att-btn{font-size:9px;padding:2px 6px;border-radius:2px;border:1px dashed var(--border-s);background:none;color:var(--t3);cursor:pointer}
.att-btn:hover{border-color:var(--brand);color:var(--brand)}

/* RATE CALC */
.rate-calc{background:linear-gradient(135deg,var(--brand-l),var(--accent-l));border:1px solid rgba(38,33,92,.2);border-radius:10px;padding:12px 14px;margin-top:9px}
.rate-calc-lbl{font-size:9px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
.rate-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.rc{background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.rc-lbl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:2px}
.rc-val{font-size:15px;font-weight:500;color:var(--t1);font-variant-numeric:tabular-nums;line-height:1}
.rc-val small{font-size:9px;font-weight:400;color:var(--t3)}
.rc.hi{background:var(--brand-grad);border-color:var(--brand)}
.rc.hi .rc-lbl{color:rgba(255,255,255,.6)}.rc.hi .rc-val{color:#fff}.rc.hi .rc-val small{color:rgba(255,255,255,.6)}
.btbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
.btbl th{padding:5px 7px;font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);background:var(--brand-l);border-bottom:1px solid rgba(38,33,92,.2);text-align:left}
.btbl td{padding:5px 7px;border-bottom:1px solid var(--border)}
.btbl tr:nth-child(even) td{background:var(--bg)}
.btbl tr:last-child td{border-bottom:none}
.btbl .br{text-align:center;font-variant-numeric:tabular-nums;font-weight:500}
.btbl .bl{text-align:center;font-variant-numeric:tabular-nums;font-weight:500;color:var(--brand)}

/* CALLOUTS */
.callout{border-radius:4px;padding:9px 12px;font-size:11px;line-height:1.6;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start}
.callout svg{width:12px;height:12px;flex-shrink:0;margin-top:1px}
.c-blue{background:var(--accent-l);border:1px solid rgba(24,95,165,.3);color:var(--accent)}
.c-amber{background:var(--warn-l);border:1px solid rgba(186,117,23,.3);color:var(--warn)}
.c-green{background:var(--ok-l);border:1px solid rgba(15,110,86,.3);color:var(--ok)}
.c-red{background:var(--danger-l);border:1px solid rgba(153,60,29,.3);color:var(--danger)}
.c-purple{background:var(--brand-l);border:1px solid rgba(38,33,92,.25);color:var(--brand)}

/* ALERT ITEMS */
.ai{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:4px;margin-bottom:5px;border:1px solid;cursor:pointer}
.ai:hover{opacity:.85}
.ai-r{background:#fff8f8;border-color:#f0b8b8}.ai-a{background:#fffdf5;border-color:#e8c850}.ai-b{background:#f5f8ff;border-color:#b0c8f0}
.ai svg{width:13px;height:13px;flex-shrink:0;margin-top:1px}
#page .card svg{width:14px;height:14px}
.ai-title{font-size:11px;font-weight:700;color:var(--t1);margin-bottom:1px}
.ai-desc{font-size:10px;color:var(--t2);line-height:1.5}
.ai-act{margin-left:auto;font-size:9px;font-weight:700;padding:3px 7px;border-radius:3px;border:none;cursor:pointer;flex-shrink:0;background:var(--ok-l);color:var(--ok);transition:opacity .12s ease,transform .12s ease}
.ai-act:hover{opacity:.8}.ai-act:active{transform:translateY(1px)}
@keyframes flash-amber{0%{background:rgba(251,191,36,.32)}100%{background:transparent}}
.flash-hl{animation:flash-amber 2s ease forwards}

/* TRAVEL */
.tb-block{background:#f7f8fc;border:1px solid var(--border);border-radius:4px;padding:11px;margin-bottom:8px}
.tb-block.appr{background:#f5fdf8;border-color:#a0d8b0}.tb-block.rej{background:#fff8f8;border-color:#f0b8b8}
.tb-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.tb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2)}
.ap-pill{font-size:9px;font-weight:500;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.ap-p{background:var(--warn-l);color:var(--warn)}.ap-ok{background:var(--ok-l);color:var(--ok)}.ap-r{background:var(--danger-l);color:var(--danger)}

/* CON TOGGLE */
.con-toggle{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.con-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:3px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--t2);transition:all .12s}
.con-pill:hover{border-color:var(--brand);color:var(--brand)}
.con-pill.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand)}

/* HOT STAR */
.hot-star{cursor:pointer;color:var(--t4);font-size:14px;transition:color .12s;background:none;border:none;padding:0 2px;line-height:1}
.hot-star.on{color:#d4900a}.hot-star:hover{color:#d4900a}

/* GLOBAL SEARCH */
.sr-overlay{position:fixed;inset:0;background:rgba(26,26,46,.5);backdrop-filter:blur(2px);z-index:400;display:flex;align-items:flex-start;justify-content:center;padding-top:70px}
.sr-box{background:var(--surface);border-radius:16px;width:100%;max-width:560px;max-height:70vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(26,26,46,.32)}
.sr-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sr-head svg{width:14px;height:14px;stroke:var(--t3);fill:none;flex-shrink:0}
.sr-head input{flex:1;border:none;font-size:14px;color:var(--t1);outline:none}
.sr-head button{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer}
.sr-results{overflow-y:auto;flex:1}
.sr-sec{padding:7px 15px 3px;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.sr-item{display:flex;align-items:flex-start;gap:9px;padding:8px 15px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
.sr-item:hover{background:var(--bg)}.sr-item:last-child{border-bottom:none}
.sr-icon{width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sr-icon svg{width:12px;height:12px}
.sr-title{font-size:12px;font-weight:500;color:var(--t1)}
.sr-sub{font-size:10px;color:var(--t3);margin-top:1px}
.sr-hl{background:#fff3b0;border-radius:2px;padding:0 2px}
.sr-empty{padding:24px;text-align:center;color:var(--t3);font-size:12px}

/* MISC */
.empty-st{padding:36px 24px;text-align:center;color:var(--t3);font-size:12px}
.empty-st svg{width:32px;height:32px;stroke:var(--border);fill:none;margin:0 auto 8px;display:block}
.empty-st b{display:block;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:4px}
.empty-st p{font-size:12px;color:var(--t3);margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-ring{width:32px;height:32px;border:3px solid var(--brand-l);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes shimmer{0%{background-position:-320px 0}100%{background-position:320px 0}}
.skel{background:linear-gradient(90deg,#e8e9ee 25%,#f1f2f5 37%,#e8e9ee 63%);background-size:640px 100%;animation:shimmer 1.4s ease infinite;border-radius:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* TEAM PAGE (previously unstyled) */
.cons-card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;box-shadow:var(--shadow-card);padding:16px;cursor:pointer;transition:box-shadow .12s,border-color .12s}
.cons-card:hover{box-shadow:0 4px 10px rgba(38,33,92,.08),0 20px 36px -22px rgba(38,33,92,.45);border-color:var(--brand)}
.cons-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cons-av{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:500}
.cons-name{font-size:13px;font-weight:500;color:var(--t1)}
.cons-role{font-size:10px;color:var(--t3);margin-top:1px}
.cons-hdr .badge{margin-left:auto}
.cons-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;background:var(--bg);border-radius:10px;padding:10px}
.cs-lbl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:3px}
.cs-val{font-size:13px;font-weight:500;color:var(--t1)}
.cons-cands{display:flex;flex-wrap:wrap;gap:5px}
.adm-card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;box-shadow:var(--shadow-card);padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:box-shadow .12s,border-color .12s}
.adm-card:hover{box-shadow:0 4px 10px rgba(38,33,92,.08),0 20px 36px -22px rgba(38,33,92,.45);border-color:var(--brand)}
.adm-name{font-size:13px;font-weight:500;color:var(--t1)}
.adm-role{font-size:11px;color:var(--t3);margin-top:2px;flex:1}
.note-box{background:#fffef0;border:1px solid #e8da70;border-radius:4px;padding:9px 11px;font-size:11px;color:var(--t2);line-height:1.65;white-space:pre-wrap}
.reg-chip{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px;cursor:pointer;border:1px solid;margin:2px;transition:all .12s;text-transform:uppercase}
.reg-chip.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.reg-chip.unsel{background:#fff;color:var(--t3);border-color:var(--border)}
.reg-chip:hover{border-color:var(--brand);color:var(--brand)}
.redepl-badge{font-size:9px;font-weight:700;background:#fff3b0;color:#7a5200;padding:2px 5px;border-radius:2px;display:inline-block;margin-left:4px}
.toast{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:10px;font-size:11px;font-weight:500;color:#fff;box-shadow:0 8px 24px rgba(26,26,46,.25);z-index:9999;display:none}
.job-toast-stack{position:fixed;top:18px;right:18px;z-index:9998;display:flex;flex-direction:column;gap:10px;max-width:340px}
.job-toast{background:var(--brand-grad);color:#fff;border-radius:14px;box-shadow:0 8px 24px rgba(26,26,46,.28);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;opacity:0;transform:translateX(24px);transition:opacity .2s,transform .2s}
.job-toast.show{opacity:1;transform:translateX(0)}
.job-toast-icon{flex-shrink:0;color:#ffd166;margin-top:1px}
.job-toast-body{flex:1;min-width:0}
.job-toast-title{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;opacity:.85;margin-bottom:3px}
.job-toast-msg{font-size:12px;line-height:1.4;font-weight:400}
.job-toast-acts{display:flex;gap:6px;margin-top:8px}
.job-toast-acts button{font-size:10px;padding:4px 10px}
.job-toast-acts .btn-p{background:#fff;color:var(--brand);border-color:#fff}
.job-toast-acts .btn-g{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}
.job-toast-close{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:15px;line-height:1;padding:0;flex-shrink:0}
.job-toast-close:hover{color:#fff}
.sb-mute.muted{color:#ffd166;border-color:#ffd166}
.jb-new-chip{background:var(--danger);color:#fff;font-size:8px;font-weight:500;letter-spacing:.05em;padding:1px 5px;border-radius:3px;text-transform:uppercase}

/* LOGIN */
#ls{position:fixed;inset:0;background:linear-gradient(135deg,#1a1d2e,#250d48 50%,#003888 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.lc{background:var(--surface);border-radius:8px;padding:30px 26px;width:100%;max-width:380px;box-shadow:0 28px 70px rgba(0,0,0,.35)}
.lc-logo{display:flex;align-items:center;gap:11px;margin-bottom:20px}
.lc-mark{width:34px;height:34px;background:var(--brand);border-radius:7px;display:flex;align-items:center;justify-content:center}

.lc-brand b{display:block;font-size:13px;font-weight:800;color:var(--t1)}

.lc h2{font-size:18px;font-weight:800;color:var(--t1);margin-bottom:3px}
.lc p{font-size:11px;color:var(--t3);margin-bottom:17px}
.lc label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:4px;display:block}
.lc select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:4px;font-size:13px;margin-bottom:12px;cursor:pointer}
.lc select:focus{border-color:var(--brand);outline:none}
.lc-prev{min-height:30px;margin-bottom:15px}
.lc-btn{width:100%;padding:10px;background:var(--brand);color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer}
.lc-btn:hover{background:#4e2490}
@media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)!important}.g2,.g3{grid-template-columns:1fr}.f2,.f3,.f4{grid-template-columns:1fr}.rate-grid{grid-template-columns:repeat(2,1fr)}#panel{width:100%}}

async function reconcileCompliance(){

  // candidates are loaded, checked/status are already forced consistent in memory —
  // any raw DB inconsistency (checked=true but status still 'Not Started') is invisible
  // here. Query the raw rows directly so we can actually find and fix it.
  var raw=await sb.from('compliance_items').select('id,checked,status');

    Object.keys(c.compliance.items||{}).forEach(function(key){
      var it=c.compliance.items[key];
      if(it.id&&byId[it.id]){it.status='Received';it.checked=true;}
    });
  });
  await Promise.all(fixes.map(function(f){
    return sb.from('compliance_items').update({status:f.status,checked:f.checked}).eq('id',f.id);

// AUTOMATIONS
function getAutos(cands){
  var alerts=[];
  cands.forEach(function(c){
    c.submissions.forEach(function(s,i){
      if(s.status==="Submitted"){
        followups.filter(function(f){return f.submissionId===s.id&&f.status==='Pending';}).forEach(function(f){
          var overdueMs=Date.now()-new Date(f.dueAt).getTime();
          if(overdueMs<0)return;
          var is48=f.label==='48h chase';
          var hrs=Math.floor(overdueMs/3600000);
          alerts.push({id:'followup:'+f.id,level:is48?"red":"amber",type:"sub",
            title:(is48?"48h overdue":"24h due")+": "+c.name,
            desc:"Submitted to "+s.facility+" — "+f.label+", "+hrs+"h since due. Call now.",
            cid:c.id,si:i,subId:s.id,followupId:f.id,tab:"Submissions"});
        });
      }
      if(s.status==="Promoting"){var dSt=ddiff(s.submittedDate);if(dSt!==null&&dSt<=-7)alerts.push({id:'promoting:'+s.id,level:"amber",type:"sub",title:"Still promoting: "+c.name,desc:"In Promoting for "+Math.abs(dSt)+"d at "+s.facility+". Submit or close.",cid:c.id,tab:"Submissions"});}
    });
    var ci=ciStatus(c);
    if(ci.stale&&["Active","Screening","Compliance","On Assignment","Redeployment"].indexOf(c.phase)>=0)alerts.push({id:'checkin:'+c.id,level:"red",type:"checkin",title:"No check-in 14+ days: "+c.name,desc:"Last: "+(c.lastCheckin?fmt(c.lastCheckin):"never")+" — Phase: "+c.phase,cid:c.id,tab:"Activity"});
    c.contracts.forEach(function(k){
      var d=ddiff(k.endDate);
      if(d!==null&&d>=0&&d<=(k.alertDays||14)&&k.status==="Active")alerts.push({id:'contract:'+k.id,level:d<=7?"red":"amber",type:"contract",title:"Contract expires "+d+"d: "+c.name,desc:k.facility+" — "+k.ward+" — ends "+fmt(k.endDate),cid:c.id,tab:"Contracts"});
      if(d!==null&&d>(k.alertDays||14)&&d<=21&&k.status==="Active")alerts.push({id:'extend:'+k.id,level:"blue",type:"extend",title:"Discuss extension: "+c.name,desc:"Contract at "+k.facility+" ends in "+d+" days.",cid:c.id,tab:"Contracts"});
      if(["Signed","Active"].indexOf(k.status)>=0){var lnk=c.travel.flights.concat(c.travel.accommodation).filter(function(t){return t.contractId===k.id;});if(!lnk.length)alerts.push({id:'travel:'+k.id,level:"amber",type:"travel",title:"No travel arranged: "+c.name,desc:"Active contract at "+k.facility+". Start: "+fmt(k.startDate),cid:c.id,tab:"Travel & Expenses"});}
      if(d!==null&&d>=22&&d<=45&&k.status==="Active")alerts.push({id:'redeploy:'+k.id,level:"blue",type:"redeploy",title:"Redeployment window: "+c.name,desc:"Contract ends "+fmt(k.endDate)+" ("+d+"d). Source next placement.",cid:c.id,tab:"Contracts"});
    });
    getCmpItems(c).forEach(function(item){
      var ci2=c.compliance.items[item.key];
      if(!ci2||!ci2.expiry)return;
      var d=ddiff(ci2.expiry);
      if(d===null)return;
      var isAhpra=item.key==='ahpra';
      var type=isAhpra?'ahpra':'comp';
      var aid=type+':'+c.id+':'+item.key;
      if(d<0){
        alerts.push({id:aid,level:'red',type:type,title:item.label+' EXPIRED',desc:c.name+' — expired '+Math.abs(d)+'d ago',cid:c.id,key:item.key,itemName:item.label,tab:'Compliance'});
      } else if(d<=60){
        var lvl=d<=7?'red':d<=30?'amber':'blue';
        alerts.push({id:aid,level:lvl,type:type,title:item.label+' expiring in '+d+'d',desc:c.name+' — expires '+fmt(ci2.expiry),cid:c.id,key:item.key,itemName:item.label,tab:'Compliance'});
      }
    });
  });
  return alerts;
}

function parseCSV(text){
  var lines=text.trim().split('\n');
  if(!lines.length)return[];
  var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_');});
  return lines.slice(1).filter(function(l){return l.trim();}).map(function(line){
    var vals=[];var cur='';var inQ=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'&&!inQ){inQ=true;}
      else if(ch==='"'&&inQ){inQ=false;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    vals.push(cur.trim());
    var obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]||'';});
    return obj;
  });
}

function importCSV(type){

      var added=0;var skipped=0;

            phase:row.phase||row.stage||'New Lead',
            priority:row.priority||'med',
            consultantId:cons?cons.id:(users.find(function(u){return u.role==='consultant';})||{id:2}).id,
            adminId:5,hot:false,
            phone:row.phone||row.mobile||'',
            email:row.email||'',
            state:row.state||'QLD',
            availableFrom:row.available_from||row.available||new Date().toISOString().slice(0,10),
            lastCheckin:new Date().toISOString().slice(0,10),
            regions:[],travelLocations:[],tags:[],
            activity:[{id:uid(),type:'System',content:'Imported from CSV',author:'System',ts:new Date().toISOString()}],
            compliance:{items:{}},submissions:[],
            travel:{flights:[],accommodation:[],carHire:[],expenses:[]},
            contracts:[],notes:'',preferences:''
          };
          candidates.push(newCand);
          added++;
        });
        showToast('Imported '+added+' candidates'+(skipped?' ('+skipped+' skipped - no name)':'')+'.', 4000);
        VCon=null;nav('candidates');
      } else if(type==='consultants'){
        rows.forEach(function(row){
          var name=row.name||row.full_name||row.consultant_name||'';
          if(!name){skipped++;return;}
          var exists=users.find(function(u){return u.name.toLowerCase()===name.toLowerCase();});
          if(exists){skipped++;return;}
          var colors=['#e84393','#00bcd4','#ff9800','#4caf50','#9c27b0','#f44336'];
          users.push({
            id:uid(),
            name:name,
            role:row.role||'consultant',
            email:row.email||'',
            initials:name.split(' ').map(function(n){return n[0];}).join('').slice(0,2).toUpperCase(),
            color:colors[users.length%colors.length],
            targets:{p:parseInt(row.placement_target)||4,s:parseInt(row.submission_target)||20},
            adminFor:[],
            consultantId:null
          });
          added++;
        });
        showToast('Imported '+added+' users'+(skipped?' ('+skipped+' skipped)':'')+'.', 4000);
        nav('team');
      }
      updateBadges();
    };
    reader.readAsText(file);
  };
  input.click();
}

function mbTopRoleMatches(cands){
  var open=(roles||[]).filter(function(r){return r.status==="Open"||r.status==="Likely";});
  return open.map(function(r){
    var strong=cands.filter(function(c){return matchScore(c,r).score>=70;}).length;
    return{role:r,strong:strong};
  }).filter(function(x){return x.strong>0;}).sort(function(a,b){return b.strong-a.strong;});
}
function mbAvailSoon(cands){
  return cands.filter(function(c){var d=ddiff(c.availableFrom);return d!==null&&d>=0&&d<=7;})
    .sort(function(a,b){return ddiff(a.availableFrom)-ddiff(b.availableFrom);});
}
function mbComplianceExpiring(cands){
  var items=[];
  cands.forEach(function(c){
    getCmpItems(c).forEach(function(item){
      var ci2=c.compliance.items[item.key];
      if(!ci2||!ci2.expiry)return;
      var d=ddiff(ci2.expiry);
      if(d===null||d>14)return;
      items.push({cid:c.id,cname:c.name,key:item.key,label:item.label,d:d});
    });
  });
  items.sort(function(a,b){return a.d-b.d;});
  return items;
}
function mbOverdueCheckins(cands){
  return cands.filter(function(c){
    var ci=ciStatus(c);
    return ci.stale&&["Active","Screening","Compliance","On Assignment","Redeployment"].indexOf(c.phase)>=0;
  }).sort(function(a,b){var da=ddiff(a.lastCheckin),db=ddiff(b.lastCheckin);return(da===null?-99999:da)-(db===null?-99999:db);});
}
function mbFollowups(cands){
  var byId={};cands.forEach(function(c){byId[c.id]=c;});
  var subs=[];
  followups.forEach(function(f){
    if(f.status!=='Pending')return;
    var c=byId[f.candidateId];if(!c)return;
    var overdueMs=Date.now()-new Date(f.dueAt).getTime();
    if(overdueMs<0)return;
    var sub=c.submissions.find(function(s){return s.id===f.submissionId;});
    subs.push({cid:c.id,cname:c.name,facility:sub?sub.facility:'',subId:f.submissionId,followupId:f.id,label:f.label,hrs:Math.floor(overdueMs/3600000)});
  });
  subs.sort(function(a,b){return b.hrs-a.hrs;});
  return subs;
}
function mbBuildPriorities(cands){
  var rows=[];
  var roleM=mbTopRoleMatches(cands);
  if(roleM.length){
    var facNames=roleM.slice(0,2).map(function(x){var f=facilities.find(function(ff){return ff.id===x.role.facilityId;});return(f?f.name:"Role")+" ("+x.strong+")";}).join(" · ");
    rows.push({key:"roles",icon:I.case,color:"var(--ok)",badge:"b-gn",
      title:roleM.length+" open role"+(roleM.length!==1?"s":"")+" with strong matches",
      detail:facNames,count:roleM.length,actionLabel:"View matches",onclick:"mbGoRoles()"});
  }
  var avail=mbAvailSoon(cands);
  if(avail.length){
    var names=avail.slice(0,3).map(function(c){return c.name;}).join(", ")+(avail.length>3?" +"+(avail.length-3)+" more":"");
    rows.push({key:"avail",icon:I.cal,color:"var(--accent)",badge:"b-bl",
      title:avail.length+" nurse"+(avail.length!==1?"s":"")+" become available within 7 days",
      detail:names,count:avail.length,actionLabel:mbAvailExpanded?"Hide list":"View list",onclick:"mbToggleAvail()",expandable:true});
  }
  var comp=mbComplianceExpiring(cands);
  if(comp.length){
    rows.push({key:"comp",icon:I.warn,color:comp[0].d<0?"var(--danger)":"#d4900a",badge:comp[0].d<0?"b-rd":"b-am",
      title:comp.length+" compliance item"+(comp.length!==1?"s":"")+" expiring within 14 days",
      detail:"Most urgent: "+comp[0].label+" — "+(comp[0].d<0?"expired "+Math.abs(comp[0].d)+"d ago":"expires in "+comp[0].d+"d")+" ("+comp[0].cname+")",
      count:comp.length,actionLabel:"Open",onclick:"mbGoCompliance()"});
  }
  var chk=mbOverdueCheckins(cands);
  if(chk.length){
    var top=chk[0],dchk=ddiff(top.lastCheckin);
    rows.push({key:"checkin",icon:I.person,color:"var(--danger)",badge:"b-rd",
      title:chk.length+" candidate"+(chk.length!==1?"s":"")+" overdue for check-in (14+ days)",
      detail:"Most overdue: "+top.name+" — "+(dchk===null?"never contacted":Math.abs(dchk)+"d since last contact"),
      count:chk.length,actionLabel:"Log check-in",onclick:"mbGoCheckin()"});
  }
  var fu=mbFollowups(cands);
  if(fu.length){
    rows.push({key:"followup",icon:I.phone,color:"var(--danger)",badge:"b-rd",
      title:fu.length+" submission"+(fu.length!==1?"s":"")+" awaiting follow-up",
      detail:"Most urgent: "+fu[0].facility+" — "+fu[0].label+", "+fu[0].hrs+"h overdue ("+fu[0].cname+")",
      count:fu.length,actionLabel:"Follow up",onclick:"mbGoFollowup()"});
  }
  var workload=rows.reduce(function(a,r){return a+r.count;},0);
  return{rows:rows,workload:workload};
}
function mbToggleAvail(){mbAvailExpanded=!mbAvailExpanded;renderHome();}
function mbGoRoles(){var m=mbTopRoleMatches(vc());if(m.length){selectedRoleId=m[0].role.id;nav("jobboard");}}
function mbGoCompliance(){var items=mbComplianceExpiring(vc());if(items.length)openCandAtComp(items[0].cid,items[0].key);}
function mbGoCheckin(){var list=mbOverdueCheckins(vc());if(list.length)openCandAtCheckin(list[0].id);}
function mbGoFollowup(){var list=mbFollowups(vc());if(list.length)openCandAtSubAlert(list[0].cid,list[0].subId);}
function mbExpandBrief(){mbCollapsed=false;renderHome();}
function mbCollapseBrief(){mbCollapsed=true;renderHome();}
function mbStartDay(){
  var cands=vc();
  if(mbTopRoleMatches(cands).length){mbGoRoles();return;}
  if(mbAvailSoon(cands).length){mbAvailExpanded=true;renderHome();setTimeout(function(){var el=document.getElementById("mb-row-avail");if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},0);return;}
  if(mbComplianceExpiring(cands).length){mbGoCompliance();return;}
  if(mbOverdueCheckins(cands).length){mbGoCheckin();return;}
  if(mbFollowups(cands).length){mbGoFollowup();return;}
}

function mbBreakdownHtml(){
  if(CU.role==="consultant")return"";

          +'</div></td>'
        :"")
      +'</tr>';
  }).join("");

  document.getElementById("page").innerHTML=
    (jobMatchFilt?'<div class="callout c-amber" style="align-items:center;justify-content:space-between">'
      +'<span>Showing matches for <strong>'+esc(jobMatchFilt.ward||'')+' '+esc(jobMatchFilt.nurseType||'')+'</strong>'+(jobMatchFilt.facName?' at <strong>'+esc(jobMatchFilt.facName)+'</strong>':'')+' &mdash; compliance &ge;'+jobMatchFilt.minCompliance+'%</span>'

var _snz=JSON.parse(localStorage.getItem('hca_snooze')||'{}');
function snzSet(id,days){var u=new Date();u.setDate(u.getDate()+days);_snz[id]=u.toISOString().slice(0,10);localStorage.setItem('hca_snooze',JSON.stringify(_snz));}
function snzOk(id){return _snz[id]&&_snz[id]>=new Date().toISOString().slice(0,10);}

function alertDismiss(id){
  var el=document.getElementById('al-'+id.replace(/:/g,'_'));
  if(!el)return;
  el.style.transition='opacity .15s ease,max-height .15s ease,margin .15s ease';
  el.style.opacity='0';el.style.maxHeight='0';el.style.marginBottom='0';el.style.overflow='hidden';
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},160);
}
function refreshAlertsHeader(){
  if(curPage!=='alerts')return;
  var tbS=document.getElementById('tb-s');
  if(!tbS)return;
  var raw=getAutos(vc());
  var all=raw.filter(function(a){return !snzOk(a.id||'');});
  var snoozed=raw.length-all.length;
  tbS.textContent=all.length+" alerts — "+all.filter(function(a){return a.level==="red";}).length+" urgent"+(snoozed?" ("+snoozed+" snoozed)":'');
}
function alertSnooze(id,days){snzSet(id,days);alertDismiss(id);updateBadges();refreshAlertsHeader();}

function alertShowCheckin(id){
  var cmp=document.getElementById('al-ckin-'+id.replace(/:/g,'_'));

  if(cmp.style.display==='block'){var ta=cmp.querySelector('textarea');if(ta)ta.focus();}

function bizDays(fromDate){
  if(!fromDate)return null;
  var d=new Date(fromDate),now=new Date(),days=0,cur=new Date(d);
  while(cur<=now){var dow=cur.getDay();if(dow!==0&&dow!==6)days++;cur.setDate(cur.getDate()+1);}
  return days;
}
function prepSub(s){
  var daysOpen=s.submittedDate?Math.round((Date.now()-new Date(s.submittedDate))/864e5):null;
  var stageBase=s.statusChangedAt||s.submittedDate;
  var daysInStage=stageBase?Math.round((Date.now()-new Date(stageBase))/864e5):null;
  var sla=s.status==='Submitted'?bizDays(s.submittedDate):null;
  var slaLevel=sla===null?null:sla>=5?'red':sla>=3?'amber':null;
  var fuDiff=s.followUpDate?ddiff(s.followUpDate):null;
  var fuOverdue=fuDiff!==null&&fuDiff<0&&!s.followUpDone&&['Submitted','Promoting'].indexOf(s.status)>=0;
  var u=uById(s.cConsId);
  var nextIdx=SUB_PL.indexOf(s.status)+1;
  var nextStage=(nextIdx>0&&nextIdx<=2)?SUB_PL[nextIdx]:null;
  return Object.assign({},s,{daysOpen:daysOpen,daysInStage:daysInStage,sla:sla,slaLevel:slaLevel,fuDiff:fuDiff,fuOverdue:fuOverdue,consName:u?u.name:'—',nextStage:nextStage});
}
function slaChipHtml(p){
  if(!p.slaLevel)return'';
  return'<span class="sla-chip sla-'+p.slaLevel[0]+'">SLA '+p.sla+'d</span>';

function followupChipHtml(subId){

}

  return !!(c&&(c.contracts||[]).some(function(k){return k.submissionId===subId;}));
}
function setSubStatus(cid,subId,newStatus,e){
  if(e)e.stopPropagation();
  _kbMenu=null;
  var c=candidates.find(function(x){return x.id===cid;});if(!c)return;
  var sub=c.submissions.find(function(s){return s.id===subId;});if(!sub)return;
  if(sub.status===newStatus)return;
  var prevStatus=sub.status,prevChangedAt=sub.statusChangedAt;
  var now=new Date().toISOString();
  sub.status=newStatus;sub.statusChangedAt=now;
  var msg='Submission to '+(sub.facility||'facility')+' updated to '+newStatus;
  if(!c.activity)c.activity=[];
  c.activity.push({type:'System',content:msg,author:CU.name,ts:now,_synced:false});
  showToast('Moved to '+newStatus);
  if(curPage==='submissions')renderSubmissions();
  else if(curPage==='candidateprofile')renderCandPage();
  markLocalSubChange(subId);
  if(newStatus==='Submitted'&&prevStatus!=='Submitted'&&subId)createSubmissionFollowups(subId,cid);
  else if(prevStatus==='Submitted'&&newStatus!=='Submitted'&&subId)completeFollowupsForSubmission(subId,'Resolved by outcome');
  if(newStatus==='Accepted'&&prevStatus!=='Accepted'&&subId){
    if(['Submission','Offer'].indexOf(c.phase)>=0){
      var prevPhase=c.phase;
      c.phase='Offer';
      sb.from('candidates').update({phase:'Offer'}).eq('id',cid).then(function(rp){if(rp.error){c.phase=prevPhase;console.error('[DB] phase->Offer',rp.error);}});
    }
    var hasContract=(c.contracts||[]).some(function(k){return k.submissionId===subId;});
    if(!hasContract)openContractModal(subId);
  }
  sb.from('submissions').update({status:newStatus,status_changed_at:now}).eq('id',subId).then(function(r){
    if(r.error){
      sub.status=prevStatus;sub.statusChangedAt=prevChangedAt;
      showToast('Update failed — reverted: '+r.error.message,'err');
      if(curPage==='submissions')renderSubmissions();else if(curPage==='candidateprofile')renderCandPage();
      return;
    }
    sb.from('activity').insert({candidate_id:cid,entity_type:'candidate',entity_id:cid,author_id:CU.id,type:'System',content:msg,author:CU.name,ts:now}).then(function(r2){if(r2.error)console.error('[DB] sub status activity',r2.error);});
  });
}

// ── SUBMISSION FOLLOW-UPS (24h/48h chase) ──────────────────────────────────
function createSubmissionFollowups(subId,candId,baseTime){
  var already=followups.some(function(f){return f.submissionId===subId&&f.status==='Pending';});
  if(already)return;
  var base=baseTime||Date.now();
  var rows=[
    {submission_id:subId,candidate_id:candId,due_at:new Date(base+24*3600*1000).toISOString(),label:'24h chase',status:'Pending'},
    {submission_id:subId,candidate_id:candId,due_at:new Date(base+48*3600*1000).toISOString(),label:'48h chase',status:'Pending'}
  ];
  sb.from('submission_followups').insert(rows).select().then(function(r){
    if(r.error){console.error('[DB] followup create',r.error);return;}
    (r.data||[]).forEach(function(row){followups.push(mapFollowupRow(row));});
    if(CU&&curPage==='home')renderPage();
  });
}
function completeFollowupsForSubmission(subId,note){
  var pending=followups.filter(function(f){return f.submissionId===subId&&f.status==='Pending';});
  if(!pending.length)return;
  var now=new Date().toISOString();
  pending.forEach(function(f){f.status='Completed';f.completedAt=now;f.completedBy=CU.name;f.notes=note||'';});
  sb.from('submission_followups').update({status:'Completed',completed_at:now,completed_by:CU.name,notes:note||''}).in('id',pending.map(function(f){return f.id;})).then(function(r){
    if(r.error)console.error('[DB] followup autocomplete',r.error);
  });
}
function completeFollowup(fid,note){
  var f=followups.find(function(x){return x.id===fid;});if(!f)return;
  var prev={status:f.status,completedAt:f.completedAt,completedBy:f.completedBy,notes:f.notes};
  var now=new Date().toISOString();
  f.status='Completed';f.completedAt=now;f.completedBy=CU.name;f.notes=note||'';
  showToast('Follow-up marked done');
  renderPage();
  var c=candidates.find(function(x){return x.id===f.candidateId;});
  var sub=c&&c.submissions.find(function(s){return s.id===f.submissionId;});
  var actMsg='Follow-up ('+f.label+') completed'+(sub?' — '+(sub.facility||'facility'):'')+(note?': '+note:'');
  if(c){
    if(!c.activity)c.activity=[];
    c.activity.push({type:'System',content:actMsg,author:CU.name,ts:now,_synced:false});
    sb.from('activity').insert({candidate_id:c.id,entity_type:'candidate',entity_id:c.id,author_id:CU.id,type:'System',content:actMsg,author:CU.name,ts:now}).then(function(r2){if(r2.error)console.error('[DB] followup activity',r2.error);});
  }
  sb.from('submission_followups').update({status:'Completed',completed_at:now,completed_by:CU.name,notes:note||''}).eq('id',fid).then(function(r){
    if(r.error){
      Object.assign(f,prev);
      showToast('Update failed — reverted: '+r.error.message,'err');
      renderPage();
    }
  });
}
function backfillSubmissionFollowups(){
  var haveFollowup={};
  followups.forEach(function(f){if(f.submissionId)haveFollowup[f.submissionId]=true;});
  var cutoff=Date.now()-24*3600*1000;
  candidates.forEach(function(c){
    c.submissions.forEach(function(s){
      if(s.status!=='Submitted'||!s.id||haveFollowup[s.id])return;
      var submitted=s.submittedDate?new Date(s.submittedDate).getTime():null;
      if(submitted===null||submitted>cutoff)return;
      createSubmissionFollowups(s.id,c.id,submitted);
    });
  });
}

    +heroStat(I.warn,'Overdue follow-ups',overdueCount)
    +'</div></div>';

  var filterSel='font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:6px';
  var filterBar='<div style="display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap">'
    +(subView==='list'

    +'<select onchange="setSubFilt(\'co\',this.value)" style="'+filterSel+'">'
    +'<option value="All"'+(subFiltConsId==="All"?" selected":"")+'>All Consultants</option>'
    +consIds.filter(function(x){return x!=="All";}).map(function(id){var u=uById(Number(id));return'<option value="'+id+'"'+(String(subFiltConsId)===String(id)?" selected":"")+'>'+esc(u?u.name:"ID "+id)+'</option>';}).join('')
    +'</select>'
    +'<select onchange="setSubFilt(\'fa\',this.value)" style="'+filterSel+'">'
    +facNames.map(function(f){return'<option'+(subFiltFacility===f?' selected':'')+'>'+esc(f)+'</option>';}).join('')+'</select>'
    +((subView==='list'&&subFiltStatus!=="All")||subFiltConsId!=="All"||subFiltFacility!=="All"
      ?'<button class="btn btn-g btn-sm" onclick="setSubFilt(\'st\',\'All\');setSubFilt(\'co\',\'All\');setSubFilt(\'fa\',\'All\')">Clear</button>':"")
    +'</div>';

  if(subView==='pipeline'){
    // ── PIPELINE VIEW ──────────────────────────────────────────────────────────
    var KB_COLS=['Promoting','Submitted','Accepted'];
    var KB_COL_BG={Promoting:'var(--brand-l)',Submitted:'var(--accent-l)',Accepted:'var(--ok-l)'};
    var KB_COL_C={Promoting:'var(--brand)',Submitted:'var(--accent)',Accepted:'var(--ok)'};
    var declined=filtered.filter(function(s){return s.status==='Declined';});
    var withdrawn=filtered.filter(function(s){return s.status==='Withdrawn';});
    function termChip(list,label,bg,tc,expandKey,expandSet){
      if(!list.length)return'<span style="font-size:10px;color:var(--t3)">0 '+label+'</span>';
      return'<span onclick="'+expandSet+';renderSubmissions()" style="font-size:10px;font-weight:500;background:'+bg+';color:'+tc+';cursor:pointer;padding:4px 8px;border:1px solid '+tc+'44;border-radius:10px">'+list.length+' '+label+' '+(window[expandKey]?'&#9650;':'&#9660;')+'</span>';
    }
    var board=heroHtml+'<div class="card" style="overflow:hidden">'
      +filterBar
      +'<div style="padding:8px 16px;display:flex;justify-content:flex-end;align-items:center;gap:8px;border-bottom:1px solid var(--border)">'
      +termChip(withdrawn,'Withdrawn','var(--bg)','var(--t3)','_withdrawnExpanded','_withdrawnExpanded=!_withdrawnExpanded')
      +termChip(declined,'Declined','var(--danger-l)','var(--danger)','_declinedExpanded','_declinedExpanded=!_declinedExpanded')
      +'</div>'
      +(_withdrawnExpanded&&withdrawn.length
        ?'<div style="padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border)">'
          +'<div style="font-size:9px;font-weight:500;text-transform:uppercase;color:var(--t3);margin-bottom:8px">Withdrawn ('+withdrawn.length+')</div>'
          +withdrawn.map(function(p){return'<div onclick="openCandAtSubAlert('+p.cid+','+(p.id||'null')+')" style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);cursor:pointer;color:var(--t2)">'+esc(p.cn)+' → '+esc(p.facility||'—')+'</div>';}).join('')
          +'</div>'
        :'')
      +(_declinedExpanded&&declined.length
        ?'<div style="padding:12px 16px;background:var(--danger-l);border-bottom:1px solid var(--border)">'
          +'<div style="font-size:9px;font-weight:500;text-transform:uppercase;color:var(--danger);margin-bottom:8px">Declined ('+declined.length+')</div>'
          +declined.map(function(p){return'<div onclick="openCandAtSubAlert('+p.cid+','+(p.id||'null')+')" style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);cursor:pointer;color:var(--t2)">'+esc(p.cn)+' → '+esc(p.facility||'—')+'</div>';}).join('')
          +'</div>'
        :'')
      +'<div class="kb-wrap">'
      +KB_COLS.map(function(col){
        var cards=filtered.filter(function(s){return s.status===col;});
        var colC=KB_COL_C[col];
        return'<div class="kb-col">'
          +'<div class="kb-hd" style="background:'+KB_COL_BG[col]+';color:'+colC+'">'
          +'<span>'+col+'</span>'
          +'<span style="background:rgba(255,255,255,.6);color:'+colC+';font-size:10px;padding:4px 8px;border-radius:10px">'+cards.length+'</span>'
          +'</div>'
          +'<div class="kb-cards">'
          +(cards.length
            ?cards.map(function(p){
              var menuOpen=_kbMenu===p.id;
              var rateClean=cleanRate(p.rate);
              return'<div class="kb-card" onclick="openCandAtSubAlert('+p.cid+','+(p.id||'null')+')">'
                +(menuOpen?'<div onclick="_kbMenu=null;renderSubmissions()" style="position:fixed;inset:0;z-index:99"></div>':'')
                +'<button class="kb-menu-btn" onclick="toggleKbMenu('+(p.id||'null')+',event)" title="More options">&#8943;</button>'
                +(menuOpen
                  ?'<div class="kb-menu" onclick="event.stopPropagation()">'
                    +'<div class="kb-ml">Set status</div>'
                    +SUB_ALL.map(function(st){return'<button class="kb-mi'+(p.status===st?' kb-mi-cur':'')+'" onclick="setSubStatus('+p.cid+','+(p.id||'null')+',\''+st+'\',event)" style="'+(p.status===st?'font-weight:500;color:var(--brand)':'')+'">'+esc(st)+'</button>';}).join('')
                    +'<div class="kb-ms"></div>'
                    +(!p.followUpDone?'<button class="kb-mi" onclick="subMarkFuDone('+p.cid+','+(p.id||'null')+',event)">Mark follow-up done</button>':'')
                    +'<button class="kb-mi" onclick="event.stopPropagation();_kbMenu=null;openCandPage('+p.cid+')">Open candidate</button>'
                    +'</div>'
                  :'')
                +'<div style="font-size:12px;font-weight:500;color:var(--t1);margin-bottom:4px;padding-right:24px">'+esc(p.cn)+'</div>'
                +'<div style="font-size:10px;color:var(--t3);margin-bottom:4px">'+esc(p.facility||'—')+(p.ward?' · '+esc(p.ward):'')+'</div>'
                +(rateClean!==''?'<div style="font-size:10px;color:var(--ok);font-weight:500;margin-bottom:4px">$'+rateClean+'/hr</div>':'')
                +'<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">'
                +(p.daysInStage!==null?'<span style="font-size:9px;color:var(--t3)">'+p.daysInStage+'d in stage</span>':'')
                +slaChipHtml(p)
                +followupChipHtml(p.id)
                +'</div>'
                +(p.nextStage
                  ?'<button class="btn btn-g btn-xs" style="margin-top:8px;width:100%;font-size:10px" onclick="advanceSubStage('+p.cid+','+(p.id||'null')+',&apos;'+col+'&apos;,event)">→ '+p.nextStage+'</button>'
                  :(p.status==='Accepted'&&!hasContractForSub(p.cid,p.id)
                    ?'<button class="btn btn-p btn-xs" style="margin-top:8px;width:100%;font-size:10px" onclick="event.stopPropagation();openContractModal('+p.id+')">+ Create Contract</button>'
                    :''))
                +'</div>';
            }).join('')
            :'<div style="font-size:11px;color:var(--t4,var(--t3));text-align:center;padding:12px 0">Empty</div>')
          +'</div></div>';
      }).join('')
      +'</div></div>';
    document.getElementById("page").innerHTML=board;
    return;
  }

  // ── LIST VIEW ──────────────────────────────────────────────────────────────
  var rows=filtered.map(function(p){
    var fuHtml=p.followUpDate
      ?'<div style="font-size:10px;'+(p.fuOverdue?'color:var(--danger);font-weight:500':p.fuDiff===0?'color:var(--warn);font-weight:500':'color:var(--t3)')+'">'+fmt(p.followUpDate)+(p.fuOverdue?' &#8226;':'')+'</div>'
      :'<span style="color:var(--t3);font-size:10px">&mdash;</span>';
    var stSel='<select class="sub-st-sel" onclick="event.stopPropagation()" onchange="setSubStatus('+p.cid+','+(p.id||'null')+',this.value,event);styleSubSel(this)" style="background:'+(SUB_BG[p.status]||'#fff')+';color:'+(SUB_TC[p.status]||'var(--t1)')+';font-weight:500;font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:6px">'
      +SUB_ALL.map(function(st){return'<option'+(p.status===st?' selected':'')+'>'+esc(st)+'</option>';}).join('')
      +'</select>'
      +(p.status==='Accepted'&&!hasContractForSub(p.cid,p.id)
        ?'<button class="btn btn-p btn-xs" style="margin-top:4px" onclick="event.stopPropagation();openContractModal('+p.id+')">+ Contract</button>'
        :'');
    return '<tr onclick="openCandAtSubAlert('+p.cid+','+(p.id||'null')+')" style="cursor:pointer">'
      +'<td><div class="cp">'+esc(p.cn)+'</div><div class="cs">'+esc(p.cc)+'</div></td>'
      +'<td style="font-size:11px">'+esc(p.facility||"—")+'</td>'
      +'<td style="font-size:10px;color:var(--t3)">'+esc(p.ward||"—")+'</td>'
      +'<td style="font-size:10px;color:var(--t3)">'+fmt(p.submittedDate)+'</td>'
      +'<td>'+stSel+'</td>'
      +'<td style="font-size:11px;text-align:center;font-weight:500">'+(p.daysOpen!==null?p.daysOpen+'d':'—')+'</td>'
      +'<td>'+slaChipHtml(p)+followupChipHtml(p.id)+'</td>'
      +'<td>'+fuHtml+'</td>'
      +'<td style="font-size:10px;color:var(--t3)">'+esc(p.consName)+'</td>'
      +'</tr>';
  }).join("");

  document.getElementById("page").innerHTML=heroHtml+'<div class="card">'
    +filterBar
    +'<table class="tbl"><thead><tr><th>Candidate</th><th>Facility</th><th>Ward</th><th>Submitted</th><th>Status</th><th style="text-align:center">Days Open</th><th>SLA</th><th>Follow-up</th><th>Consultant</th></tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="9"><div class="empty-st">'+I.plane+'<b>'+(all.length?'No submissions match':'No submissions yet')+'</b><p>'+(all.length?'Try adjusting your filters.':'Submit a candidate to a facility to start tracking.')+'</p>'+(all.length?'':'<button class="btn btn-p btn-sm" onclick="nav(\'candidates\')">Go to Candidates</button>')+'</div></td></tr>')+'</tbody></table></div>';
}
